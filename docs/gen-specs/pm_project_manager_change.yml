    javaType: Long
    javaField: projectId
    isInsert: true
    isEdit: true
    isList: false    # 列表通过 projectName 显示，不直接显示 ID
    isQuery: true    # 查询条件（远程搜索 el-select，提交 projectId）
    queryType: EQ
    isRequired: true
    htmlType: select
    dictType: ""

  old_manager_id:
    columnComment: 原项目经理ID
    columnType: bigint(20)
    javaType: Long
    javaField: oldManagerId
    isInsert: true
    isEdit: true
    isList: false    # 列表通过 VO 的 oldManagerName 显示
    isQuery: false   # 查询条件不使用 oldManagerId，使用 currentManagerId（VO字段）

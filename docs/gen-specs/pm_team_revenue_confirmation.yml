# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # ========== 列表页面定制 ==========
  list_query_conditions:
    intent: "查询条件支持多维度筛选，含确认团队和合同状态，共15个条件"
    component:
      type: custom
      spec: "label-width=120px，共15个查询字段，4列网格布局（el-row/el-col :span=6）"
    bindTo: page
    service:
      endpoint: "GET /revenue/team/list"
      source: "主表从项目表查询（pm_project），与公司收入确认逻辑一致"
      returns: "项目列表，包含收入确认相关字段"
      newApi: false
    notes: |
      布局：el-form（无 inline），label-width="120px"，5行 el-row :gutter=10
      第1~4行每行4个 el-col :span=6（第4行仅3个条件）；第5行1个 el-col :span=24（按钮组独占全宽）

      查询条件顺序（15个，4列布局）：
      行1：项目名称 | 项目部门 | 确认团队 | 收入确认年度
      行2：项目分类 | 一级区域 | 二级区域 | 项目经理
      行3：市场经理 | 立项年度 | 审核状态 | 验收状态
      行4：合同状态 | 项目阶段 | 收入确认状态（3个条件，第4格留空）
      行5：[查询（primary） 重置 导出（warning plain，v-hasPermi='revenue:team:export'）
            新增（primary plain，v-hasPermi='revenue:team:add'）] → el-col :span=24，label-width="0"

      各字段说明：
      - 项目名称（el-select，filterable + remote + allow-create，clearable）
        - :remote-method="remoteSearchProjects"：输入时调用 searchProjects(query)
        - @visible-change="(v) => v && remoteSearchProjects('')"：每次展开时重新加载全量
        - :loading="projectSearchLoading"
        - 选项列表 projectOptions ref，来自 searchProjects API 返回的 response.data
        - el-option :value="item.projectName"（值为名称字符串，非ID）
        - 注意：无 projectSelectLoaded ref 守卫，每次展开均重新调用
      - 项目部门（el-tree-select，deptTree，三级及以下部门，check-strictly，clearable，filterable）
      - 确认团队（el-tree-select，confirmDeptTree，check-strictly，clearable，filterable）
        - confirmDeptTree = [{ label: '无确认团队', value: -1, children: [] }, ...deptTree]
        - 首项为固定虚节点"无确认团队"（value=-1），其余与 deptTree 相同
        - queryParams.confirmDeptId，传给后端：-1 → NOT EXISTS 子查询，正常ID → EXISTS 子查询
      - 收入确认年度（dict-select，sys_ndgl）
      - 项目分类（dict-select，sys_xmfl）
      - 一级区域（dict-select，sys_yjqy）
      - 二级区域（secondary-region-select，:region-dict-value="queryParams.region"）
      - 项目经理（user-select，post-code=pm，ref="projectManagerSelectRef"）
      - 市场经理（user-select，post-code=scjl，ref="marketManagerSelectRef"）
      - 立项年度（dict-select，sys_ndgl）
      - 审核状态（dict-select，sys_spzt）
      - 验收状态（dict-select，sys_yszt）
      - 合同状态（dict-select，sys_htzt）
      - 项目阶段（dict-select，sys_xmjd）
      - 收入确认状态（dict-select，sys_qrzt）

      queryParams 字段（16个，含分页）：
      pageNum, pageSize, projectName, projectDept, confirmDeptId, revenueConfirmYear,
      projectCategory, region, regionId, projectManagerId, marketManagerId,
      establishedYear, projectStage, approvalStatus, acceptanceStatus,
      contractStatus, revenueConfirmStatus

      后端支持：
      - confirmDeptId 在 selectProjectList WHERE 中：
        - confirmDeptId == -1 → AND NOT EXISTS (SELECT 1 FROM pm_team_revenue_confirmation tc2
                                WHERE tc2.project_id = p.project_id AND tc2.del_flag = '0')
        - confirmDeptId 正常值 → AND EXISTS (...AND tc2.dept_id = #{confirmDeptId}...)
      - 对应 Project 实体新增字段 confirmDeptId（Long，非DB字段，查询条件用）

  list_table_columns:
    intent: "列表表格支持显隐列，共28列（序号+26数据列+操作列），表格启用 border，支持行合并"

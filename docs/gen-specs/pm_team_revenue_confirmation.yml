# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: teamRevenueConfirmation
  functionName: 团队收入确认
  parentMenuId: 3

# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # ========== 列表页面定制 ==========
  list_query_conditions:
    intent: "查询条件与公司收入确认保持一致，支持多维度筛选"
    component:
      type: custom
      spec: "复用公司收入确认的查询表单"
    bindTo: page
    service:
      endpoint: "GET /revenue/team/list"
      source: "主表从项目表查询（pm_project），与公司收入确认逻辑一致"
      returns: "项目列表，包含收入确认相关字段"
      newApi: false
    notes: |
      查询条件字段：
      - 项目名称（autocomplete）
      - 项目部门（tree-select）
      - 收入确认年度、项目分类、一级区域、二级区域
      - 项目经理、市场经理、立项年度
      - 项目阶段、审核状态、验收状态、收入确认状态
      查询主表使用 IProjectService.selectProjectList()，确保与公司收入确认数据一致

  list_table_columns:
    intent: "列表表格显示字段与项目管理列表保持一致，共25列（24数据列+1操作列）"
    component:
      type: custom
      spec: "表格列与项目管理列表对齐，额外保留收入确认特有字段"
    bindTo: table
    service: null
    notes: |
      列顺序（25列）：
      1. 序号（55px）
      2. 项目名称（min-width=220, align=left, 自动换行）
      3. 项目部门（120px）
      4. 项目经理（100px）
      5. 项目分类（120px）
      6. 二级区域（120px）
      7. 项目预算(元)（120px, align=right）
      8. 预估工作量（100px）
      9. 实际人天（100px）
      10. 合同金额(元)（120px, align=right）
      11. 收入确认年度（120px）
      12. 合同状态（100px）
      13. 收入确认状态（120px）
      14. 确认金额(含税)(元)（120px, align=right）
      15. 税后金额（120px）- 收入确认特有字段
      16. 参与人员（150px）
      17. 启动日期（100px）
      18. 结束日期（100px）
      19. 验收日期（100px）
      20. 审核状态（100px）
      21. 项目阶段（100px）
      22. 验收状态（100px）
      23. 更新人（100px, prop="updateByName"）
      24. 更新时间（160px）
      25. 操作（150px, fixed=right）

      字典依赖：sys_htzt（合同状态）、sys_spzt（审核状态）、sys_yszt（验收状态）、sys_srqrzt（收入确认状态）、sys_xmfl（项目分类）、sys_xmjd（项目阶段）

  list_participants_display:
    intent: "参与人员列通过隐藏的 UserSelect 组件加载所有用户，将用户ID转为姓名显示"
    component:
      type: UserSelect
      spec: "隐藏的 UserSelect 组件 (style='display: none')，通过 ref 访问 userOptions"
    bindTo: participants
    service: null
    notes: |
      实现方式：
      1. 添加隐藏的 UserSelect 组件：
         <user-select ref="allUsersSelectRef" v-model="hiddenAllUsersValue" style="display: none" />
      2. getParticipantsNames(participants) 函数：
         - 解析 participants 字段（逗号分隔的用户ID字符串或数组）
         - 通过 allUsersSelectRef.value?.userOptions || [] 获取用户列表（注意：不需要额外 .value）
         - 根据 userId 匹配 nickName，返回逗号分隔的姓名字符串
         - 无匹配时返回 '-'
      3. 合计行（isSummaryRow）不显示参与人员

  list_amount_format:
    intent: "金额字段千分位格式化，工作量字段取整显示"
    component:
      type: custom
      spec: "formatAmount() 和 formatWorkload() 格式化函数"
    bindTo: table
    service: null
    notes: |
      formatAmount(amount)：
      - 使用 toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      - null/undefined/'' 返回空字符串
      - 金额列表头标注单位(元)，align=right

      formatWorkload(value)：
      - 使用 parseInt() 取整，不显示小数
      - null/undefined/'' 返回空字符串

      更新人列：
      - prop="updateByName"，后端 JOIN sys_user 取 nick_name 作为关联字段

  list_summary_row:
    intent: "列表添加合计行，显示在表头和第一行数据之间"
    component:
      type: custom
      spec: "displayList computed 属性动态生成包含合计行的数据列表"
    bindTo: displayList
    service: null
    notes: |
      实现逻辑：
      1. displayList computed 遍历 teamRevenueList 累加6个数值字段
      2. 合计行对象：{ isSummaryRow: true, ...各字段合计值 }
      3. 金额字段（confirmAmount, afterTaxAmount, projectBudget, contractAmount）使用 .toFixed(2) 格式化
      4. 工作量字段（estimatedWorkload, actualWorkload）使用 Math.round() 取整
      5. 合计行插入列表开头：[summaryRow, ...teamRevenueList.value]
      6. el-table 使用 :data="displayList"

      合计行样式：
      - :row-class-name="tableRowClassName" 给合计行添加 'summary-row' 类
      - .summary-row { background-color: #f5f7fa; font-weight: bold; }
      - 序号列、操作列在合计行不显示
      - 项目名称列在合计行显示"合计"文字（加粗）

  list_pagination_fixed:
    intent: "分页组件固定在页面底部，表格高度动态计算"
    component:
      type: custom
      spec: "flex 布局 + 动态表格高度计算"
    bindTo: page
    service: null
    notes: |
      容器：className="revenue-team-container", height: 100%, display: flex, flex-direction: column
      表格高度：tableHeight = windowHeight - searchHeight - toolbarHeight - paginationHeight - padding
      - searchHeight: 200px（showSearch 为 true 时）
      - toolbarHeight: 50px, paginationHeight: 50px, padding: 120px
      生命周期：
      - onMounted: calcTableHeight() + window.addEventListener('resize', calcTableHeight)
      - onUnmounted: window.removeEventListener('resize', calcTableHeight)
      - watch showSearch: 搜索框显隐时重新计算表格高度

  # ========== 新增/编辑页面定制 ==========
  project_select_hybrid:
    intent: "项目选择支持下拉选择和远程搜索两种方式"
    component:
      type: ProjectSelect
      props:
        remote: true
        filterable: true
        clearable: true
        remoteMethod: "无搜索词时加载全部项目，有搜索词时远程搜索"
        visibleChange: "首次打开下拉框时加载全部项目"
    bindTo: project_id
    service:
      endpoint: "GET /project/project/listByName?projectName={keyword}"
      source: "复用 IProjectService.selectProjectList()"
      returns: "[{ projectId, projectName }]"
      newApi: false
    notes: |
      表单中项目选择后，自动带出项目预算、合同金额、公司确认金额、确认年度等字段

      编辑时项目名称回显：
      - handleUpdate() 中先 open.value = true 打开对话框
      - 再通过 nextTick(() => { projectSelectRef.value.projectOptions.push({...}) }) 注入当前项目
      - 必须先打开对话框再 nextTick，否则 projectSelectRef.value 为 null（组件未挂载）
      - 注入对象需包含 projectId 和 projectName

  dept_tree_select_filtered:
    intent: "部门选择只显示三级及以下机构，支持树形结构选择"
    component:
      type: el-tree-select
      props:
        data: "过滤后的部门树数据（ancestors.split(',').length >= 3）"
        checkStrictly: true
        filterable: true
        clearable: true
        renderAfterExpand: false
    bindTo: dept_id
    service:
      endpoint: "GET /system/dept/treeselect"
      source: "复用 SysDeptService，前端过滤三级及以下部门"
      returns: "部门树数据"
      newApi: false
    notes: "loadDeptTree() 中过滤：const level = dept.ancestors.split(',').length; return level >= 3"

  confirm_user_readonly:
    intent: "确认人默认当前登录用户，只读不可编辑"
    component:
      type: text
      spec: "明细表格中确认人列显示为文本，不可编辑"
    bindTo: confirm_user_id
    service: null
    notes: "使用 Pinia userStore.id（注意不是 userId！）和 userStore.nickName。添加明细时自动填充当前用户，表格中只显示姓名文本"

  detail_list_management:
    intent: "明细列表的添加、删除和金额计算"
    component:
      type: custom
      spec: "el-table 显示明细列表，支持添加/删除行，自动计算合计金额"
    bindTo: form
    service: null
    notes: |
      - 添加明细：handleAddDetail() 新行默认 confirmUserId=userStore.id, confirmUserName=userStore.nickName, confirmAmount=0
      - 删除明细：handleDeleteDetail(index) 删除指定行
      - 合计金额：computed totalAmount 自动计算所有明细的 confirmAmount 总和
      - 表单提交前验证每条明细的 deptId、confirmAmount、confirmUserId 不能为空
      - 提交时过滤 confirmUserName（后端不需要）

  form_validation:
    intent: "表单提交前的前端和后端双重验证"
    component:
      type: custom
      spec: "前端验证 + 后端验证"
    bindTo: form
    service: null
    notes: |
      前端验证（submitForm）：
      - 至少添加一条确认明细
      - 每条明细的部门、确认金额、确认人不能为空

      后端验证（Controller.add/edit）：
      - projectId、deptId、confirmAmount、confirmUserId 不为 null
      - 使用 Map.get() 前先判空
      - 返回友好的中文错误提示

  # ========== 详情页面定制 ==========
  detail_page_layout:
    intent: "详情页面左右布局，左侧13列显示完整项目信息，右侧11列显示收入确认和团队明细"
    component:
      type: custom
      spec: "el-row + el-col 布局，左侧 span=13，右侧 span=11"
    bindTo: page
    service:
      endpoint: "GET /revenue/team/{projectId}"
      source: "返回项目详情和团队确认明细列表"
      returns: "{ project: Project, detailList: TeamRevenueConfirmation[] }"
      newApi: false
    notes: |
      左侧（span=13）6个卡片：
      1. 项目基本信息（el-descriptions, 2列）
      2. 人员配置（参与人员用 el-tag 标签显示）
      3. 客户信息
      4. 时间规划
      5. 成本预算（不含项目预算，已移至基本信息卡片）
      6. 备注

      右侧（span=11）2个卡片：
      1. 公司收入确认信息（el-descriptions, 1列）
      2. 团队收入确认明细（el-table + 合计金额 footer）

  detail_project_info_complete:
    intent: "左侧项目信息与项目管理详情页面完全一致"
    component:
      type: custom
      spec: "完整显示项目信息卡片：基本信息、人员配置、客户信息、时间规划、成本预算、备注"
    bindTo: project
    service: null
    notes: |
      项目基本信息字段：
      - 行业、一级区域（dict-tag）、简称、二级区域（regionName）
      - 立项年份、项目编号
      - 项目名称、项目分类、项目部门（完整路径）
      - 预估工作量、项目预算
      - 实际工作量、项目阶段
      - 验收状态、审核状态
      - 项目地址、项目计划、项目描述、审核意见

      项目部门显示：查询部门树，解析 ancestors，只保留三级及以下部门，用"-"连接各级名称

      参与人员显示：detail.vue 直接调用 getUsersByPost() 加载用户列表（非隐藏 UserSelect），
      根据 participants 字段过滤并用 el-tag 标签显示

      客户联系方式：根据 customerId + customerContactId 查询联系人电话

  detail_data_refresh:
    intent: "详情页面从公司收入确认返回时自动刷新最新数据"
    component:
      type: custom
      spec: "onActivated + watch 双重机制确保数据实时更新"
    bindTo: detail.vue
    service:
      endpoint: "GET /revenue/team/{projectId}"
      source: "getTeamRevenue API"
      returns: "{ project: Project, detailList: TeamRevenueConfirmation[] }"
      newApi: false
    notes: |
      Vue keep-alive 缓存场景下的数据刷新：
      - onMounted()：首次加载数据
      - onActivated()：从缓存恢复时重新加载（解决 keep-alive 缓存不刷新问题）
      - watch(route.params.projectId)：路由参数变化时重新加载
      使用场景：用户在公司收入确认页面填写数据后返回团队详情，无需手动刷新

  detail_revenue_info:
    intent: "右侧显示公司收入确认信息"
    component:
      type: custom
      spec: "el-descriptions 显示收入确认状态、年度、合同金额、确认金额、税率、税后金额"
    bindTo: revenueConfirm
    service: null
    notes: "数据来源于项目表的收入确认相关字段"

  detail_team_list:
    intent: "右侧显示团队收入确认明细列表"
    component:
      type: custom
      spec: "el-table 显示明细，包含部门、确认金额、确认时间、确认人、备注，底部显示合计金额"
    bindTo: detailList
    service: null
    notes: "合计金额使用 computed totalTeamAmount 自动计算"

  # ========== 后端接口定制 ==========
  backend_list_query:
    intent: "列表查询主表从项目表查询，与公司收入确认逻辑一致"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /revenue/team/list"
      source: "Controller 调用 IProjectService.selectProjectList()"
      returns: "项目列表（TableDataInfo）"
      newApi: false
    notes: "确保数据源与公司收入确认统一"

  backend_detail_query:
    intent: "详情接口返回项目信息+团队明细列表"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /revenue/team/{projectId}"
      source: |
        Controller.getInfo():
        1. 调用 IProjectService.selectProjectByProjectId() 获取项目详情
        2. 调用 ITeamRevenueConfirmationService.selectTeamRevenueConfirmationList() 获取团队明细
        3. 返回 Map{ project, detailList }
      returns: "{ project: Project, detailList: TeamRevenueConfirmation[] }"
      newApi: false
    notes: "一次接口调用返回详情页面所需的所有数据"

  backend_batch_save:
    intent: "新增/编辑支持批量保存明细"
    component: null
    bindTo: backend
    service:
      endpoint: "POST /revenue/team 和 PUT /revenue/team"
      source: |
        Controller.add/edit():
        1. 接收 Map 参数：{ projectId, detailList: [{ deptId, confirmAmount, confirmUserId, remark }] }
        2. 验证必填字段不为空
        3. 遍历 detailList，为每条明细设置 projectId 和 confirmTime（当前时间）
        4. 调用 Service.insertTeamRevenueConfirmation() 逐条保存
        5. 编辑时先删除旧明细，再保存新明细（删除后新增策略）
      returns: "AjaxResult"
      newApi: false
    notes: "后端自动设置 confirmTime = new Date()，解决数据库字段无默认值问题"

  backend_data_validation:
    intent: "后端数据验证和错误处理"
    component: null
    bindTo: backend
    service: null
    notes: |
      验证规则：
      - projectId 不能为空
      - detailList 不能为空，至少一条明细
      - 每条明细的 deptId、confirmAmount、confirmUserId 不能为空
      - 使用 Map.get() 前先判空，避免 NullPointerException
      - 返回友好的中文错误提示

  backend_data_association:
    intent: "团队确认明细关联查询部门名称和确认人姓名"
    component: null
    bindTo: backend
    service:
      endpoint: "MyBatis XML 配置"
      source: |
        TeamRevenueConfirmationMapper.xml:
        LEFT JOIN sys_dept d ON t.dept_id = d.dept_id
        LEFT JOIN sys_user u ON t.confirm_user_id = u.user_id
        查询字段：d.dept_name as dept_name, u.nick_name as confirm_user_name
        排序：ORDER BY COALESCE(t.update_time, t.create_time) DESC（注意使用表别名 t）
      returns: "TeamRevenueConfirmation（包含 deptName 和 confirmUserName 扩展字段）"
      newApi: false
    notes: "实体类中添加 deptName 和 confirmUserName 扩展字段用于显示"

# ============================
# 实现总结
# ============================
implementation_summary:
  description: "团队收入确认功能完整实现，支持主从表管理，与公司收入确认数据一致"

  key_features:
    - "列表查询主表从项目表查询，与公司收入确认逻辑一致"
    - "列表表格与项目管理列表保持一致，显示25列（24数据列+1操作列）"
    - "列表添加合计行，显示在表头与第一行数据之间，合计6个数值字段"

      新增字段（Project实体，非DB字段，来自 selectProjectList JOIN 聚合）：
      - teamDeptName（String）：GROUP_CONCAT 确认团队部门名称（后端聚合列名 team_dept_name）
      - teamConfirmAmount（BigDecimal）：SUM confirm_amount 团队确认收入汇总
      - contractName（String）：GROUP_CONCAT 合同名称，\n 分隔（已存在于实体）

  list_row_merge:
    intent: "同一项目的多条团队确认明细在列表中合并项目公共列，避免重复展示"
    component:
      type: custom
      spec: "el-table :span-method 行合并"
    bindTo: table
    service: null
    notes: |
      需要合并的列（PROJECT_MERGE_COLS Set，按列 label 匹配）：
      '序号', '项目名称', '项目阶段', '项目部门', '项目经理', '项目分类',
      '二级区域', '项目预算(元)', '预估工作量（人天）', '实际人天',
      '合同名称', '合同金额(元)', '合同状态', '收入确认年度', '收入确认状态', '确认金额(元)'
      共16列（columns[0]~columns[14] + 序号列）

      buildProjectSpanMap(rows)：
      - 遍历 rows，跳过 isSummaryRow 和无 projectId 行
      - 按 projectId 分组（要求同一项目行连续排列）
      - 构建 Map：{ [projectId]: { firstIndex: number, span: number } }
      - 存入 projectSpanMap ref

      tableSpanMethod({ row, column, rowIndex })：
      - 合计行返回 { rowspan: 1, colspan: 1 }
      - 列 label 不在 PROJECT_MERGE_COLS 中返回 { rowspan: 1, colspan: 1 }
      - 找到 info = projectSpanMap[String(row.projectId)]
      - info.firstIndex === rowIndex → { rowspan: info.span, colspan: 1 }（显示并占位）
      - 其他行 → { rowspan: 0, colspan: 0 }（被合并隐藏）

      每次 getList() 更新数据后调用 buildProjectSpanMap(teamRevenueList.value)

  list_participants_display:
    intent: "参与人员列通过隐藏的 UserSelect 组件加载所有用户，将用户ID转为姓名显示"
    component:
      type: UserSelect
      spec: "隐藏的 UserSelect 组件 (style='display: none')，通过 ref 访问 userOptions"
    bindTo: participants
    service: null
    notes: |
      实现方式：
      1. 添加隐藏的 UserSelect 组件：
         <user-select ref="allUsersSelectRef" v-model="hiddenAllUsersValue" style="display: none" />
      2. getParticipantsNames(participants) 函数：
         - 解析 participants 字段（逗号分隔的用户ID字符串或数组）
         - 通过 allUsersSelectRef.value?.userOptions || [] 获取用户列表
         - 根据 userId 匹配 nickName，返回 ', ' 分隔的姓名字符串
         - 无匹配时返回 '-'
      3. 合计行（isSummaryRow）不显示参与人员（isDataRow 判断）

  list_amount_format:
    intent: "金额字段千分位格式化，工作量字段取整显示"
    component:
      type: custom
      spec: "formatAmount()、formatAmountDisplay()、formatWorkload() 三个格式化函数"
    bindTo: table
    service: null
    notes: |
      formatAmount(amount)（列表表格用）：
      - 使用 toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      - null/undefined/'' 或 NaN 返回 '0.00'
      - 金额列表头标注单位(元)，align=right

      formatAmountDisplay(amount)（弹窗 disabled input 专用）：
      - null/undefined/'' 或 NaN 返回 '-'
      - 有效值返回 '¥X,XXX.00'（带 ¥ 前缀，千分位）
      - 用于：预算金额(元)、合同金额(元)、公司确认金额(元) 的只读展示

      formatWorkload(value)（工作量列）：
      - 使用 parseInt() 取整，不显示小数
      - null/undefined/'' 返回空字符串（''）
      - 应用于：预估工作量（人天）、实际人天两列

      更新人列：
      - prop="updateByName"，后端 JOIN sys_user u_upd 取 nick_name
      - JOIN 条件需 COLLATE utf8mb4_unicode_ci：p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name

  list_column_visibility:
    intent: "支持列显隐切换，用户可按需隐藏不需要的列"
    component:
      type: RightToolbar
      props:
        columns: "columns ref 数组（26项，每项含 key/label/visible）"
    bindTo: toolbar
    service: null
    notes: |
      在 right-toolbar 组件传入 :columns="columns"：
      <right-toolbar v-model:showSearch="showSearch" :columns="columns" @queryTable="getList" />

      columns 数组 26项（key 0~25），全部默认 visible: true
      表格列使用 v-if="columns[n].visible" 控制显隐，序号列和操作列不加 v-if（始终显示）

  list_summary_row:
    intent: "列表合计行显示所有筛选数据的全量合计（跨分页），来自后端 API，直接追加到 teamRevenueList 前端"
    component:
      type: custom
      spec: "Promise.all 并行请求 + summaryRow 对象前插 teamRevenueList"
    bindTo: teamRevenueList
    service:
      endpoint: "GET /revenue/team/summary"
      source: "TeamRevenueConfirmationController.summary() → projectService.selectProjectSummary()"
      returns: "{ projectBudget, estimatedWorkload, actualWorkload, contractAmount, confirmAmount, teamConfirmAmount }"
      newApi: true
    notes: |
      实现逻辑：
      1. getList() 使用 Promise.all([listTeamRevenue(params), getTeamRevenueSummary(params)])
      2. 仅当 rows.length > 0 时插入合计行，否则 teamRevenueList = []
      3. summaryRow 直接插入 teamRevenueList 开头：teamRevenueList.value = [summaryRow, ...rows]
      4. el-table 使用 :data="teamRevenueList"（非 computed displayList）
      5. 每次更新数据后调用 buildProjectSpanMap(teamRevenueList.value) 重建行合并映射

      summaryRow 对象结构：
      {
        isSummaryRow: true,
        projectBudget:     Number(s.projectBudget     || 0).toFixed(2),
        estimatedWorkload: Number(s.estimatedWorkload || 0),      // 原始值，不取整
        actualWorkload:    Number(s.actualWorkload    || 0),       // 原始值，不toFixed
        contractAmount:    Number(s.contractAmount    || 0).toFixed(2),
        confirmAmount:     Number(s.confirmAmount     || 0).toFixed(2),
        teamConfirmAmount: Number(s.teamConfirmAmount || 0).toFixed(2),
      }
      工作量显示使用 formatWorkload() 即 parseInt()，视觉效果与取整相同

      合计行样式：
      - :row-class-name="tableRowClassName" 给合计行添加 'summary-row' CSS类
      - ::v-deep .summary-row { background-color: #f5f7fa; font-weight: bold; }
      - 数值列合计值通过 :style 内联设置加粗+蓝色（#409EFF），团队确认收入列为绿色（#67C23A）
      - 序号列显示"合计"文字（font-weight: bold）
      - 非数值列（dict-tag、文本列）使用 isDataRow(row) / v-if 过滤，合计行不显示

      效果：翻页后合计行数值不变，仅修改查询条件重新查询后才更新

  list_pagination_fixed:
    intent: "分页组件固定在页面底部，表格高度动态计算"
    component:
      type: custom
      spec: "flex 布局 + 动态表格高度计算"
    bindTo: page
    service: null
    notes: |
      容器：className="revenue-team-container", height: 100%, display: flex, flex-direction: column
      表格高度：tableHeight = windowHeight - searchHeight - toolbarHeight - paginationHeight - padding
      - searchHeight: 255px（showSearch 为 true 时，5行查询条件含按钮行）
      - toolbarHeight: 50px, paginationHeight: 50px, padding: 120px
      生命周期：
      - onMounted: calcTableHeight() + window.addEventListener('resize', calcTableHeight)
      - onUnmounted: window.removeEventListener('resize', calcTableHeight)
      - watch showSearch: 搜索框显隐时重新计算表格高度

  # ========== 新增/编辑弹窗定制 ==========
  dialog_layout:
    intent: "新增/编辑统一使用 el-dialog 弹窗，宽度960px，动态标题"
    component:
      type: el-dialog
      props:
        width: "960px"
        appendToBody: true
    bindTo: dialog
    service: null
    notes: |
      弹窗标题：:title="dialogTitle"（computed，非静态 title ref）
      dialogTitle computed：
        if (form.value.projectName) return `项目【${form.value.projectName}】收入确认管理`
        return '团队收入确认管理'

      弹窗内表单布局（label-width="120px"，el-row el-col 分列）：

      区块1：项目（全宽 span=24）
        - ProjectSelect 组件，ref="projectSelectRef"，@change="handleProjectChange"
        - v-model="form.projectId"，placeholder="请选择项目"，clearable

      区块2：预算金额 | 合同金额（各 span=12，只读）
        - 预算金额(元)：el-input :model-value="formatAmountDisplay(form.projectBudget)" disabled
        - 合同金额(元)：el-input :model-value="formatAmountDisplay(form.contractAmount)" disabled

      区块3：公司确认金额 | 确认年度（各 span=12，只读）
        - 公司确认金额(元)：el-input :model-value="formatAmountDisplay(form.confirmAmount)" disabled
        - 确认年度：el-input :model-value="form.revenueConfirmYear ? form.revenueConfirmYear + '年' : '-'" disabled

      区块4：计划参与人员 | 实际参与人员（各 span=12，纯文字展示）
        - 计划参与人员：<span class="participants-text">{{ form.participantsNames || '暂无' }}</span>
        - 实际参与人员：<span class="participants-text">暂无</span>（固定显示，无数据来源）

      区块5：参与人员工时（可折叠 .worktime-section div）
        - worktime-header（可点击，切换 worktimeExpanded）：
          - worktime-title："参与人员工时"
          - worktime-stats：participantCount 人 / 总工时 0.0 小时 / 合计 form.actualWorkload 人天
          - worktime-arrow：ArrowDown 图标，展开时旋转180度
        - worktime-body（v-show="worktimeExpanded"）：
          - <el-empty description="暂无工时记录" :image-size="60" />

      区块6：确认明细标题行（.detail-header div）
        - 左侧：<span class="detail-header-label">确认明细</span>
        - 右侧：<el-button type="primary" size="small" @click="handleAddDetail">+ 添加确认记录</el-button>

      区块7：确认明细表格（el-table :data="form.detailList"，border）
        - 序号（index，55px）
        - 部门（el-tree-select，deptTree，check-strictly，min-width=180）
        - 确认金额(元)（el-input-number，:precision=2，:min=0，controls-position=right，width=160）
        - 确认人（.confirm-user-name span，绿色文字，只读显示 scope.row.confirmUserName，width=100）
        - 备注（el-input，placeholder="如：预付款、中期款、尾款等"，min-width=150）
        - 操作（el-button link danger Delete，handleDeleteDetail(scope.$index)，width=70）

      区块8：合计金额（.total-amount-row div，右对齐，加粗）
        - 显示：合计金额：¥ {{ totalAmount }}
        - totalAmount computed = 所有 detailList[i].confirmAmount 之和，toFixed(2)

      弹窗底部按钮（dialog footer slot）：
        - 取消（默认样式） → cancel()
        - 确定（primary） → submitForm()

  project_select_hybrid:
    intent: "项目选择使用全局 ProjectSelect 组件，支持远程搜索，编辑时回显项目名称"
    component:
      type: ProjectSelect
      props:
        clearable: true
    bindTo: project_id
    service:
      endpoint: "GET /project/project/search?projectName={keyword}"
      source: "searchProjects API，listProjectByName API"
      returns: "[{ projectId, projectName }]"
      newApi: false
    notes: |
      表单中项目选择后，通过 handleProjectChange(projectId) 自动带出以下字段：
      - projectBudget（项目预算）
      - contractAmount（合同金额）
      - confirmAmount（公司确认金额）
      - revenueConfirmYear（收入确认年度）
      - projectName（项目名称，用于 dialogTitle computed）
      - participantsNames（计划参与人员姓名字符串）
      - participants（参与人员ID列表）
      - actualWorkload（实际人天，用于工时折叠面板显示）
      以上来自 GET /revenue/team/project/{projectId} 接口，需包含全部字段

      编辑时项目名称回显（handleUpdate）：
      1. 在 getTeamRevenue(projectId).then() 回调中设置 form.value 后再 open.value = true
      2. nextTick(() => {
           if (projectSelectRef.value && project.projectId && project.projectName) {
             projectSelectRef.value.projectOptions.push({ projectId, projectName })
           }
         })
      3. 必须先等 open.value = true 渲染组件后再 nextTick 注入，否则 projectSelectRef.value 为 null

  dept_tree_select_filtered:
    intent: "部门选择只显示三级及以下机构，支持树形结构选择"
    component:
      type: el-tree-select
      props:
        data: "过滤后的部门树数据（ancestors.split(',').length >= 3）"
        checkStrictly: true
        filterable: true
        clearable: true
    bindTo: dept_id
    service:
      endpoint: "GET /project/project/deptTree"
      source: "复用 ProjectController 代理接口，返回扁平列表"
      returns: "[{ deptId, deptName, ancestors, parentId, ... }]"
      newApi: false
    notes: |
      loadDeptTree() 处理逻辑：
      1. deptFlatList 保存所有部门扁平列表（用于 getDeptName 路径查找）
      2. 过滤三级及以下：dept.ancestors.split(',').length >= 3
      3. 映射 deptId→value, deptName→label，handleTree() 构建树形结构
      4. deptTree.value = builtTree（表单明细部门选择器使用）
      5. confirmDeptTree.value = [{ label: '无确认团队', value: -1, children: [] }, ...builtTree]
         （查询条件确认团队选择器使用，首项为固定虚节点）

      getDeptName(deptId) 函数（列表部门列显示路径）：
      - 从 deptFlatList 找到目标部门，解析 ancestors（过滤 '0' 和空值）
      - 从第3级开始（ancestorIds 索引2起）收集各级部门名
      - 加上当前部门名，用 '-' 连接
      - 找不到返回 '-'

  confirm_user_readonly:
    intent: "确认人默认当前登录用户，只读不可编辑"
    component:
      type: text
      spec: "明细表格中确认人列显示为带绿色样式的文本，不可编辑"
    bindTo: confirm_user_id
    service: null
    notes: |
      使用 Pinia userStore（import useUserStore from '@/store/modules/user'）：
      - userStore.id → confirmUserId（注意：是 id 不是 userId）
      - userStore.nickName → confirmUserName（绿色显示）

      添加明细时（handleAddDetail）自动填充：
      form.value.detailList.push({
        deptId: null,
        confirmAmount: 0,
        confirmUserId: userStore.id,
        confirmUserName: userStore.nickName,
        remark: ''
      })

      表格中仅显示姓名文本（.confirm-user-name span），不可编辑：
      <span class="confirm-user-name">{{ scope.row.confirmUserName }}</span>
      CSS: .confirm-user-name { color: #67c23a; font-weight: 500; }

  detail_list_management:
    intent: "明细列表的添加、删除和金额计算"
    component:
      type: custom
      spec: "el-table 显示明细列表，支持添加/删除行，computed 自动计算合计金额"
    bindTo: form
    service: null
    notes: |
      - 添加明细：handleAddDetail() 新行默认 confirmUserId=userStore.id, confirmUserName=userStore.nickName, confirmAmount=0
      - 删除明细：handleDeleteDetail(index) → splice + calculateTotalAmount()（calculateTotalAmount 为空函数兼容占位）
      - 合计金额：computed totalAmount 自动累加 detailList 中所有 confirmAmount，toFixed(2)
      - 表单提交前验证每条明细的 deptId、confirmAmount、confirmUserId 不能为空
      - 提交时仅发送：teamConfirmId, deptId, confirmAmount, confirmUserId, remark（过滤 confirmUserName）

  form_validation:
    intent: "表单提交前的前端验证"
    component:
      type: custom
      spec: "前端多层验证"
    bindTo: form
    service: null
    notes: |
      submitForm() 验证逻辑（顺序执行）：
      1. el-form validate：projectId 必填（"请选择项目"）
      2. form.value.detailList.length === 0 → msgError("请至少添加一条确认明细")
      3. 遍历每条明细：
         - !detail.deptId → msgError(`第 ${i+1} 条明细的部门不能为空`)
         - confirmAmount === null || undefined → msgError(`第 ${i+1} 条明细的确认金额不能为空`)
         - !detail.confirmUserId → msgError(`第 ${i+1} 条明细的确认人不能为空`)
      4. 校验通过后构建 submitData = { projectId, detailList: [...] }

      新增/编辑判断（无单独 mode 标志位）：
      - form.value.detailList.some(item => item.teamConfirmId) → PUT updateTeamRevenue（编辑）
      - 否则 → POST addTeamRevenue（新增）

      form 表单重置（reset()）：
      form.value = { projectId: null, projectName: null, projectBudget: null, contractAmount: null,
                     confirmAmount: null, revenueConfirmYear: null, participantsNames: null,
                     participants: null, actualWorkload: null, detailList: [] }
      worktimeExpanded.value = false
      proxy.resetForm("formRef")

  delete_operation:
    intent: "删除团队确认记录，无记录时给出友好提示"
    component:
      type: custom
      spec: "handleDelete 包含前置检查"
    bindTo: table
    service:
      endpoint: "DELETE /revenue/team/{teamConfirmIds}"
      source: "delTeamRevenue(row.teamConfirmId)"
      returns: "AjaxResult"
      newApi: false
    notes: |
      handleDelete(row) 逻辑：
      1. if (!row.teamConfirmId) → proxy.$modal.msgWarning("该项目暂无团队确认记录")，return
      2. proxy.$modal.confirm('确认删除该团队确认记录？') → delTeamRevenue(row.teamConfirmId)
      3. 成功后 msgSuccess("删除成功") + getList()

  # ========== 详情页面定制 ==========
  detail_page_layout:
    intent: "详情页面左右布局，左侧 span=14 显示完整项目信息，右侧 span=10 显示收入确认和团队明细"
    component:
      type: custom
      spec: "el-row + el-col 布局，左侧 span=14，右侧 span=10"
    bindTo: page
    service:
      endpoint: "GET /revenue/team/{projectId}"
      source: "返回项目详情和团队确认明细列表"
      returns: "{ project: Project, detailList: TeamRevenueConfirmation[] }"
      newApi: false
    notes: |
      页面顶部：el-page-header，title="团队收入确认详情"，@back="goBack"（router.back()）

      左侧（span=14）单个 el-card（shadow="never"），内含 6 个分组，均使用 section-title CSS类分隔：

      ① 项目基本信息（column=2, border）— 字段顺序：
         行业（dict-tag industry）、一级区域（getDictLabel sys_yjqy）
         二级区域（form.regionName）、立项年度（dict-tag sys_ndgl）
         项目编号（form.projectCode）、项目预算（formatAmount + '元'）
         项目名称（span=2）
         项目分类（getDictLabel sys_xmfl）、项目部门（deptPath || form.deptName）
         预估工作量（form.estimatedWorkload + '人天' 或 '-'）、实际人天（form.actualWorkload + '人天' 或 '-'）
         项目状态（getDictLabel sys_xmzt）、验收状态（dict-tag sys_yszt）
         合同金额（formatAmount + '元'）、审核状态（getDictLabel sys_spzt）
         合同状态（dict-tag sys_htzt）、合同名称（white-space:pre-line）
         收入确认状态（dict-tag sys_qrzt）、收入确认年度（form.revenueConfirmYear）
         确认金额（含税）（formatAmount + '元'）、税率（form.taxRate + '%' 或 '-'）
         税后金额（span=2，formatAmount + '元'）
         项目地址（span=2）
         项目计划（span=2，white-space:pre-line）
         项目描述（span=2，white-space:pre-line）
         审核意见（span=2）

      ② 人员配置（column=2, border）：
         项目经理、市场经理（同行）
         销售负责人（span=2）、销售联系方式（span=2）
         参与人员（span=2，form.participantsNames 直接显示字符串，非 el-tag）

      ③ 客户信息（column=2, border）：
         客户名称（span=2）
         客户联系人、客户联系方式（同行，通过 loadCustomerContactPhone 加载电话）
         商户联系人、商户联系方式（同行）

      ④ 时间规划（column=2, border）：
         启动日期、结束日期（parseTime '{y}-{m}-{d}' || '-'，同行）
         实施年度（span=2，form.reservedField1 || '-'）
         投产日期（parseTime form.productionDate || '-'）、验收日期（parseTime form.acceptanceDate || '-'）

      ⑤ 成本预算（column=2, border，两两并排，无 span=2）：
         项目费用（projectCost）、费用预算（expenseBudget）（同行）
         成本预算（costBudget）、人力费用（laborCost）（同行）
         采购成本（purchaseCost）（独行）

      ⑥ 其他信息（column=1, border）：
         备注（form.remark || '-'，white-space:pre-line）

      右侧（span=10）两个 el-card（shadow="never"）：
      1. 公司收入确认信息卡片（含状态横幅、各信息行、返回按钮）
      2. 团队收入确认明细卡片（el-table）

      CSS：.section-title { border-left: 3px solid #409EFF; font-weight: bold; ... }

  detail_data_refresh:
    intent: "详情页面支持路由参数变化自动刷新数据"
    component:
      type: custom
      spec: "onMounted + onActivated + watch(route.params.projectId) 三重机制"
    bindTo: detail.vue
    service:
      endpoint: "GET /revenue/team/{projectId}"
      source: "getTeamRevenue API"
      returns: "{ project: Project, detailList: TeamRevenueConfirmation[] }"
      newApi: false
    notes: |
      detail.vue 数据加载机制：
      - onMounted()：首次加载 loadAllUsers() + getDetail()
      - onActivated()：从 keep-alive 缓存恢复时再次调用 getDetail()
      - watch(route.params.projectId, (newId, oldId) => { if (newId && newId !== oldId) getDetail() })
      三者结合确保 keep-alive 缓存场景、路由参数变化场景均能自动刷新

      getDetail() 逻辑：
      1. getTeamRevenue(projectId) 获取数据
      2. form.value = response.data.project（含 participants 字段解析为数字数组）
      3. detailList.value = response.data.detailList || []
      4. 加载客户联系方式：loadCustomerContactPhone(customerId, customerContactId)
      5. 加载部门路径：buildDeptPath(projectDept)
      6. 延迟500ms解析参与人员姓名：selectedParticipants.value = allUsers.filter(...)

  detail_revenue_info:
    intent: "右侧上方显示公司收入确认信息（查看模式只读卡片式布局）"
    component:
      type: custom
      spec: "自定义卡片式布局：状态横幅 + info-row + amount-box + 返回按钮"
    bindTo: revenueConfirm
    service: null
    notes: |
      公司收入确认信息卡片内容（从上到下）：
      - 状态横幅（.status-banner）：从 sys_qrzt 字典 elTagType 动态映射颜色
        typeMap: success→#67c23a, warning→#e6a23c, danger→#f56c6c,
                 primary→#409eff, info/default→#909399
        文字：getDictLabel(sys_qrzt, form.revenueConfirmStatus)
      - 验收状态：dict-tag sys_yszt
      - 确认年度（Calendar图标 info-row）：form.revenueConfirmYear || '-'
      - 确认金额(含税)（amount-box，虚线红框）：¥ formatAmount(form.confirmAmount) 大字红色
      - 税后金额（info-row，蓝色加粗）：¥ formatAmount(form.afterTaxAmount)
      - 税率（info-row）：form.taxRate + '%' 或 '-'
      - el-divider
      - 确认人（User图标 info-row）：form.companyRevenueConfirmedBy
      - 确认时间（Clock图标 info-row）：parseTime(form.companyRevenueConfirmedTime)
      - 返回列表按钮（default，全宽）→ goBack()

      useDict 依赖（9个，含industry）：
      industry, sys_yjqy, sys_xmfl, sys_spzt, sys_yszt, sys_qrzt, sys_ndgl, sys_xmzt, sys_htzt

  detail_team_list:
    intent: "右侧下方显示团队收入确认明细列表"
    component:
      type: custom
      spec: "el-table 显示明细，包含部门、确认金额、确认时间、确认人、备注"
    bindTo: detailList
    service: null
    notes: |
      el-table :data="detailList"，border，size="small"
      列（5列）：
      - 部门名称（prop=deptName, min-width=120, show-overflow-tooltip）
      - 确认金额（prop=confirmAmount, min-width=110, align=right, formatAmount() + ' 元'）
      - 确认时间（prop=confirmTime, min-width=100, parseTime '{y}-{m}-{d}'）
      - 确认人（prop=confirmUserName, min-width=80, show-overflow-tooltip）
      - 备注（prop=remark, min-width=100, show-overflow-tooltip）
      empty-text="暂无团队收入确认数据"
      额外 v-if="detailList.length === 0" 的文字提示 div（兼容提示）

      detailList 来源：
      - getDetail() 中 detailList.value = response.data.detailList || []

  # ========== 后端接口定制 ==========
  backend_list_query:
    intent: "列表查询主表从项目表查询，与公司收入确认逻辑一致"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /revenue/team/list"
      source: "Controller 调用 IProjectService.selectProjectList()"
      returns: "项目列表（TableDataInfo）"
      newApi: false
    notes: "确保数据源与公司收入确认统一"

  backend_detail_query:
    intent: "详情接口返回项目信息+团队明细列表"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /revenue/team/{projectId}"
      source: |
        Controller.getInfo():
        1. 调用 IProjectService.selectProjectByProjectId() 获取项目详情
        2. 调用 ITeamRevenueConfirmationService.selectTeamRevenueConfirmationList() 获取团队明细
        3. 返回 Map{ project, detailList }
      returns: "{ project: Project, detailList: TeamRevenueConfirmation[] }"
      newApi: false
    notes: "一次接口调用返回详情页面所需的所有数据"

  backend_batch_save:
    intent: "新增/编辑支持批量保存明细"
    component: null
    bindTo: backend
    service:
      endpoint: "POST /revenue/team 和 PUT /revenue/team"
      source: |
        Controller.add/edit():
        1. 接收 Map 参数：{ projectId, detailList: [{ teamConfirmId?, deptId, confirmAmount, confirmUserId, remark }] }
        2. 验证必填字段不为空
        3. 遍历 detailList，为每条明细设置 projectId 和 confirmTime（当前时间，后端自动设置）
        4. 调用 Service.insertTeamRevenueConfirmation() 逐条保存
        5. 编辑时先删除旧明细，再保存新明细（删除后新增策略）
      returns: "AjaxResult"
      newApi: false
    notes: |
      后端自动设置 confirmTime = new Date()，解决数据库字段无默认值问题
      前端提交时过滤 confirmUserName（后端不需要此字段）
      新增/编辑由前端通过 detailList.some(item => item.teamConfirmId) 判断，有 teamConfirmId 则调 PUT

  backend_data_validation:
    intent: "后端数据验证和错误处理"
    component: null
    bindTo: backend
    service: null
    notes: |
      验证规则：
      - projectId 不能为空
      - detailList 不能为空，至少一条明细
      - 每条明细的 deptId、confirmAmount、confirmUserId 不能为空
      - 使用 Map.get() 前先判空，避免 NullPointerException
      - 返回友好的中文错误提示

  backend_project_info_query:
    intent: "新增页面选择项目后自动带出项目相关字段"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /revenue/team/project/{projectId}"
      source: |
        Controller.getProjectInfo():
        1. 调用 IProjectService.selectProjectByProjectId() 获取项目
        2. 返回包含以下字段的数据对象
      returns: |
        { projectId, projectName, projectBudget, contractAmount, confirmAmount,
          revenueConfirmYear, participantsNames, participants, actualWorkload }
      newApi: false
    notes: |
      用于新增/编辑表单中，用户选择项目后自动填充以下字段：
      - projectBudget（项目预算，弹窗只读展示）
      - contractAmount（合同金额，弹窗只读展示）
      - confirmAmount（公司确认金额，弹窗只读展示）
      - revenueConfirmYear（收入确认年度，弹窗只读展示 + '年' 拼接）
      - projectName（项目名称，用于 dialogTitle computed 动态显示）
      - participantsNames（计划参与人员姓名字符串，弹窗"计划参与人员"行展示）
      - participants（参与人员ID，用于 participantCount computed 计算人数）
      - actualWorkload（实际人天，工时折叠面板"合计人天"展示）
      权限：@ss.hasPermi('revenue:team:query')

  backend_summary_query:
    intent: "全量合计接口，不分页，返回所有筛选数据的数值汇总"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /revenue/team/summary"
      source: |
        TeamRevenueConfirmationController.summary():
        1. 接收 Project 查询参数（与 list 接口相同参数，含 confirmDeptId）
        2. 调用 projectService.selectProjectSummary(project)
           → projectMapper.selectProjectSummary()，SQL 不分页，返回 Map
        3. 返回 AjaxResult.success(map)
      returns: "{ projectBudget, estimatedWorkload, actualWorkload, contractAmount, confirmAmount, teamConfirmAmount }"
      newApi: true
    notes: |
      权限：@ss.hasPermi('revenue:team:list')
      与列表接口使用相同查询参数（含 confirmDeptId 过滤）
      selectProjectSummary SQL 中包含 tc LEFT JOIN 聚合 pm_team_revenue_confirmation，
      返回 COALESCE(SUM(tc.confirm_amount), 0) AS team_confirm_amount

  backend_data_association:
    intent: "列表查询关联查询部门名称、项目经理名称、更新人昵称、合同信息和团队确认汇总"
    component: null
    bindTo: backend
    service:
      endpoint: "MyBatis XML 配置 selectProjectList"
      source: |
        ProjectMapper.xml selectProjectList 中的 JOIN：
        1. LEFT JOIN pm_secondary_region sr ON p.region_id = sr.region_id
        2. LEFT JOIN (ca 子查询) ON p.project_id = ca.project_id
           → SUM contract_amount, MAX contract_status, GROUP_CONCAT contract_name(\n分隔)
        3. LEFT JOIN (tc 子查询) ON p.project_id = tc.project_id
           → GROUP_CONCAT DISTINCT dept_name（顿号分隔）AS team_dept_name
           → SUM confirm_amount AS team_confirm_amount
           → FROM pm_team_revenue_confirmation t JOIN sys_dept d WHERE t.del_flag = '0'
        4. LEFT JOIN sys_user u_upd ON p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name
        5. LEFT JOIN sys_user u1 ON p.project_manager_id = u1.user_id

        Project 实体新增非DB关联字段：
        - teamDeptName（String）：确认团队部门名称（column="team_dept_name"）
        - teamConfirmAmount（BigDecimal）：团队确认收入汇总（column="team_confirm_amount"）
        - confirmDeptId（Long）：查询条件字段（-1=无确认团队，正常值=指定部门）
        - projectManagerName（String）：项目经理姓名（u1.nick_name，列表直接展示，无需前端 getUserName）

        resultMap 新增映射：
        <result property="teamDeptName" column="team_dept_name"/>
        <result property="teamConfirmAmount" column="team_confirm_amount"/>
        <result property="projectManagerName" column="project_manager_name"/>

        WHERE 新增过滤（confirmDeptId）：
        confirmDeptId == -1 → AND NOT EXISTS (SELECT 1 FROM pm_team_revenue_confirmation tc2
                               WHERE tc2.project_id = p.project_id AND tc2.del_flag = '0')
        confirmDeptId 正常值 → AND EXISTS (... AND tc2.dept_id = #{confirmDeptId} ...)

        selectProjectSummary 同步：加入 tc LEFT JOIN，SELECT 增加 team_confirm_amount，
        WHERE 同步增加 confirmDeptId 过滤
      returns: "Project（包含 teamDeptName 和 teamConfirmAmount 扩展字段）"
      newApi: false
    notes: |
      TeamRevenueConfirmationMapper.xml 中明细查询：
      LEFT JOIN sys_dept d ON t.dept_id = d.dept_id
      LEFT JOIN sys_user u ON t.confirm_user_id = u.user_id
      查询字段：d.dept_name as dept_name, u.nick_name as confirm_user_name
      排序：ORDER BY COALESCE(t.update_time, t.create_time) DESC（注意使用表别名 t）
      实体类中 deptName 和 confirmUserName 扩展字段用于显示

# ============================
# 实现总结
# ============================
implementation_summary:
  description: "团队收入确认功能完整实现，支持主从表管理，与公司收入确认数据一致"

  key_features:
    - "列表查询主表从项目表查询，与公司收入确认逻辑一致"
    - "查询条件共15个，5行布局（第4行3条件+第5行独立按钮行），label-width=120px"
    - "项目名称改为 el-select remote 模式，每次展开重新加载全量（无 projectSelectLoaded 守卫）"
    - "确认团队使用 el-tree-select（confirmDeptTree），首项为'无确认团队'虚节点（value=-1）"
    - "收入确认状态使用 sys_qrzt 字典（非 sys_srqrzt）"
    - "按钮行（第5行）包含：查询、重置、导出、新增 四个按钮"
    - "列表表格启用 border，配合 right-toolbar :columns 支持显隐列，共28列（序号+26可控+操作）"
    - "列表支持行合并（span-method）：同一项目多条明细时，前16列（序号+columns[0~14]）自动合并"
    - "项目经理列直接显示后端关联的 projectManagerName，无需前端 getUserName 转换"
    - "确认团队列字段名为 teamDeptName（非 teamConfirmDepts）"
    - "合计行数据来自后端 GET /revenue/team/summary，直接前插 teamRevenueList（无 displayList computed）"
    - "合计行 estimatedWorkload/actualWorkload 存储原始值（无 Math.round/toFixed），formatWorkload() 显示时 parseInt"
    - "formatAmount 无效值返回 '0.00'（列表），formatAmountDisplay 无效值返回 '-'（弹窗只读 input）"
    - "tableHeight 动态计算，searchHeight=255px（5行查询条件含按钮行）"
    - "弹窗标题使用 dialogTitle computed：有项目名时 '项目【名称】收入确认管理'"
    - "弹窗新增"计划参与人员|实际参与人员"纯文字展示行和"参与人员工时"折叠面板"
    - "getProjectInfo 接口返回额外字段：contractAmount, participantsNames, participants, actualWorkload"
    - "删除操作：若 row.teamConfirmId 不存在，弹出 msgWarning 提示不执行删除"
    - "详情页左14右10布局，左侧单卡片+6个 section-title 分组（与公司收入确认样式一致）"
    - "详情页参与人员直接显示 form.participantsNames 字符串（非 el-tag）"
    - "详情页收入确认状态字典使用 sys_qrzt，状态横幅颜色从 elTagType 动态读取"
    - "详情页时间规划含'实施年度'（form.reservedField1）和'投产日期'（无'简称'字段）"
    - "详情数据刷新：onMounted + onActivated + watch(route.params.projectId) 三重机制"

  technical_highlights:
    - "Composition API（setup script）+ Vue 3 生命周期钩子"
    - "Pinia userStore.id（注意不是 userId）和 userStore.nickName"
    - "行合并：PROJECT_MERGE_COLS Set + buildProjectSpanMap() + tableSpanMethod() + :span-method"
    - "确认团队筛选：-1 特殊值 → SQL NOT EXISTS，正常值 → SQL EXISTS 子查询"
    - "Promise.all 并行请求列表和合计，减少串行等待时间"
    - "合计行前插 teamRevenueList，buildProjectSpanMap 在每次 getList 后重建映射"
    - "right-toolbar :columns 显隐列：columns[n].visible 对应 el-table-column v-if"
    - "tc 子查询：GROUP_CONCAT DISTINCT dept_name → team_dept_name（顿号分隔）"
    - "合计行标识 isSummaryRow: true；isDataRow(row) 辅助函数统一判断"
    - "隐藏 UserSelect 通过 allUsersSelectRef.value?.userOptions 获取用户列表"
    - "编辑回显：getTeamRevenue 回调内先 open=true → nextTick → projectSelectRef.value.projectOptions.push()"
    - "详情部门路径：buildDeptPath(deptId) 解析 ancestors，三级及以下，-连接"
    - "详情客户联系方式：loadCustomerContactPhone(customerId, contactId) 异步加载"
    - "详情参与人员：setTimeout(500ms) 等 allUsers 加载完成后过滤姓名"


# ============================
# 公司收入确认管理配置
# ============================
basicInfo:
  pagePath: /revenue/company/index.vue
  pageComment: 公司收入确认管理页面
  functionAuthor: ruoyi
  remark: ""

# ============================
# Tab 2: 字段信息
# ============================
columns:
  # === 主键字段 ===
  project_id:
    columnComment: 项目ID
    columnType: bigint
    javaType: Long
    javaField: projectId
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  # === 查询条件字段 ===
  project_name:
    columnComment: 项目名称
    columnType: varchar(200)
    javaType: String
    javaField: projectName
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: LIKE
    isRequired: false
    htmlType: input
    dictType: ""

  project_dept:
    columnComment: 项目部门
    columnType: varchar(100)
    javaType: String
    javaField: projectDept
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: treeselect
    dictType: ""

  revenue_confirm_year:
    columnComment: 收入确认年度
    columnType: varchar(20)
    javaType: String
    javaField: revenueConfirmYear
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_ndgl"

  project_category:
    columnComment: 项目分类
    columnType: varchar(50)
    javaType: String
    javaField: projectCategory
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_xmfl"

  region:
    columnComment: 一级区域
    columnType: varchar(50)
    javaType: String
    javaField: region
    isInsert: false
    isEdit: false
    isList: false
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_yjqy"

  region_id:
    columnComment: 二级区域ID
    columnType: bigint
    javaType: Long
    javaField: regionId
    isInsert: false
    isEdit: false
    isList: false
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: ""

  region_name:
    columnComment: 二级区域名称（关联字段）
    columnType: varchar(100)
    javaType: String
    javaField: regionName
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: LIKE
    isRequired: false
    htmlType: input
    dictType: ""

  project_manager_id:
    columnComment: 项目经理ID
    columnType: bigint
    javaType: Long
    javaField: projectManagerId
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: ""

  market_manager_id:
    columnComment: 市场经理ID
    columnType: bigint
    javaType: Long
    javaField: marketManagerId
    isInsert: false
    isEdit: false
    isList: false
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: ""

  established_year:
    columnComment: 立项年度
    columnType: int
    javaType: Integer
    javaField: establishedYear
    isInsert: false
    isEdit: false
    isList: false
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_ndgl"

  project_stage:
    columnComment: 项目阶段
    columnType: varchar(50)
    javaType: String
    javaField: projectStage
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_xmjd"

  approval_status:
    columnComment: 审核状态
    columnType: varchar(20)
    javaType: String
    javaField: approvalStatus
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_spzt"

  acceptance_status:
    columnComment: 验收状态
    columnType: varchar(50)
    javaType: String
    javaField: acceptanceStatus
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_yszt"

  revenue_confirm_status:
    columnComment: 收入确认状态
    columnType: varchar(20)
    javaType: String
    javaField: revenueConfirmStatus
    isInsert: false
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_srqrzt"

  # === 列表显示字段（金额和工作量） ===
  confirm_amount:
    columnComment: 确认金额（含税）
    columnType: decimal(15,2)
    javaType: BigDecimal
    javaField: confirmAmount
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  after_tax_amount:
    columnComment: 税后金额
    columnType: decimal(15,2)
    javaType: BigDecimal
    javaField: afterTaxAmount
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  project_budget:
    columnComment: 项目预算（万元）
    columnType: decimal(15,2)
    javaType: BigDecimal
    javaField: projectBudget
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  estimated_workload:
    columnComment: 预估工作量（人天）
    columnType: decimal(10,2)
    javaType: BigDecimal
    javaField: estimatedWorkload
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  actual_workload:
    columnComment: 实际人天
    columnType: decimal(10,2)
    javaType: BigDecimal
    javaField: actualWorkload
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  contract_amount:
    columnComment: 合同金额（关联字段）
    columnType: decimal(15,2)
    javaType: BigDecimal
    javaField: contractAmount
    isInsert: false
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: review
  functionName: 公司收入确认
  parentMenuId: null

# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # ========== 列表页面定制 ==========
  list_query_conditions:
    intent: "支持13个查询条件的多维度筛选"
    component:
      type: custom
      spec: "查询表单使用通用选择器组件"
    bindTo: page
    service:
      endpoint: "GET /project/project/revenue/list"
      source: "ProjectController 调用 IProjectService.selectProjectList()"
      returns: "TableDataInfo<Project>"
      newApi: false
    notes: |
      查询条件字段（13个）：
      1. 项目名称 - el-autocomplete, v-model="queryParams.projectName", LIKE 模糊查询
      2. 项目部门 - el-tree-select, v-model="queryParams.projectDept", 三级及以下部门
      3. 收入确认年度 - dict-select, dict-type="sys_ndgl"
      4. 项目分类 - dict-select, dict-type="sys_xmfl"
      5. 一级区域 - dict-select, dict-type="sys_yjqy", @change 联动二级区域
      6. 二级区域 - secondary-region-select, :region-dict-value="queryParams.region"
      7. 项目经理 - user-select, post-code="pm"
      8. 市场经理 - user-select, post-code="scjl"
      9. 立项年度 - dict-select, dict-type="sys_ndgl"
      10. 项目阶段 - dict-select, dict-type="sys_xmjd"
      11. 审核状态 - dict-select, dict-type="sys_spzt"
      12. 验收状态 - dict-select, dict-type="sys_yszt"
      13. 收入确认状态 - dict-select, dict-type="sys_srqrzt"

  list_table_columns:
    intent: "列表表格与项目管理列表保持一致，共25列（24数据列+1操作列）"
    component:
      type: custom
      spec: "表格列与项目管理列表对齐，额外保留收入确认特有字段"
    bindTo: table
    service: null
    notes: |
      列顺序（25列）：
      1. 序号（width=55, center）
      2. 项目名称（min-width=220, align=left/header=center, word-break 自动换行）
      3. 项目部门（min-width=120, center, getDeptName() 显示完整路径, show-overflow-tooltip）
      4. 项目经理（min-width=100, center, getUserName(id, projectManagerSelectRef?.userOptions)）
      5. 项目分类（min-width=120, center, dict-tag :options="sys_xmfl"）
      6. 二级区域（min-width=120, center, scope.row.regionName || '-', show-overflow-tooltip）
      7. 项目预算(元)（min-width=120, align=right, formatAmount()）
      8. 预估工作量（min-width=100, center, 原始值显示）
      9. 实际人天（min-width=100, center, 原始值显示）
      10. 合同金额(元)（min-width=120, align=right, formatAmount()）
      11. 收入确认年度（min-width=120, center, plain column）
      12. 合同状态（min-width=100, center, dict-tag :options="sys_htzt"）
      13. 收入确认状态（min-width=120, center, dict-tag :options="sys_srqrzt"）
      14. 确认金额(含税)（min-width=120, align=right, formatAmount()）
      15. 税后金额（min-width=120, align=right, formatAmount()）
      16. 参与人员（min-width=150, center, getParticipantsNames(), show-overflow-tooltip）
      17. 启动日期（width=100, center）
      18. 结束日期（width=100, center）
      19. 验收日期（width=100, center）
      20. 审核状态（min-width=100, center, dict-tag :options="sys_spzt"）
      21. 项目阶段（min-width=100, center, dict-tag :options="sys_xmjd"）
      22. 验收状态（min-width=100, center, dict-tag :options="sys_yszt"）
      23. 更新人（min-width=100, center, prop="updateByName", plain column）
      24. 更新时间（width=160, center）
      25. 操作（width=150, center, fixed=right）

      操作列按钮逻辑：
      - revenueConfirmStatus === '0' 或未设置：显示"收入确认"按钮（type=success, icon=Money, 权限 revenue:company:edit）
      - revenueConfirmStatus === '1'：显示"收入查看"按钮（type=primary, icon=View, 权限 revenue:company:view）

      useDict 依赖（8个）：
      sys_xmfl, sys_yjqy, sys_xmjd, sys_spzt, sys_yszt, sys_srqrzt, sys_ndgl, sys_htzt

  list_participants_display:
    intent: "参与人员列通过隐藏的 UserSelect 组件加载所有用户，将用户ID转为姓名显示"
    component:
      type: UserSelect
      spec: "隐藏的 UserSelect 组件 (style='display: none')，通过 ref 访问 userOptions"
    bindTo: participants
    service: null
    notes: |
      实现方式：
      1. 隐藏的 UserSelect 组件：
         <user-select ref="allUsersSelectRef" v-model="hiddenAllUsersValue" style="display: none" />
      2. getParticipantsNames(participants) 函数：
         - 解析 participants 字段（逗号分隔的用户ID字符串或数组）
         - 通过 allUsersSelectRef.value?.userOptions || [] 获取用户列表（注意：不需要额外 .value）
         - 根据 userId 匹配 nickName，返回逗号分隔的姓名字符串
         - 无匹配时返回 '-'
      3. 合计行（isSummaryRow）不显示参与人员

  list_amount_format:
    intent: "金额字段千分位格式化，金额列表头标注单位(元)并右对齐"
    component:
      type: custom
      spec: "formatAmount() 格式化函数"
    bindTo: table
    service: null
    notes: |
      formatAmount(amount)：
      - 使用 toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      - null/undefined/'' 返回空字符串
      - 应用于：项目预算(元)、合同金额(元)、确认金额(含税)、税后金额
      - 合计行金额同样使用 formatAmount 格式化

      工作量列（预估工作量、实际人天）：
      - 直接显示原始值，无 formatWorkload 函数（与团队收入确认不同）

      更新人列：
      - prop="updateByName"，后端 LEFT JOIN sys_user u_upd 取 nick_name
      - JOIN 条件需 COLLATE utf8mb4_unicode_ci：p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name

  list_summary_row:
    intent: "合计行显示在表头和第一行数据之间，统计6个数值字段"
    component:
      type: custom
      spec: "calculateSummary() 函数 + 数组前插方式实现"
    bindTo: table
    service: null
    notes: |
      实现方式（非 computed，非 Element Plus show-summary）：
      1. getList() 中加载数据后调用 calculateSummary(list)
      2. calculateSummary 遍历列表累加6个数值字段，返回 { isSummaryRow: true, ...合计值 }
      3. 所有数值字段使用 Number(x || 0).toFixed(2) 格式化（包括值为0时也保留）
      4. 合计行插入列表开头：revenueList.value = [summary, ...list]

      合计字段（6个）：
      - projectBudget（项目预算）
      - estimatedWorkload（预估工作量）
      - actualWorkload（实际人天）
      - contractAmount（合同金额）
      - confirmAmount（确认金额含税）
      - afterTaxAmount（税后金额）

      合计行样式：
      - 序号列显示"合计"（加粗）
      - 所有数值列加粗显示
      - 字典列/用户名列/操作列不显示（v-if="!scope.row.isSummaryRow"）
      - :row-class-name="tableRowClassName" 给合计行添加样式类

  list_pagination_fixed:
    intent: "分页组件固定在页面底部，表格高度动态计算"
    component:
      type: custom
      spec: "flex 布局 + 动态表格高度计算"
    bindTo: page
    service: null
    notes: |
      容器：className="revenue-company-container", height: 100%, display: flex, flex-direction: column
      表格：:height="tableHeight"（动态计算）
      calcTableHeight() 使用 nextTick 计算：
        tableHeight = windowHeight - searchHeight - toolbarHeight - paginationHeight - padding
        - searchHeight: 200px（showSearch 为 true 时，查询条件多）
        - toolbarHeight: 50px, paginationHeight: 50px, padding: 120px
      生命周期：
      - onMounted: calcTableHeight() + window.addEventListener('resize', calcTableHeight)
      - onUnmounted: window.removeEventListener('resize', calcTableHeight)
      - watch showSearch: 搜索框显隐时重新计算表格高度

  # ========== 查询条件组件定制 ==========
  dict_select_components:
    intent: "字典选择器统一使用全局注册的 DictSelect 组件"
    component:
      type: DictSelect
      props:
        clearable: true
        placeholder: "请选择"
    bindTo: ["revenue_confirm_year", "project_category", "region", "established_year", "project_stage", "approval_status", "acceptance_status", "revenue_confirm_status"]
    service: null
    notes: |
      组件位置：ruoyi-ui/src/components/DictSelect/index.vue（全局注册于 main.ts）
      功能：自动通过 Pinia store 加载并缓存字典数据
      使用的字典类型：
      - sys_ndgl: 年度管理（收入确认年度、立项年度共用）
      - sys_xmfl: 项目分类
      - sys_yjqy: 一级区域
      - sys_xmjd: 项目阶段
      - sys_spzt: 审批状态
      - sys_yszt: 验收状态
      - sys_srqrzt: 收入确认状态（2个值：0=未确认, 1=已确认）

  user_select_components:
    intent: "用户选择器统一使用 UserSelect 组件，支持按岗位筛选和表格中用户名显示"
    component:
      type: UserSelect
      props:
        clearable: true
        filterable: true
    bindTo: ["project_manager_id", "market_manager_id"]
    service:
      endpoint: "GET /project/project/users?postCode={pm|scjl}"
      source: "复用 ProjectService.getUsersByPost"
      returns: "[{ userId, nickName, userName, phonenumber, ... }]"
      newApi: false
    notes: |
      组件位置：ruoyi-ui/src/components/UserSelect/index.vue（全局注册于 main.ts）
      岗位代码：pm=项目经理, scjl=市场经理, xsfzr=销售负责人

      查询条件用法：
      <user-select v-model="queryParams.projectManagerId" post-code="pm" />

      表格用户名显示（通过隐藏组件提供数据源）：
      <user-select ref="projectManagerSelectRef" v-model="hiddenValue" post-code="pm" style="display: none" />
      getUserName(scope.row.projectManagerId, projectManagerSelectRef?.userOptions)

  region_cascade_select:
    intent: "一级区域与二级区域联动选择"
    component:
      type: "DictSelect + SecondaryRegionSelect"
    bindTo: ["region", "region_id"]
    service:
      endpoint: "GET /project/project/secondaryRegions?regionDictValue={region}"
      source: "复用 ProjectService.getSecondaryRegions"
      returns: "[{ regionId, regionCode, regionName, regionDictValue }]"
      newApi: false
    notes: |
      一级区域（DictSelect）：
      - dict-type="sys_yjqy", @change 联动触发二级区域加载
      二级区域（SecondaryRegionSelect）：
      - :region-dict-value="queryParams.region"
      - 一级区域变化时自动清空并重新加载
      - 未选一级区域时自动禁用

  dept_path_display:
    intent: "项目部门在列表中显示完整层级路径（从第三级开始）"
    component:
      type: custom
      spec: "getDeptName() 辅助函数"
    bindTo: project_dept
    service:
      endpoint: "GET /system/dept/list"
      source: "复用 SysDeptService.selectDeptList"
      returns: "[{ deptId, deptName, ancestors, ... }]"
      newApi: false
    notes: |
      实现逻辑：
      1. onMounted 调用 loadDeptTree() 加载部门扁平列表到 deptOptions
      2. getDeptName(deptId)：根据 deptId 找到部门，解析 ancestors 字段（格式 "0,100,101,102"）
      3. 从第三级开始（ancestors.split(',') 索引2起），查找各级部门名称
      4. 用"-"连接：如"事业部-开发部-研发组"
      5. 合计行不显示部门

  # ========== 详情页面定制 ==========
  detail_page_layout:
    intent: "详情页面左右布局，左侧显示完整项目信息，右侧显示收入确认表单"
    component:
      type: custom
      spec: "el-row + el-col 布局，左侧 span=14，右侧 span=10"
    bindTo: page
    service:
      endpoint: "GET /project/project/revenue/{projectId}"
      source: "ProjectController，返回项目详情含收入确认字段"
      returns: "Project 对象（含 confirmAmount, taxRate, afterTaxAmount, revenueConfirmYear, revenueConfirmStatus 等）"
      newApi: false
    notes: |
      页面顶部：el-page-header，动态 title（"收入确认" 或 "收入查看"），@back 返回列表

      左侧（span=14）5个 el-descriptions 卡片：
      1. 基本信息（column=2, border）：
         项目名称、项目编码、项目部门、项目分类、预估工作量、实际工作量、
         项目阶段、验收状态、一级区域、二级区域、项目地址(span=2)、项目计划(span=2)
      2. 人员配置（column=2, border）：
         项目经理、市场经理、销售负责人、销售联系方式、参与人员(span=2)
      3. 客户信息（column=2, border）：
         客户名称、客户联系人、客户联系方式、商户联系人、商户联系方式
      4. 时间规划（column=2, border）：
         启动日期、结束日期、上线日期、验收日期（均用 parseTime 格式化）
      5. 成本预算（column=2, border）：
         项目预算、项目费用、成本预算、人工成本、采购成本（均显示"元"单位）

      右侧（span=10）收入确认表单卡片：
      - 详见 detail_revenue_form 定制

      进入方式：
      - 列表"收入确认"按钮 → router.push({ path: '/revenue/company/detail/' + projectId, query: { mode: 'edit' } })
      - 列表"收入查看"按钮 → router.push({ path: '/revenue/company/detail/' + projectId, query: { mode: 'view' } })

      注意：详情页面无 onActivated 或 watch(route.params) 数据刷新机制，仅在初始化时加载一次数据

  detail_revenue_form:
    intent: "右侧收入确认表单，支持编辑和只读两种模式"
    component:
      type: custom
      spec: "el-form 表单，5个字段，编辑/查看模式切换"
    bindTo: revenueConfirm
    service:
      endpoint: "PUT /project/project/revenue"
      source: "ProjectController.updateRevenue()"
      returns: "AjaxResult"
      newApi: false
    notes: |
      表单字段（label-width=140px）：
      1. 收入确认状态 - el-select, always disabled, 显示 sys_srqrzt 字典选项
      2. 收入确认年度 - el-select（required），sys_ndgl 字典选项，查看模式 disabled
      3. 确认金额（含税）- el-input type="number"（required），@blur="formatConfirmAmount"（保留2位小数，非负），
         template #append 显示"元"，查看模式 disabled
      4. 税率 - el-input type="number"（required），@blur="formatTaxRate"（保留2位小数，限制0-100），
         template #append 显示"%"，查看模式 disabled
      5. 税后金额（不含税）- el-input, always disabled, template #append 显示"元"，自动计算

      税后金额自动计算（watch 监听 confirmAmount 和 taxRate）：
      afterTaxAmount = confirmAmount / (1 + taxRate / 100)，保留2位小数

      默认税率初始化（initTaxRate）：
      - 项目分类='1'（软件开发类）→ 税率 6%
      - 项目分类='2'（硬件销售类）→ 税率 13%

      提交逻辑（submitForm）：
      - 设置 revenueConfirmStatus = '1'（已确认）
      - 调用 updateRevenue(form.value)

      按钮：
      - 编辑模式：保存 + 取消（返回列表）
      - 查看模式：编辑（切换到编辑模式）+ 关闭（返回列表）

  # ========== 后端接口定制 ==========
  backend_list_query:
    intent: "列表查询基于项目表，关联合同和区域信息"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /project/project/revenue/list"
      source: "ProjectController 调用 IProjectService.selectProjectList()"
      returns: "TableDataInfo<Project>"
      newApi: false
    notes: |
      重要：收入确认的后端接口在 ProjectController（/project/project/revenue/**），
      而非 ProjectReviewController（/project/review/**，用于项目审核）

      SQL 查询（ProjectMapper.xml selectProjectList）：
      基础表：pm_project p
      关联表：
      - LEFT JOIN pm_secondary_region sr ON p.region_id = sr.region_id → sr.region_name
      - LEFT JOIN pm_project_contract_rel pcr ON p.project_id = pcr.project_id
        AND pcr.del_flag = '0' AND pcr.rel_status = '有效'
      - LEFT JOIN pm_contract c ON pcr.contract_id = c.contract_id → c.contract_amount, c.contract_status
      - LEFT JOIN sys_user u_upd ON p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name
        → u_upd.nick_name AS update_by_name

      数据权限：@DataScope(deptAlias='d', userAlias='u1')
      排序：ORDER BY COALESCE(p.update_time, p.create_time) DESC

      收入确认特有查询条件：
      - p.revenue_confirm_status = #{revenueConfirmStatus}
      - p.revenue_confirm_year = #{revenueConfirmYear}

  backend_detail_and_update:
    intent: "详情查询和收入确认更新接口"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /project/project/revenue/{projectId} 和 PUT /project/project/revenue"
      source: "ProjectController"
      returns: "AjaxResult<Project>"
      newApi: false
    notes: |
      详情查询：
      - 使用 selectProjectByProjectId，关联查询部门名称、经理名称、客户信息等
      - 额外 JOIN：sys_dept, sys_user(项目经理/市场经理/销售负责人), pm_customer, pm_customer_contact

      收入确认更新：
      - 更新字段：confirmAmount, taxRate, afterTaxAmount, revenueConfirmYear, revenueConfirmStatus
      - 后端也独立计算 afterTaxAmount（不依赖前端传值）
      - 设置 companyRevenueConfirmedBy 和 companyRevenueConfirmedTime

      权限：
      - 列表查询：revenue:company:list 或 project:review:query
      - 详情查看：revenue:company:view
      - 确认编辑：revenue:company:edit

# ============================
# 字典依赖
# ============================
dictionaries:
  sys_ndgl:
    name: 年度管理
    usage: 收入确认年度、立项年度

  sys_xmfl:
    name: 项目分类
    values: [软件开发类, 硬件销售类, 系统集成类, 开发人力外包, 运维人力外包, 测试人力外包]

  sys_yjqy:
    name: 一级区域
    usage: 区域筛选（联动二级区域）

  sys_xmjd:
    name: 项目阶段

  sys_spzt:
    name: 审批状态
    values: { 0: 待审核, 1: 已通过, 2: 已拒绝 }

  sys_yszt:
    name: 验收状态

  sys_htzt:
    name: 合同状态
    values: [未签署, 已签署]

  sys_srqrzt:
    name: 收入确认状态
    values: { 0: 未确认, 1: 已确认 }

# ============================
# 实现总结
# ============================
implementation_summary:
  description: "公司收入确认功能，基于项目表视图查询，支持多维度筛选和收入确认操作"

  key_features:
    - "基于 pm_project 表查询，关联合同金额和区域信息"
    - "列表25列（24数据列+1操作列），与项目管理列表保持一致"
    - "支持13个查询条件的多维度筛选"
    - "合计行显示在表头和第一行数据之间，统计6个数值字段"
    - "金额字段千分位格式化（formatAmount），表头标注(元)并右对齐"
    - "工作量列直接显示原始值（无 formatWorkload 函数）"
    - "更新人列显示中文昵称（prop=updateByName，后端 JOIN sys_user）"
    - "参与人员通过隐藏 UserSelect 组件加载用户列表，getParticipantsNames() 转换为姓名"
    - "项目经理通过隐藏 UserSelect 组件 + getUserName() 显示昵称"
    - "项目部门通过 getDeptName() 显示完整层级路径（第三级起，-连接）"
    - "一级区域联动二级区域（DictSelect + SecondaryRegionSelect）"
    - "使用通用选择器组件（DictSelect、UserSelect、SecondaryRegionSelect）减少重复代码"
    - "详情页面左14右10布局：左侧5个项目信息卡片，右侧收入确认表单"
    - "收入确认表单：确认金额+税率→自动计算税后金额，默认税率按项目分类初始化"
    - "收入确认状态字典 sys_srqrzt：未确认(0)、已确认(1)"
    - "操作按钮动态显示：未确认→'收入确认'，已确认→'收入查看'"
    - "分页组件固定底部，表格高度动态计算"

  technical_highlights:
    - "Composition API（setup script）"
    - "合计行：calculateSummary() 函数 + 数组前插（非 computed，非 show-summary）"
    - "合计行零值处理：Number(x || 0).toFixed(2)，确保值为0也正确格式化"
    - "隐藏 UserSelect 通过 ref?.userOptions 获取用户列表（不需要额外 .value）"
    - "后端 JOIN sys_user 需 COLLATE utf8mb4_unicode_ci 解决排序规则不一致"
    - "详情表单三个输入框格式统一：el-input type='number' + template #append 显示单位"
    - "税后金额 watch 自动计算：afterTaxAmount = confirmAmount / (1 + taxRate / 100)"
    - "数据权限：后端使用 @DataScope 注解控制部门数据可见性"
    - "收入确认接口在 ProjectController（/project/project/revenue/**），非 ProjectReviewController"

  related_files:
    frontend:
      - "ruoyi-ui/src/views/revenue/company/index.vue"
      - "ruoyi-ui/src/views/revenue/company/detail.vue"
      - "ruoyi-ui/src/api/revenue/company.js"
      - "ruoyi-ui/src/components/DictSelect/index.vue"
      - "ruoyi-ui/src/components/UserSelect/index.vue"
      - "ruoyi-ui/src/components/SecondaryRegionSelect/index.vue"
    backend:
      - "ruoyi-project/src/main/java/com/ruoyi/project/controller/ProjectController.java"
      - "ruoyi-project/src/main/java/com/ruoyi/project/service/IProjectService.java"
      - "ruoyi-project/src/main/java/com/ruoyi/project/service/impl/ProjectServiceImpl.java"
      - "ruoyi-project/src/main/java/com/ruoyi/project/domain/Project.java"
      - "ruoyi-project/src/main/resources/mapper/project/ProjectMapper.xml"
    sql:
      - "pm-sql/init/00_tables_ddl.sql (pm_project 表含收入确认字段)"
      - "pm-sql/init/02_menu_data.sql (公司收入确认菜单)"
    dead_files:
      - "ruoyi-ui/src/api/revenue/company.ts (未使用的 TypeScript 版本，URL 不匹配后端接口)"

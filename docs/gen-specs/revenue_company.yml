# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: review
  functionName: 公司收入确认
  parentMenuId: null

# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # ========== 列表页面定制 ==========
  list_query_conditions:
    intent: "支持14个查询条件的多维度筛选，4列网格布局（el-row/el-col :span=6），每行精确4个"
    component:
      type: custom
      spec: "查询表单使用 el-row/el-col :span=6 网格布局（非 inline），通用选择器组件"
    bindTo: page
    service:
      endpoint: "GET /project/project/revenue/list"
      source: "ProjectController 调用 IProjectService.selectProjectList()"
      returns: "TableDataInfo<Project>"
      newApi: false
    notes: |
      布局：el-form（无 inline），5行 el-row :gutter=10
      第1~4行每行4个 el-col :span=6；第5行1个 el-col :span=24（按钮组独占全宽）
      每个控件设置 style="width: 100%"；按钮组在独立第5行，label-width="0"
      按钮组：查询（primary）、重置、导出（warning plain），三个按钮同行，导出不再独立于工具栏

      查询条件字段（14个，顺序即表单排列顺序）：
      第1行：
      1. 项目名称 - el-autocomplete，fetch-suggestions="queryProjectNames"，clearable
         queryProjectNames(queryString, cb) 调用 listProjectByName({ projectName: queryString || '' })
         返回 response.data 映射为 [{ value: item.projectName, projectId: item.projectId }]
         placeholder="输入关键字搜索，或直接选择下拉数据"
      2. 项目部门 - el-tree-select, v-model="queryParams.projectDept", 三级及以下部门
         :data="deptTree", :props="{ label, value, children }", check-strictly, clearable, filterable
      3. 收入确认年度 - dict-select, dict-type="sys_ndgl"
      4. 项目分类 - dict-select, dict-type="sys_xmfl"
      第2行：
      5. 一级区域 - dict-select, dict-type="sys_yjqy"
      6. 二级区域 - secondary-region-select, :region-dict-value="queryParams.region"
      7. 项目经理 - user-select, post-code="pm"
      8. 市场经理 - user-select, post-code="scjl"
      第3行：
      9. 立项年度 - dict-select, dict-type="sys_ndgl"
      10. 审核状态 - dict-select, dict-type="sys_spzt"
      11. 验收状态 - dict-select, dict-type="sys_yszt"
      12. 项目阶段 - dict-select, dict-type="sys_xmjd"（移至验收状态之后）
      第4行：
      13. 合同状态 - dict-select, dict-type="sys_htzt"（新增，queryParams.contractStatus）
      14. 收入确认状态 - dict-select, dict-type="sys_qrzt"
      第5行：
      [按钮组：el-col :span=24，label-width="0"]

      后端支持：ProjectMapper.xml selectProjectList WHERE 子句已添加
        <if test="contractStatus != null and contractStatus != ''"> and c.contract_status = #{contractStatus}</if>

  list_table_columns:
    intent: "列表表格共26列（25数据列+1操作列），序号和项目名称列左侧冻结，操作列右侧冻结"
    component:
      type: custom
      spec: "表格列经过顺序调整、列名修改、字段增删"
    bindTo: table
    service: null
    notes: |
      列顺序（26列）：
      1. 序号（width=55, center, fixed="left"）
      2. 项目名称（min-width=220, align=left/header=center, el-link 可点击跳详情, fixed="left"）
      3. 项目阶段（min-width=100, center, dict-tag :options="sys_xmjd"）← columns[0]
      4. 项目部门（min-width=120, center, getDeptName() 显示完整路径, show-overflow-tooltip）← columns[1]
      5. 项目经理（min-width=100, center, getUserName(id, projectManagerSelectRef?.userOptions)）← columns[2]
      6. 项目分类（min-width=120, center, dict-tag :options="sys_xmfl"）← columns[3]
      7. 二级区域（min-width=120, center, scope.row.regionName || '-', show-overflow-tooltip）← columns[4]
      8. 项目预算(元)（min-width=120, align=right, formatAmount()）← columns[5]
      9. 预估工作量（人天）（min-width=130, center, 原始值直接显示）← columns[6]
      10. 实际人天（min-width=100, center, actualWorkload / 8 保留3位小数）← columns[7]
          - 数据行：scope.row.actualWorkload != null ? (scope.row.actualWorkload / 8).toFixed(3) : '-'
          - 合计行：(Number(summaryRes.data?.actualWorkload || 0) / 8).toFixed(3)
      11. 合同名称（min-width=180, align=left/header=center, white-space:pre-line 换行展示, show-overflow-tooltip）← columns[8]
          - 多合同时每行一个合同名称（后端 GROUP_CONCAT '\n' 分隔）
          - 无合同显示 '-'；合计行不显示
      12. 合同金额(元)（min-width=120, align=right, formatAmount()）← columns[9]
      13. 合同状态（min-width=100, center, dict-tag :options="sys_htzt"）← columns[10]
      14. 收入确认年度（min-width=120, center, plain column）← columns[11]
      15. 收入确认状态（min-width=120, center, dict-tag :options="sys_qrzt"）← columns[12]
      16. 验收状态（min-width=100, center, dict-tag :options="sys_yszt"）← columns[13]（紧接收入确认状态之后）
      17. 确认金额（元）（min-width=130, align=right, formatAmount()）← columns[14]
      18. 参与人员（min-width=150, center, getParticipantsNames(), show-overflow-tooltip）← columns[15]
      19. 启动日期（width=100, center）← columns[16]
      20. 结束日期（width=100, center）← columns[17]
      21. 验收日期（width=100, center）← columns[18]
      22. 审核状态（min-width=100, center, dict-tag :options="sys_spzt"）← columns[19]
      23. 项目状态（min-width=100, center, dict-tag :options="sys_xmzt"）← columns[20]
      24. 更新人（min-width=100, center, prop="updateByName", plain column）← columns[21]
      25. 更新时间（width=160, center）← columns[22]
      26. 操作（width=200, center, fixed="right"）

      已移除列：
      - 税后金额列（删除）

      操作列按钮逻辑（两个按钮始终同时显示）：
      - 收入查看按钮（link type=primary, icon=View, 权限 revenue:company:view）→ handleRevenueView
      - 收入确认按钮（link type=success, icon=Money, 权限 revenue:company:edit）→ handleRevenue
      - 两个按钮无 v-if 互斥，任何状态下均可点击
      - 合计行（isSummaryRow）不显示操作按钮（v-if="!scope.row.isSummaryRow" 包裹整个操作区）

      列显隐（右上角面板）：
      - right-toolbar 加 :columns="columns"，columns[0]~columns[22] 共23列均加 v-if="columns[i].visible"
      - 当前实现：所有23列默认 visible: true（全部显示）

      columns 数组定义（23个，key 0~22）：
      { key: 0,  label: '项目阶段',         visible: true }
      { key: 1,  label: '项目部门',         visible: true }
      { key: 2,  label: '项目经理',         visible: true }
      { key: 3,  label: '项目分类',         visible: true }
      { key: 4,  label: '二级区域',         visible: true }
      { key: 5,  label: '项目预算(元)',      visible: true }
      { key: 6,  label: '预估工作量(人天)',  visible: true }
      { key: 7,  label: '实际人天',         visible: true }
      { key: 8,  label: '合同名称',         visible: true }
      { key: 9,  label: '合同金额(元)',      visible: true }
      { key: 10, label: '合同状态',         visible: true }
      { key: 11, label: '收入确认年度',     visible: true }
      { key: 12, label: '收入确认状态',     visible: true }
      { key: 13, label: '验收状态',         visible: true }
      { key: 14, label: '确认金额(元)',      visible: true }
      { key: 15, label: '参与人员',         visible: true }
      { key: 16, label: '启动日期',         visible: true }
      { key: 17, label: '结束日期',         visible: true }
      { key: 18, label: '验收日期',         visible: true }
      { key: 19, label: '审核状态',         visible: true }
      { key: 20, label: '项目状态',         visible: true }
      { key: 21, label: '更新人',           visible: true }
      { key: 22, label: '更新时间',         visible: true }

      useDict 依赖（9个）：
      sys_xmfl, sys_yjqy, sys_xmjd, sys_spzt, sys_yszt, sys_qrzt, sys_ndgl, sys_htzt, sys_xmzt

  list_participants_display:
    intent: "参与人员列通过隐藏的 UserSelect 组件加载所有用户，将用户ID转为姓名显示"
    component:
      type: UserSelect
      spec: "隐藏的 UserSelect 组件 (style='display: none')，通过 ref 访问 userOptions"
    bindTo: participants
    service: null
    notes: |
      实现方式：
      1. 隐藏的 UserSelect 组件：
         <user-select ref="allUsersSelectRef" v-model="hiddenAllUsersValue" style="display: none" />
      2. getParticipantsNames(participants) 函数：
         - 解析 participants 字段（逗号分隔的用户ID字符串或数组）
         - 通过 allUsersSelectRef.value?.userOptions || [] 获取用户列表
         - 根据 userId 匹配 nickName，返回逗号+空格分隔的姓名字符串（', ' 分隔）
         - 无匹配时返回 '-'
      3. 合计行（isSummaryRow）不显示参与人员

  list_amount_format:
    intent: "金额字段千分位格式化，金额列表头标注单位(元)并右对齐"
    component:
      type: custom
      spec: "formatAmount() 格式化函数"
    bindTo: table
    service: null
    notes: |
      formatAmount(amount)：
      - 使用 toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      - null/undefined/'' 或 NaN 返回 '0.00'（无合同/未填写时统一显示 0.00）
      - 应用于：项目预算(元)、合同金额(元)、确认金额（元）

      工作量列：
      - 预估工作量（列[6]）：直接显示原始值，无格式化
      - 实际人天（列[7]）：actualWorkload ÷ 8，toFixed(3) 保留3位小数；null时显示'-'
        合计行同样 ÷ 8：(Number(actualWorkload || 0) / 8).toFixed(3)

      更新人列：
      - prop="updateByName"，后端 LEFT JOIN sys_user u_upd 取 nick_name
      - JOIN 条件需 COLLATE utf8mb4_unicode_ci：p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name

  list_summary_row:
    intent: "合计行显示在表头和第一行数据之间，统计5个数值字段的全量（全部分页）汇总"
    component:
      type: custom
      spec: "后端汇总接口 + Promise.all 并行调用 + 数组前插方式实现"
    bindTo: table
    service:
      endpoint: "GET /project/project/revenue/summary"
      source: "ProjectController.getRevenueSummary() → ProjectMapper.selectRevenueSummary()"
      returns: "AjaxResult<Map> { projectBudget, estimatedWorkload, actualWorkload, contractAmount, confirmAmount }"
      newApi: true
    notes: |
      实现方式（非 computed，非 Element Plus show-summary，非本地累加）：
      1. getList() 使用 Promise.all 同时调用 listRevenue 和 getRevenueSummary
      2. summaryRes.data 来自后端 SUM 聚合，反映全量筛选结果（跨所有分页）
      3. 合计行仅在有数据时插入（listRes.rows.length > 0），无数据时 revenueList 为空数组
      4. 合计行插入列表开头：revenueList.value = [summary, ...listRes.rows]

      合计行对象结构：
      {
        isSummaryRow: true,
        projectBudget:     Number(summaryRes.data?.projectBudget || 0).toFixed(2),
        estimatedWorkload: Number(summaryRes.data?.estimatedWorkload || 0).toFixed(2),
        actualWorkload:    (Number(summaryRes.data?.actualWorkload || 0) / 8).toFixed(3),  // ÷8换算人天
        contractAmount:    Number(summaryRes.data?.contractAmount || 0).toFixed(2),
        confirmAmount:     Number(summaryRes.data?.confirmAmount || 0).toFixed(2)
      }

      后端 SQL（selectRevenueSummary）：
      - 与 selectProjectList 相同的 JOIN 和 WHERE 条件，不加 LIMIT 分页
      - COALESCE(SUM(...), 0) 防止无数据时返回 null
      - 仅包含收入确认页面实际用到的14个 WHERE 条件（精简版）

      合计字段（5个）：
      - projectBudget（项目预算）
      - estimatedWorkload（预估工作量）
      - actualWorkload（实际人天，后端存储单位为小时，合计行÷8换算为人天）
      - contractAmount（合同金额）
      - confirmAmount（确认金额）

      合计行样式：
      - 序号列显示"合计"（加粗）
      - 所有数值列加粗显示（CSS: .summary-row td { color: #409eff; font-weight: bold; }）
      - 字典列/用户名列/操作列不显示（v-if="!scope.row.isSummaryRow"）

  list_pagination_fixed:
    intent: "分页组件固定在页面底部，表格高度动态计算"
    component:
      type: custom
      spec: "flex 布局 + 动态表格高度计算"
    bindTo: page
    service: null
    notes: |
      容器：className="revenue-company-container", height: 100%, display: flex, flex-direction: column
      表格：:height="tableHeight"（动态计算）
      calcTableHeight() 使用 nextTick 计算：
        tableHeight = windowHeight - searchHeight - toolbarHeight - paginationHeight - padding
        - searchHeight: 255px（showSearch 为 true 时，查询条件5行含按钮行）
        - toolbarHeight: 50px, paginationHeight: 50px, padding: 120px
      生命周期：
      - onMounted: calcTableHeight() + window.addEventListener('resize', calcTableHeight)
      - onUnmounted: window.removeEventListener('resize', calcTableHeight)
      - watch showSearch: 搜索框显隐时重新计算表格高度

  # ========== 查询条件组件定制 ==========
  dict_select_components:
    intent: "字典选择器统一使用全局注册的 DictSelect 组件"
    component:
      type: DictSelect
      props:
        clearable: true
        placeholder: "请选择"
    bindTo: ["revenue_confirm_year", "project_category", "region", "established_year", "project_stage", "approval_status", "acceptance_status", "contract_status", "revenue_confirm_status"]
    service: null
    notes: |
      组件位置：ruoyi-ui/src/components/DictSelect/index.vue（全局注册于 main.ts）
      功能：自动通过 Pinia store 加载并缓存字典数据
      使用的字典类型：
      - sys_ndgl: 年度管理（收入确认年度、立项年度共用）
      - sys_xmfl: 项目分类
      - sys_yjqy: 一级区域
      - sys_xmjd: 项目阶段
      - sys_spzt: 审批状态
      - sys_yszt: 验收状态
      - sys_htzt: 合同状态（查询条件新增）
      - sys_qrzt: 收入确认状态（4个值：1=1-未确认, 2=2-待确认收入, 3=3-已确认收入, 4=4-无法确认）
      - sys_xmzt: 项目状态（表格列新增，useDict 中新增）

  user_select_components:
    intent: "用户选择器统一使用 UserSelect 组件，支持按岗位筛选和表格中用户名显示"
    component:
      type: UserSelect
      props:
        clearable: true
        filterable: true
    bindTo: ["project_manager_id", "market_manager_id"]
    service:
      endpoint: "GET /project/project/users?postCode={pm|scjl}"
      source: "复用 ProjectService.getUsersByPost"
      returns: "[{ userId, nickName, userName, phonenumber, ... }]"
      newApi: false
    notes: |
      组件位置：ruoyi-ui/src/components/UserSelect/index.vue（全局注册于 main.ts）
      岗位代码：pm=项目经理, scjl=市场经理, xsfzr=销售负责人

      查询条件用法：
      <user-select v-model="queryParams.projectManagerId" post-code="pm" />

      表格用户名显示（复用查询条件中的 UserSelect 组件 ref）：
      projectManagerSelectRef 即查询条件的项目经理选择器 ref，无需额外的隐藏组件
      getUserName(scope.row.projectManagerId, projectManagerSelectRef?.userOptions)

      getUserName(userId, userList) 实现：
      - const list = userList?.value || userList || []  // 兼容 ref 和原始数组
      - 在模板中调用时 projectManagerSelectRef 已被 Vue 自动解包，.userOptions 为数组
      - 返回 user.nickName 或 '-'

  region_cascade_select:
    intent: "一级区域与二级区域联动选择"
    component:
      type: "DictSelect + SecondaryRegionSelect"
    bindTo: ["region", "region_id"]
    service:
      endpoint: "GET /project/project/secondaryRegions?regionDictValue={region}"
      source: "复用 ProjectService.getSecondaryRegions"
      returns: "[{ regionId, regionCode, regionName, regionDictValue }]"
      newApi: false
    notes: |
      一级区域（DictSelect）：
      - dict-type="sys_yjqy", @change 联动触发二级区域加载
      二级区域（SecondaryRegionSelect）：
      - :region-dict-value="queryParams.region"
      - 一级区域变化时自动清空并重新加载
      - 未选一级区域时自动禁用

  dept_path_display:
    intent: "项目部门在列表中显示完整层级路径（从第三级开始）"
    component:
      type: custom
      spec: "getDeptName() 辅助函数"
    bindTo: project_dept
    service:
      endpoint: "GET /project/project/deptTree"
      source: "复用 ProjectController 代理接口，返回扁平列表"
      returns: "[{ deptId, deptName, ancestors, parentId, ... }]"
      newApi: false
    notes: |
      实现逻辑：
      1. loadDeptTree() 拆分两份数据：
         - deptFlatList：保存所有部门的扁平列表（用于 getDeptName 路径查找）
         - deptTree：仅取三级及以下部门（ancestors.split(',').length >= 3），
           映射 deptId→value, deptName→label 后，handleTree() 构建树供下拉选择
      2. getDeptName(deptId)：
         - 从 deptFlatList 找到目标部门，解析 ancestors（格式 "0,100,101"，过滤"0"和空值）
         - 从第3级开始（ancestorIds 索引2起）收集各级部门名称
         - 加上当前部门名，用"-"连接：如"事业部-开发部-研发组"
         - 找不到或无路径返回'-'
      3. 合计行不显示部门（v-if="!scope.row.isSummaryRow"）

  # ========== 详情页面定制 ==========
  detail_page_layout:
    intent: "详情页面左右布局，左侧显示完整项目信息，右侧显示收入确认表单"
    component:
      type: custom
      spec: "el-row + el-col 布局，左侧 span=14，右侧 span=10"
    bindTo: page
    service:
      endpoint: "GET /project/project/revenue/{projectId}"
      source: "ProjectController，返回项目详情含收入确认字段及合同信息"
      returns: "Project 对象（含 confirmAmount, taxRate, afterTaxAmount, revenueConfirmYear, revenueConfirmStatus, contractAmount, contractStatus, contractName 等）"
      newApi: false
    notes: |
      页面顶部：el-page-header，动态 title（由 computed pageTitle 驱动）
      - isViewMode=true  → '收入确认详情'
      - isViewMode=false → '收入确认编辑'
      isViewMode = computed(() => route.query.mode === 'view' 或 mode 默认值为 'view')

      左侧（span=14）单个 el-card，内含 6 个分组，均使用 section-title CSS类分隔：

      ① 项目基本信息（column=2, border）— 字段顺序：
         行业（dict-tag industry）、一级区域（getDictLabel）
         二级区域（form.regionName）、立项年度（dict-tag sys_ndgl）
         项目编号（form.projectCode）、项目预算（formatAmount + '元'）
         项目名称（span=2）
         项目分类（getDictLabel sys_xmfl）、项目部门（form.deptName）
         预估工作量（form.estimatedWorkload + '人天' 或 '-'）、实际人天（form.actualWorkload + '人天' 或 '-'）
         项目状态（getDictLabel sys_xmzt）、验收状态（dict-tag sys_yszt）
         合同金额（formatAmount + '元'）、审核状态（getDictLabel sys_spzt）
         合同状态（dict-tag sys_htzt）、合同名称（white-space:pre-line 换行）
         收入确认状态（dict-tag sys_qrzt）、收入确认年度（form.revenueConfirmYear）
         确认金额（含税）（formatAmount + '元'）、税率（form.taxRate + '%' 或 '-'）
         税后金额（span=2，formatAmount + '元'）
         项目地址（span=2）
         项目计划（span=2，white-space:pre-line）
         项目描述（span=2，white-space:pre-line）
         审核意见（span=2）

         字典字段：行业/验收状态/合同状态/收入确认状态 使用 dict-tag（带颜色标签）
         其余字典字段通过 getDictLabel(dicts, value) 转换为中文标签
         金额字段通过 formatAmount() 格式化（无值显示 '-'）
         工作量字段格式：值 + ' 人天'，null 时显示 '-'
         税率字段格式：值 + '%'，null 时显示 '-'

      ② 人员配置（column=2, border）：
         项目经理（form.projectManagerName）、市场经理（form.marketManagerName）（同行）
         销售负责人（span=2，form.salesManagerName || '-'）
         销售联系方式（span=2，form.salesContact || '-'）
         参与人员（span=2，form.participantsNames，无默认'-'）

      ③ 客户信息（column=2, border）：
         客户名称（span=2，form.customerName || '-'）
         客户联系人（form.customerContactName）、客户联系方式（form.customerContactPhone）（同行）
         商户联系人（form.merchantContact）、商户联系方式（form.merchantPhone）（同行）

      ④ 时间规划（column=2, border）：
         启动日期、结束日期（parseTime '{y}-{m}-{d}' || '-'，同行）
         实施年度（span=2，form.reservedField1 || '-'）
         投产日期（parseTime form.productionDate || '-'）、验收日期（parseTime form.acceptanceDate || '-'）（同行）

      ⑤ 成本预算（column=2, border，两两并排显示，无 span=2）：
         项目费用（projectCost）、费用预算（expenseBudget）（同行）
         成本预算（costBudget）、人力费用（laborCost）（同行）
         采购成本（purchaseCost）（独行）
         空值统一显示"- 元"；有值时用 formatAmount() 格式化 + ' 元'

      ⑥ 其他信息（column=1, border）：
         备注（form.remark || '-'，white-space:pre-line）

      右侧（span=10）收入确认表单卡片：
      - 详见 detail_revenue_form 定制

      辅助函数：
      - getDictLabel(dicts, value)：
        const dictArr = Array.isArray(dicts) ? dicts : (dicts?.value || [])
        const dict = dictArr.find(d => String(d.value) === String(value))
        return dict ? dict.label : (value || '-')
        注意：模板中 ref 自动解包，dicts 传入时已是数组，需兼容两种形式
      - formatAmount(amount)：千分位格式化，无值返回 '-'（与列表页返回 '0.00' 区分）

      useDict 依赖（9个）：
      sys_qrzt, sys_ndgl, sys_xmfl, sys_yjqy, sys_xmzt, sys_yszt, sys_spzt, sys_htzt, industry

      数据加载：
      - getDetail() 和 getTeamDetail() 在脚本初始化阶段直接调用（无 onMounted 包裹）
      - watch(() => route.params.projectId) 监听：路由参数变化时重新调用两个加载函数（组件复用场景）
      - watch(pageTitle) 监听：模式切换时同步标签页标题（proxy.$tab.updatePage）

      进入方式：
      - 列表"收入确认"按钮 → router.push({ path: '/revenue/company/detail/' + projectId, query: { mode: 'edit' } })
      - 列表"收入查看"按钮 → router.push({ path: '/revenue/company/detail/' + projectId, query: { mode: 'view' } })
      - 查看模式"编辑收入确认"按钮 → router.push(`/revenue/company/detail/${projectId}?mode=edit`)
      - 路由配置：/revenue/company/detail/:projectId(\\d+)，name='CompanyRevenueDetail'

      后端变更：selectProjectByProjectId 补合同子查询（GROUP_CONCAT 合同名称）
      pm_customer 别名从 c 改为 cust，避免与合同子查询内部别名冲突

  detail_revenue_form:
    intent: "右侧分两部分：上方公司收入确认信息，下方团队收入确认明细表格"
    component:
      type: custom
      spec: "查看模式只读自定义卡片式布局 + 编辑模式 el-form；团队明细 el-table"
    bindTo: revenueConfirm
    service:
      endpoint: "PUT /project/project/revenue（更新）; GET /revenue/team/{projectId}（团队明细）"
      source: "ProjectController.updateRevenue(); getTeamRevenue() from @/api/revenue/team"
      returns: "AjaxResult; { project, detailList }"
      newApi: false
    notes: |
      右侧上方卡片标题：公司收入确认信息（header 右侧在编辑模式显示"编辑中" warning tag）

      查看模式（isViewMode=true）：自定义卡片式布局（非 el-descriptions）
      - 状态横幅（status-banner div）：根据 revenueConfirmStatus 查字典 elTagType 动态映射颜色
        从 sys_qrzt 字典找到对应项，读取 dict.elTagType（success/warning/danger/primary/info/default）
        映射到 CSS 类：status-success/status-warning/status-danger/status-primary/status-info/status-default
        CSS 颜色对应：success=绿(#67c23a/#f0f9eb), warning=橙(#e6a23c/#fdf6ec),
          danger=红(#f56c6c/#fef0f0), primary=蓝(#409eff/#ecf5ff), info/default=灰(#909399/#f4f4f5)
        文字：getDictLabel(sys_qrzt, form.revenueConfirmStatus)
      - 验收状态：dict-tag :options="sys_yszt"
      - 确认年度：info-row 行（Calendar 图标）
      - 确认金额(含税)：虚线边框盒子（amount-box），大字红色 ¥ xxx
      - 税后金额：info-row，蓝色加粗 ¥ xxx（.amount-blue-bold）
      - 税率：info-row，xxx%
      - el-divider 分隔线
      - 确认人：info-row（User 图标）
      - 确认时间：info-row（Clock 图标）
      - 按钮（全宽堆叠，.action-buttons div 包裹）：
        [编辑收入确认（primary，全宽，Edit 图标）] → goEdit()
        [返回列表（default，全宽，margin-top:8px margin-left:0）] → goBack()

      编辑模式（isViewMode=false）：
      el-form（label-width=120px），7个字段：
      1. 收入确认状态（必填，prop="revenueConfirmStatus"）- el-select，sys_qrzt 字典选项
      2. 验收状态 - el-select，sys_yszt 字典选项，非必填
      3. 收入确认年度 - el-select（clearable），sys_ndgl 字典选项，非必填
      4. 确认金额(含税) - el-input type="number"，#append="元"，非必填，@blur="formatConfirmAmount"
      5. 税率 - el-input type="number"，#append="%"，非必填，@blur="formatTaxRate"
         下方快捷按钮：常用税率 [6%] [13%]（.tax-quick-btns div）
      6. 税后金额 - el-input disabled，#prefix="¥"，非必填，自动计算（不可编辑）
         下方蓝色提示条（.calc-tip，背景#409eff白字）：InfoFilled图标 + "根据确认金额和税率自动计算：税后金额 = 确认金额 / (1 + 税率/100)"
      7. 备注 - el-input type="textarea" :rows=4，maxlength=500，show-word-limit，非必填

      编辑模式按钮（每个单独 el-form-item，全宽）：
      [提交（primary，Check 图标）] → submitForm()
      [重置] → resetFormData()（还原至接口原始快照 formOrigin）
      [取消] → goBack()

      税后金额自动计算（watch 监听 [form.confirmAmount, form.taxRate] 数组）：
      afterTaxAmount = confirmAmount / (1 + taxRate / 100)，保留2位小数
      金额或税率无效时 afterTaxAmount = null

      重置逻辑：
      - formOrigin ref 在 getDetail() 时保存原始数据快照（{ ...response.data }）
      - resetFormData() → form.value = { ...formOrigin.value } + clearValidate()

      默认税率初始化（initTaxRate，仅当 taxRate 为空时执行）：
      - 项目分类='1'（软件开发类）→ 税率 6
      - 项目分类='2'（硬件销售类）→ 税率 13

      提交逻辑（submitForm）：
      - 表单校验通过后调用 updateRevenue(form.value)
      - 成功后 proxy.$modal.msgSuccess("提交成功") + goBack()

      formatConfirmAmount / formatTaxRate：
      - @blur 时将值格式化为 toFixed(2)，超出合法范围（taxRate: 0-100）时置 null
      - 负数确认金额置 null

      goBack()：router.push("/revenue/company")（固定跳转列表页）
      goEdit()：router.push(`/revenue/company/detail/${projectId.value}?mode=edit`)

      右侧下方卡片（margin-top=16px）：
      标题：团队收入确认明细
      el-table border size="small"，empty-text="暂无团队收入确认数据"
      数据来源 teamList（初始化时调用 getTeamRevenue(projectId)，取 response.data?.detailList || []）
      列（5列）：
      - 部门名称（prop=deptName, min-width=120, show-overflow-tooltip）
      - 确认金额（prop=confirmAmount, min-width=110, right, formatAmount() + ' 元'）
      - 确认时间（prop=confirmTime, min-width=100, parseTime 格式化 '{y}-{m}-{d}'）
      - 确认人（prop=confirmUserName, min-width=90, show-overflow-tooltip）
      - 备注（prop=remark, min-width=120, show-overflow-tooltip）
      无数据时额外显示文字提示（v-if="teamList.length === 0" div）

      新增 import：
      import { getTeamRevenue } from "@/api/revenue/team"

  # ========== 后端接口定制 ==========
  backend_list_query:
    intent: "列表查询基于项目表，关联合同和区域信息"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /project/project/revenue/list"
      source: "ProjectController 调用 IProjectService.selectProjectList()"
      returns: "TableDataInfo<Project>"
      newApi: false
    notes: |
      重要：收入确认的后端接口在 ProjectController（/project/project/revenue/**），
      而非 ProjectReviewController（/project/review/**，用于项目审核）

      SQL 查询（ProjectMapper.xml selectProjectList）：
      基础表：pm_project p
      关联表：
      - LEFT JOIN pm_secondary_region sr ON p.region_id = sr.region_id → sr.region_name
      - LEFT JOIN 合同子查询 ca ON p.project_id = ca.project_id：
        SUM(c.contract_amount) AS contract_amount
        MAX(c.contract_status) AS contract_status
        GROUP_CONCAT(c.contract_name ORDER BY c.contract_id SEPARATOR '\n') AS contract_name
      - LEFT JOIN sys_user u_upd ON p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name
        → u_upd.nick_name AS update_by_name

      数据权限：@DataScope(deptAlias='d', userAlias='u1')
      排序：ORDER BY COALESCE(p.update_time, p.create_time) DESC

      收入确认特有查询条件：
      - p.revenue_confirm_status = #{revenueConfirmStatus}
      - p.revenue_confirm_year = #{revenueConfirmYear}

  backend_detail_and_update:
    intent: "详情查询和收入确认更新接口"
    component: null
    bindTo: backend
    service:
      endpoint: "GET /project/project/revenue/{projectId} 和 PUT /project/project/revenue"
      source: "ProjectController"
      returns: "AjaxResult<Project>"
      newApi: false
    notes: |
      详情查询：
      - 使用 selectProjectByProjectId，关联查询部门名称、经理名称、客户信息等
      - 额外 JOIN：sys_dept, sys_user(项目经理/市场经理/销售负责人), pm_customer, pm_customer_contact
      - pm_customer 别名为 cust（避免与合同子查询内别名冲突）
      - GROUP_CONCAT 合同名称（'\n' 分隔）

      收入确认更新：
      - 更新字段：confirmAmount, taxRate, afterTaxAmount, revenueConfirmYear, revenueConfirmStatus, acceptanceStatus, remark
      - 后端也独立计算 afterTaxAmount（不依赖前端传值）
      - 设置 companyRevenueConfirmedBy 和 companyRevenueConfirmedTime

      权限：
      - 列表查询：revenue:company:list 或 project:review:query
      - 详情查看：revenue:company:view
      - 确认编辑：revenue:company:edit
      - 导出：revenue:company:export

# ============================
# 字典依赖
# ============================
dictionaries:
  sys_ndgl:
    name: 年度管理
    usage: 收入确认年度、立项年度

  sys_xmfl:
    name: 项目分类
    values: [软件开发类, 硬件销售类, 系统集成类, 开发人力外包, 运维人力外包, 测试人力外包]

  sys_yjqy:
    name: 一级区域
    usage: 区域筛选（联动二级区域）

  sys_xmjd:
    name: 项目阶段

  sys_spzt:
    name: 审批状态
    values: { 0: 待审核, 1: 已通过, 2: 已拒绝 }

  sys_yszt:
    name: 验收状态

  sys_htzt:
    name: 合同状态
    values: [未签署, 已签署]

  sys_qrzt:
    name: 确认状态（收入确认状态）
    values: { 1: 1-未确认, 2: 2-待确认收入, 3: 3-已确认收入, 4: 4-无法确认 }
    note: 详情状态横幅颜色从各字典项的 elTagType 属性读取，非硬编码

  sys_xmzt:
    name: 项目状态

# ============================
# 实现总结
# ============================
implementation_summary:
  description: "公司收入确认功能，基于项目表视图查询，支持多维度筛选和收入确认操作"

  key_features:
    - "基于 pm_project 表查询，关联合同金额和区域信息"
    - "列表26列（25数据列+1操作列），序号和项目名称列左侧冻结，操作列右侧冻结"
    - "支持14个查询条件的多维度筛选，4列网格布局（el-row/el-col :span=6）"
    - "项目名称查询使用 el-autocomplete（fetch-suggestions），支持模糊搜索"
    - "合计行显示在表头和第一行数据之间，统计5个数值字段（移除税后金额）；无数据时不显示合计行"
    - "金额字段千分位格式化（formatAmount），表头标注(元)并右对齐；无值列表显示0.00"
    - "实际人天列：原始值÷8换算，toFixed(3)保留3位小数；合计行同样÷8"
    - "预估工作量列：直接显示原始值（无换算）"
    - "更新人列显示中文昵称（prop=updateByName，后端 JOIN sys_user）"
    - "参与人员通过隐藏 UserSelect 组件加载用户列表，getParticipantsNames() 转换为姓名"
    - "项目经理通过查询条件 UserSelect 组件 ref（projectManagerSelectRef?.userOptions）显示昵称"
    - "项目部门列表通过 getDeptName() 显示完整层级路径（第三级起，-连接）"
    - "一级区域联动二级区域（DictSelect + SecondaryRegionSelect）"
    - "使用通用选择器组件（DictSelect、UserSelect、SecondaryRegionSelect）减少重复代码"
    - "列显隐控制23列，当前全部默认visible=true（无隐藏列）"
    - "列顺序：验收状态（columns[13]）位于收入确认状态之后，确认金额（columns[14]）之前"
    - "详情页左14右10布局：左侧6个分组（含其他信息），右侧两卡片（公司收入确认信息+团队明细）"
    - "右侧上方：查看模式自定义卡片式只读布局 + 编辑入口按钮；编辑模式表单"
    - "右侧下方：团队收入确认明细 el-table，调用 getTeamRevenue 加载，展示5列含备注"
    - "收入确认表单：确认金额+税率→watch自动计算税后金额，默认税率按项目分类初始化"
    - "收入确认状态字典使用 sys_qrzt（4值），状态横幅颜色从字典 elTagType 动态读取"
    - "详情页有 watch(route.params.projectId) 监听，路由参数变化时重新加载数据"
    - "详情页有 watch(pageTitle) 同步标签页标题（proxy.$tab.updatePage）"
    - "操作列两个按钮始终同时展示（收入查看+收入确认），无互斥 v-if 逻辑"
    - "导出按钮与查询/重置按钮同行（查询表单按钮组），不再单独放置工具栏"
    - "分页组件固定底部，表格高度动态计算（searchHeight=255px 对应5行查询条件含按钮行）"

  technical_highlights:
    - "Composition API（setup script）"
    - "合计行：后端 GET /revenue/summary 接口全量 SUM + Promise.all 并行调用 + 数组前插（非本地累加，非 show-summary）"
    - "合计行零值处理：Number(x || 0).toFixed(2)，确保值为0也正确格式化"
    - "实际人天÷8换算：数据行 toFixed(3)，合计行同样÷8 toFixed(3)"
    - "项目名称查询：el-autocomplete + fetch-suggestions 回调模式，调用 listProjectByName API"
    - "隐藏 UserSelect 通过 allUsersSelectRef.value?.userOptions 获取用户列表"
    - "状态横幅从字典 elTagType 动态映射颜色，与 dict-tag 颜色保持一致"
    - "后端 JOIN sys_user 需 COLLATE utf8mb4_unicode_ci 解决排序规则不一致"
    - "详情表单三个输入框格式统一：el-input type='number' + template #append 显示单位"
    - "税后金额 watch 自动计算：afterTaxAmount = confirmAmount / (1 + taxRate / 100)"
    - "数据权限：后端使用 @DataScope 注解控制部门数据可见性"
    - "收入确认接口在 ProjectController（/project/project/revenue/**），非 ProjectReviewController"
    - "详情 formatAmount 无值返回'-'；列表 formatAmount 无值返回'0.00'（两处行为不同）"


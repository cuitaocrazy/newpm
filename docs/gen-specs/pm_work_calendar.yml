# ============================
# Tab 1: 基本信息
# ============================
basicInfo:
  tableName: pm_work_calendar
  tableComment: 工作日历（节假日与调休工作日配置）
  className: WorkCalendar
  functionAuthor: ruoyi
  remark: |
    用于日报模块判断当天是否为工作日，以及当周是否有调休。
    dayType=holiday 表示节假日（不用填日报），dayType=workday 表示调休上班日（需填日报）。
    Controller：WorkCalendarController → /project/workCalendar/**


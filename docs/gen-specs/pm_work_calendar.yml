# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: workCalendar
  functionName: 工作日历
  parentMenuId: 1  # 系统管理或项目管理下

# ============================
# API 汇总
# ============================
apiSummary:
  - "GET    /project/workCalendar/list         → 分页列表（list 权限）"
  - "GET    /project/workCalendar/year/{year}  → 按年份查询全部（不分页，权限：workCalendar:list 或 dailyReport:list 或 dailyReport:activity）"
  - "GET    /project/workCalendar/{id}         → 详情（query 权限）"
  - "POST   /project/workCalendar              → 新增（add 权限）"
  - "PUT    /project/workCalendar              → 修改（edit 权限）"
  - "DELETE /project/workCalendar/{ids}        → 删除（remove 权限）"
  - "POST   /project/workCalendar/batchSave    → 批量保存（edit 权限，@RequestBody List<WorkCalendar>，按 year 先删后插）"

# ============================
# 定制说明
# ============================
customizations:
  year_endpoint:
    intent: "/year/{year} 接口的特殊用途"
    spec: |
      日报 write.vue 的 MonthCalendar 组件调用此接口获取当年节假日/调休数据，
      用于判断某日是否需要填报日报（workday 类型需填，holiday 类型豁免）。
      权限使用 hasAnyPermi，因为该接口同时被管理员（workCalendar:list）
      和普通员工（dailyReport:list）使用。

  batch_save:
    intent: "batchSave 的实现逻辑"
    spec: |
      Service.batchSave(list, year)：
        若 year 不为 null，先 DELETE FROM pm_work_calendar WHERE year = #{year}（物理删除）
        再批量插入 list 中的所有记录
      适用于一次性导入/覆盖某年的全部节假日配置

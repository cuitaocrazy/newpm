# 批次版本管理（出入库版本）代码生成规格 — feature 007
# 迁移自 yadapm T_B_VERSION_OUT / T_C_SYS_NAME。
# 注意：版本号自动生成（VersionNumberGenerator）、级联联动、唯一键防撞为定制逻辑，
#       非 CRUD 脚手架可生成，须人工实现，详见 specs/007-batch-version-management/。

basicInfo:
  tableName: pm_version_out
  tableComment: 出入库版本信息
  className: VersionOut
  functionAuthor: ruoyi
  moduleName: project
  businessName: versionOut
  functionName: 批次版本管理
  remark: "批次+非批次共用，manual_input 区分；本期仅批次=0。子表 pm_version_out_task。"

columns:
  id:
    columnComment: 版本信息ID
    columnType: bigint
    javaType: Long
    javaField: id
    isPk: true
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false

  production_year:
    columnComment: 投产年份
    columnType: varchar(20)
    javaType: String
    javaField: productionYear
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: true
    htmlType: select
    dictType: sys_ndgl
    excelConfig: { export: true, name: 投产年份 }

  batch_id:
    columnComment: 投产批次id(pm_production_batch)
    columnType: bigint
    javaType: Long
    javaField: batchId
    isInsert: true
    isEdit: true
    isQuery: true
    queryType: EQ
    isRequired: true
    htmlType: select
    remark: "级联：年份→批次（GET /batchByYear），投产日期由批次带出（只读）"

  pro_batch_no:
    columnComment: 投产批次号(冗余展示)
    columnType: varchar(64)
    javaType: String
    javaField: proBatchNo
    isList: true
    excelConfig: { export: true, name: 投产批次号 }

  sub_version_code:
    columnComment: 子产品ID
    columnType: varchar(64)
    javaType: String
    javaField: subVersionCode
    isInsert: true
    isEdit: true
    isQuery: true
    isRequired: true
    htmlType: select
    dictType: sys_product
    excelConfig: { export: true, name: 子产品 }

  product:
    columnComment: 产品(冗余,来源 pm_sys_name)
    columnType: varchar(64)
    javaType: String
    javaField: product
    isList: true
    isQuery: true
    htmlType: select
    dictType: sys_product
    excelConfig: { export: true, name: 产品 }
    remark: "级联键：产品→子系统（GET /sysNameByProduct）"

  version_type:
    columnComment: 版本类型1-6
    columnType: varchar(8)
    javaType: String
    javaField: versionType
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    isRequired: true
    htmlType: select
    dictType: sys_version_type
    excelConfig: { export: true, name: 版本类型 }
    remark: "决定版本号生成规则；编辑变更触发重算"

  sys_name:
    columnComment: 子系统名称(pm_sys_name)
    columnType: varchar(64)
    javaType: String
    javaField: sysName
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    isRequired: true
    htmlType: select
    excelConfig: { export: true, name: 子系统名称 }

  base_version_code:
    columnComment: 基准版本号(子系统带出,只读)
    columnType: varchar(64)
    javaType: String
    javaField: baseVersionCode
    isList: true
    isQuery: true
    excelConfig: { export: true, name: 基准版本号 }

  out_lib_version:
    columnComment: 出入库版本号(自动生成,只读)
    columnType: varchar(128)
    javaType: String
    javaField: outLibVersion
    isList: true
    isQuery: true
    queryType: LIKE
    excelConfig: { export: true, name: 出入库版本号 }
    remark: "VersionNumberGenerator 生成；唯一键 (sys_name,version_type,out_lib_version)"

  version_code:
    columnComment: 版本编号(生成中间值)
    columnType: varchar(64)
    javaType: String
    javaField: versionCode

  out_version:
    columnComment: 升级包初级版本号(类型5/6)
    columnType: varchar(64)
    javaType: String
    javaField: outVersion
    isInsert: true
    isEdit: true
    htmlType: select
    remark: "级联：子系统+类型→候选（GET /outVersionOptions）"

  comm_name:
    columnComment: 提交人员(sys_user.user_id)
    columnType: varchar(64)
    javaType: String
    javaField: commName
    isInsert: true
    isEdit: true
    isQuery: true
    htmlType: select
    remark: "默认当前用户；列表/导出显示 userName(JOIN nick_name)"

  version_p_date:
    columnComment: 版本投产日期(只读,批次带出)
    columnType: varchar(20)
    javaType: String
    javaField: versionPDate
    isList: true
    excelConfig: { export: true, name: 版本投产日期 }

  is_involved:
    columnComment: 是否涉及TWS改造 0是1否
    columnType: char(1)
    javaType: String
    javaField: isInvolved
    isInsert: true
    isEdit: true
    isRequired: true
    htmlType: radio

  db_update:
    columnComment: 数据库是否修改 0是1否
    columnType: char(1)
    javaType: String
    javaField: dbUpdate
    isInsert: true
    isEdit: true
    isRequired: true
    htmlType: radio

  usb_update:
    columnComment: 接口是否修改 0是1否
    columnType: char(1)
    javaType: String
    javaField: usbUpdate
    isInsert: true
    isEdit: true
    isRequired: true
    htmlType: radio

  package_mode:
    columnComment: 组包方式1-6
    columnType: varchar(8)
    javaType: String
    javaField: packageMode
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    isRequired: true
    htmlType: select
    dictType: sys_package_mode
    excelConfig: { export: true, name: 组包方式 }

  version_status:
    columnComment: 版本状态(空字典,本期可选)
    columnType: varchar(20)
    javaType: String
    javaField: versionStatus
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    htmlType: select
    dictType: sys_version_status
    excelConfig: { export: true, name: 版本状态 }
    remark: "枚举值来自生产库，待数据迁移填充"

  version_descr:
    columnComment: 版本说明
    columnType: varchar(512)
    javaType: String
    javaField: versionDescr
    isInsert: true
    isEdit: true
    excelConfig: { export: true, name: 版本说明 }

  remarks:
    columnComment: 备注(业务)
    columnType: varchar(2048)
    javaType: String
    javaField: remarks
    isInsert: true
    isEdit: true
    htmlType: textarea
    excelConfig: { export: true, name: 备注 }

  manual_input:
    columnComment: 批次标志 0批次 1非批次
    columnType: char(1)
    javaType: String
    javaField: manualInput
    remark: "查询硬编码 manual_input='0'，隔离批次数据"

# 子表（主从）
subTable:
  tableName: pm_version_out_task
  tableComment: 出入库版本任务关联
  className: VersionOutTask
  fkName: version_id
  remark: "最小化：持久 version_id/task_id；回显 taskNo/taskName/prjName/demandName 由 JOIN pm_task/pm_project 填充"

# 依赖字典
dictDependencies:
  - sys_ndgl       # 投产年份
  - sys_product    # 产品/子产品
  - sys_version_type   # 版本类型(本特性新增)
  - sys_package_mode   # 组包方式(本特性新增)
  - sys_version_status # 版本状态(本特性新增,空字典)

# 定制逻辑（非脚手架可生成）
customLogic:
  - 出入库版本号自动生成：VersionNumberGenerator（6 类型规则，见 reference-version-algorithm.md）
  - 唯一性防撞：uk_sys_type_outlib 唯一键 + 生成失败重试(≤3)
  - 级联端点：batchByYear / sysNameByProduct / outVersionOptions / versionPDate / taskInfo
  - 编辑重算：关键字段(sys_name/version_type/sub_version_code)变更才重算版本号
  - pm_task 新增 demand_name 列（需求名称）

# ============================
# Tab 1: 基本信息
# ============================
basicInfo:
  tableName: pm_project_approval
  tableComment: 立项审核记录
  className: ProjectApproval
  functionAuthor: ruoyi
  remark: "审核历史记录表，每次审核操作（通过/拒绝/退回）均写入一条记录"

# ============================
# Tab 2: 字段信息（pm_project_approval 表）
# ============================
columns:
  approval_id:
    columnComment: 审核记录主键
    columnType: bigint
    javaType: Long
    javaField: approvalId
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  project_id:
    columnComment: 关联项目ID
    columnType: bigint
    javaType: Long
    javaField: projectId
    isInsert: true
    isEdit: false
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: true
    htmlType: input
    dictType: ""

  approval_status:
    columnComment: 审核状态(0-待审核 1-审核通过 2-审核拒绝 3-退回待审核)
    columnType: varchar(50)
    javaType: String
    javaField: approvalStatus
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: "sys_spzt"
    notes: |
      前端使用 sys_spzt 字典渲染（dict-tag/dict-select）。
      Java @Excel 使用 readConverterExp="0=待审核,1=审核通过,2=审核拒绝,3=退回待审核"（不声明 dictType），
      导出时直接翻译，不依赖运行时字典表。两者效果一致，但实现路径不同。

  approval_reason:
    columnComment: 审核意见/拒绝原因/退回原因
    columnType: text
    javaType: String
    javaField: approvalReason
    isInsert: true
    isEdit: true
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: textarea
    dictType: ""

  approver_id:
    columnComment: 审核人ID
    columnType: bigint
    javaType: Long
    javaField: approverId
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  approval_time:
    columnComment: 审核时间
    columnType: datetime
    javaType: Date
    javaField: approvalTime
    isInsert: true
    isEdit: false
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

  del_flag:
    columnComment: 删除标志(0正常 1删除)
    columnType: char(1)
    javaType: String
    javaField: delFlag
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  create_by:
    columnComment: 创建者
    columnType: varchar(64)
    javaType: String
    javaField: createBy
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  create_time:
    columnComment: 创建时间
    columnType: datetime
    javaType: Date
    javaField: createTime
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

  update_by:
    columnComment: 更新者
    columnType: varchar(64)
    javaType: String
    javaField: updateBy
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  update_time:
    columnComment: 更新时间
    columnType: datetime
    javaType: Date
    javaField: updateTime
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

  remark:
    columnComment: 备注
    columnType: varchar(500)
    javaType: String
    javaField: remark
    isInsert: true
    isEdit: true
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: textarea
    dictType: ""

# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: approval
  functionName: 立项审核
  parentMenuId: 2059  # 项目管理一级菜单

# ============================
# 实际代码路径
# ============================
# Controller:  ProjectApprovalController.java  → /project/approval/**
# Service:     IProjectApprovalService.java / ProjectApprovalServiceImpl.java
# Domain:      ProjectApproval.java（pm_project_approval 表实体）
# Mapper:      ProjectApprovalMapper.xml
# Vue 工作台:  ruoyi-ui/src/views/project/approval/index.vue（审核工作台，非普通CRUD页面）
# API:         ruoyi-ui/src/api/project/approval.js
# 权限前缀:    project:approval:*

# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # --------------------------------------------------
  # 1. 审核工作台：列表页面
  # --------------------------------------------------
  approval_workbench_list:
    intent: "审核工作台：查询项目列表（来自 pm_project）、合计行、动态表格高度"
    component:
      type: "custom"
      spec: |
        容器与布局：
        - div class="app-container approval-container"
        - approval-container flex 列布局（height: 100%，flex-direction: column）
        - 分页固定底部

        el-table 属性：border stripe :height="tableHeight" :row-class-name="tableRowClassName"

        数据加载：getList() 串行调用两个接口：
        1. getApprovalProjectList(queryParams) → GET /project/approval/projectList
           - 后端委托 projectService.selectProjectList(project) 查询 pm_project 表
           - 返回后立即渲染列表，合计行先用占位符 '-'
        2. 在 .then() 内异步调用 getApprovalProjectSummary(queryParams) → GET /project/approval/projectSummary
           - 后端委托 projectService.selectProjectSummary(project) 聚合预算合计
           - 返回后更新 projectList[0]（合计行）为格式化金额

        合计行（summary row）：
        - 当 rows.length > 0 时，先在列表最前面插入占位合计行 { isSummaryRow: true, projectBudget: '-' }
        - summary 接口返回后更新为：
          { isSummaryRow: true, projectBudget: formatAmount(summaryRes.data.projectBudget) }
        - tableRowClassName：isSummaryRow 返回 'summary-row'
        - 合计行只在"序号"列显示"合计"文字（加粗），在"项目预算(元)"列显示格式化后的金额（加粗）
        - 其余列对合计行不渲染（v-if="!scope.row.isSummaryRow"）
        - summary-row 样式：background-color: #f5f7fa; font-weight: bold
        - summary-row:hover 保持背景色不变

        列展示顺序（13列+操作列）：
        1.  序号（width=55, fixed="left"）：合计行显示"合计"，其他行显示 $index
        2.  项目名称（min-width=200, fixed="left", show-overflow-tooltip）
        3.  项目编号（min-width=160, show-overflow-tooltip，无则显示 '-'）
        4.  项目分类（min-width=120, dict-tag :options="sys_xmfl"）
        5.  行业（min-width=100, dict-tag :options="industry"）
        6.  区域（min-width=100, dict-tag :options="sys_yjqy"）
        7.  项目状态（min-width=100, dict-tag :options="sys_xmzt"）
        8.  审核状态（min-width=110, dict-tag :options="sys_spzt"）
        9.  项目部门（min-width=130, show-overflow-tooltip）：调用前端 getDeptName(scope.row.projectDept)
        10. 项目经理（min-width=90, prop="projectManagerName"）
        11. 申请人（min-width=90, prop="createBy"）
        12. 申请时间（min-width=110, parseTime 格式化 '{y}-{m}-{d}'）
        13. 项目预算(元)（min-width=130, align="right"）：formatAmount 格式化，合计行加粗
        14. 操作（width=120, fixed="right"）：
            - 待审核(status='0') 或 退回待审核(status='3')：显示"审核"按钮（link primary）
            - 审核通过(status='1')：显示"退回"按钮（link warning）
            - 审核拒绝(status='2')：不显示操作按钮
            - 权限：v-hasPermi="['project:approval:approve']"

        格式化函数：
        - formatAmount(val)：Number(val).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})，null/空返回 '-'

        动态表格高度：
        - tableHeight = ref(600)
        - calcTableHeight()：windowHeight - (showSearch?160:0) - 50(toolbar) - 50(pagination) - 120(padding)
        - onMounted + resize 监听 + onUnmounted 移除 + watch(showSearch)

        useDict 依赖（5个）：sys_spzt, sys_xmfl, industry, sys_yjqy, sys_xmzt
    bindTo: "projectList"
    service:
      endpoint: "GET /project/approval/projectList  +  GET /project/approval/projectSummary"
      source: "ProjectApprovalController 委托给 IProjectService"
      returns: "TableDataInfo<Project>  +  AjaxResult<Map>"
      newApi: false
    notes: |
      审核工作台查询的是 pm_project 表（非 pm_project_approval），通过代理端点保持权限统一。
      列表默认无审核状态过滤，用户可以通过查询条件筛选。

  # --------------------------------------------------
  # 2. 查询条件
  # --------------------------------------------------
  search_form:
    intent: "7个查询条件：项目名称 remote select、编号文本输入、5个下拉选；label-width 100px"
    component:
      type: "custom"
      spec: |
        el-form :inline="true" label-width="100px" v-show="showSearch"

        查询字段（按顺序）：
        1. 项目名称（el-select remote filterable clearable, style="width:200px"）：
           - :remote-method="remoteQueryProjectNames" :loading="loadingProjectNames"
           - queryParams.projectName（String）
           - el-option v-for="item in projectNameOptions"
           - remoteQueryProjectNames(query)：调用 searchProjects(query)（来自 @/api/project/project）
             返回 res.data.map(p => ({ value: p.projectName, label: p.projectName }))

        2. 项目编号（el-input clearable, @keyup.enter="handleQuery", style="width:200px"）
           - queryParams.projectCode

        3. 项目分类（dict-select, dict-type="sys_xmfl", style="width:200px"）
           - queryParams.projectCategory

        4. 行业（dict-select, dict-type="industry", style="width:200px"）
           - queryParams.industry

        5. 区域（dict-select, dict-type="sys_yjqy", style="width:200px"）
           - queryParams.region

        6. 项目状态（dict-select, dict-type="sys_xmzt", style="width:200px"）
           - queryParams.projectStatus

        7. 审核状态（dict-select, dict-type="sys_spzt", style="width:200px"）
           - queryParams.approvalStatus，默认 null（不过滤，显示全部）
           - 重置时 approvalStatus 清空为 null（不强制重置为 '0'）

        查询按钮："搜索"（type=primary icon=Search），重置按钮："重置"（icon=Refresh）

        queryParams 默认值：
        { pageNum:1, pageSize:10, projectName:null, projectCode:null, projectCategory:null,
          industry:null, region:null, projectStatus:null, approvalStatus:null }

        工具栏：仅 right-toolbar（showSearch 开关），无新增/导出按钮
    bindTo: "queryParams"
    service:
      endpoint: "GET /project/project/search?projectName=xxx"
      source: "searchProjects API，来自 @/api/project/project，用于项目名称 remote search"
      returns: "{ data: [{ projectName }] }"
      newApi: false
    notes: |
      项目名称使用 el-select remote（非 el-autocomplete），与项目管理列表页保持一致。
      searchProjects 来自 @/api/project/project，非 approval 模块 API。

  # --------------------------------------------------
  # 3. 部门名称前端构建
  # --------------------------------------------------
  dept_name_display:
    intent: "前端 getDeptName() 根据 deptId 从缓存的部门列表中构建层级路径"
    component:
      type: "custom"
      spec: |
        在 onMounted 中调用 loadDeptTree()：
        - 调用 getDeptTree()（来自 @/api/project/project）
        - 将返回的平铺部门列表存入 deptFlatList: ref([])

        getDeptName(deptId) 函数：
        1. deptId 为空返回 '-'
        2. parseInt(deptId) 在 deptFlatList 中查找对应部门
        3. 未找到返回 '-'
        4. 取 dept.ancestors.split(',') 过滤空值和 '0'
        5. 从 index=1 开始（跳过根部门）逐个查找祖先部门名称，push 到 pathDepts
        6. 最后 push 当前部门名称
        7. join('-') 返回，如"研发部-后端组"

        响应式变量：const deptFlatList = ref([])
    bindTo: "projectDept"
    service:
      endpoint: "GET /project/project/deptTree"
      source: "getDeptTree，来自 @/api/project/project"
      returns: "{ data: [{ deptId, deptName, ancestors, parentId }] }（平铺列表）"
      newApi: false
    notes: |
      getDeptTree 返回的是平铺列表（非树形结构），此处直接用于前端路径构建，无需 handleTree 转换。
      loadDeptTree() 在 onMounted 中调用，不影响列表初始加载。

  # --------------------------------------------------
  # 4. 审核对话框（通过/拒绝）
  # --------------------------------------------------
  approve_dialog:
    intent: "审核对话框：el-dialog 480px，radio 选通过/不通过，拒绝时意见必填"
    component:
      type: "el-dialog"
      props:
        title: "项目审核"
        width: "480px"
        appendToBody: true
      spec: |
        触发：操作列"审核"按钮（待审核 status='0' 或 退回待审核 status='3'）

        弹窗内容：
        1. 项目信息展示区（background: #f5f7fa, padding: 12px 16px, border-radius: 4px）：
           <p><strong>项目名称：</strong>{{ currentProject.projectName }}</p>
           <p><strong>项目编号：</strong>{{ currentProject.projectCode || '-' }}</p>

        2. el-form :model="approveForm" :rules="approveRules" label-width="90px" style="margin-top: 16px"：
           - 审核结果（prop="approvalStatus"）：el-radio-group
             * <el-radio value="1">通过</el-radio>
             * <el-radio value="2">不通过</el-radio>
             * required 验证：'请选择审核结果'（trigger: change）
           - 审核意见（prop="approvalReason"）：el-input textarea :rows="3" maxlength="500" show-word-limit
             * placeholder 动态：status='2' 时"请填写不通过原因（必填）"，否则"审核意见（可选）"
             * 自定义 validator：status='2' 且值为空 → Error('不通过时必须填写原因')（trigger: blur）

        底部：
        - 取消（@click="approveOpen = false"）
        - 确定（type="primary" @click="submitApprove"）

        handleApprove(row)：
        - currentProject.value = row
        - approveForm.value = { approvalStatus: '1', approvalReason: '' }（默认选"通过"）
        - approveOpen.value = true

        submitApprove()：
        - 表单验证通过后调用 approveProject({ projectId, approvalStatus, approvalReason })
        - 成功：msgSuccess("审核成功")，关闭弹窗，刷新列表

        响应式变量：approveOpen = ref(false), currentProject = ref({}),
                    approveForm = ref({ approvalStatus: '1', approvalReason: '' })
    bindTo: "approvalStatus"
    service:
      endpoint: "POST /project/approval/approve"
      source: "ProjectApprovalController.approve() → ProjectApprovalServiceImpl.approveProject()"
      returns: "AjaxResult"
      newApi: false
    notes: |
      后端 approveProject() 事务处理（@Transactional）：
      1. 更新 pm_project 表（approval_status, approval_reason, approver_id(String), approval_time, update_by, update_time）
      2. 插入 pm_project_approval 表（project_id, approval_status, approval_reason, approver_id(Long), approval_time, create_time）
      注意：approverId 类型不一致——pm_project.approver_id 为 varchar，保存 String.valueOf(userId)；
             pm_project_approval.approver_id 为 bigint，保存 SecurityUtils.getUserId()

  # --------------------------------------------------
  # 5. 退回对话框
  # --------------------------------------------------
  rollback_dialog:
    intent: "退回对话框：el-dialog 480px，退回原因必填，仅对审核通过的项目生效"
    component:
      type: "el-dialog"
      props:
        title: "退回项目"
        width: "480px"
        appendToBody: true
      spec: |
        触发：操作列"退回"按钮（仅在 approvalStatus='1' 即审核通过时显示）

        弹窗内容：
        1. 项目信息展示区（同审核对话框样式）：
           <p><strong>项目名称：</strong>{{ currentProject.projectName }}</p>
           <p><strong>项目编号：</strong>{{ currentProject.projectCode || '-' }}</p>

        2. el-form :model="rollbackForm" :rules="rollbackRules" label-width="90px" style="margin-top: 16px"：
           - 退回原因（prop="rollbackReason"）：el-input textarea :rows="3" maxlength="500" show-word-limit
             placeholder="请填写退回原因"
             * required 验证：'请填写退回原因'（trigger: blur）

        底部：
        - 取消（@click="rollbackOpen = false"）
        - 确认退回（type="warning" @click="submitRollback"）

        handleRollback(row)：
        - currentProject.value = row
        - rollbackForm.value = { rollbackReason: '' }
        - rollbackOpen.value = true

        submitRollback()：
        - 表单验证通过后调用 rollbackProject({ projectId, rollbackReason })
        - 成功：msgSuccess("退回成功")，关闭弹窗，刷新列表

        响应式变量：rollbackOpen = ref(false),
                    rollbackForm = ref({ rollbackReason: '' })
    bindTo: "approvalStatus"
    service:
      endpoint: "POST /project/approval/rollback"
      source: "ProjectApprovalController.rollback() → ProjectApprovalServiceImpl.rollbackProject()"
      returns: "AjaxResult"
      newApi: false
    notes: |
      后端 rollbackProject() 事务处理（@Transactional）：
      1. 校验：查 pm_project 当前 approvalStatus，必须为 '1'（审核通过），否则 throw ServiceException("只有审核通过的项目才能退回")
      2. 更新 pm_project.approval_status = '3'（退回待审核）
      3. 插入 pm_project_approval 记录（approval_status='3', approval_reason=rollbackReason）

  # --------------------------------------------------
  # 6. 审核状态流转与状态值
  # --------------------------------------------------
  approval_status_flow:
    intent: "四态审核状态流转：待审核 → 通过/拒绝 → 退回，状态值对应 sys_spzt 字典"
    component:
      type: "custom"
      spec: |
        审核状态（sys_spzt 字典）完整值：
        - '0' = 待审核
        - '1' = 审核通过
        - '2' = 审核拒绝
        - '3' = 退回待审核

        状态流转：
        - 0（待审核）→ 1（审核通过）：点击"审核"→ 选择"通过" → submitApprove
        - 0（待审核）→ 2（审核拒绝）：点击"审核"→ 选择"不通过"→ submitApprove（原因必填）
        - 1（审核通过）→ 3（退回待审核）：点击"退回"→ submitRollback（原因必填）
        - 2（审核拒绝）→ 重新申请（项目编辑后重新提交，将 approval_status 改回 '0'，与审核模块无关）
        - 3（退回待审核）→ 1 或 2：项目退回后重新显示"审核"按钮

        操作按钮与状态对应（操作列）：
        - status='0' 或 status='3'：显示"审核"按钮（link primary）
        - status='1'：显示"退回"按钮（link warning）
        - status='2'：不显示操作按钮

        pm_project_approval 记录类型（按 approval_status 区分）：
        - '1'：审核通过记录
        - '2'：审核拒绝记录（含拒绝原因）
        - '3'：退回记录（含退回原因）
        注意：'0'（待审核）状态不主动插入 approval 记录，项目申请由 pm_project 表本身记录
    bindTo: "approvalStatus"
    service: null
    notes: |
      pm_project.approval_status 和 pm_project_approval.approval_status 使用相同的状态编码。
      sys_spzt 字典必须包含 '3'='退回待审核' 值，否则 dict-tag 无法正确显示。

  # --------------------------------------------------
  # 7. 审核历史记录
  # --------------------------------------------------
  approval_history:
    intent: "pm_project_approval 表存储每次审核操作的历史记录，支持按 projectId 查询"
    component:
      type: "custom"
      spec: |
        pm_project_approval 表字段：
        - approval_id（主键）、project_id、approval_status（0/1/2/3）、approval_reason
        - approver_id（bigint，保存 SecurityUtils.getUserId()）、approval_time
        - del_flag, create_by, create_time, update_by, update_time, remark

        查询历史接口：GET /project/approval/history/{projectId}
        - 权限：@ss.hasAnyPermi('project:approval:query,project:project:list,project:project:query')
        - 实现：selectProjectApprovalList(query where project_id = projectId)
        - 返回：List<ProjectApproval>（按时间顺序）
        - 供项目详情/列表页面查看审核历史使用

        标准 CRUD（pm_project_approval 表管理）：
        - GET  /project/approval/list        → 查询审核记录列表（权限: project:approval:list）
        - GET  /project/approval/{approvalId} → 查询单条记录（权限: project:approval:query）
        - POST /project/approval             → 新增（权限: project:approval:add）
        - PUT  /project/approval             → 修改（权限: project:approval:edit）
        - DELETE /project/approval/{ids}    → 删除（权限: project:approval:remove）
    bindTo: null
    service:
      endpoint: "GET /project/approval/history/{projectId}"
      source: "ProjectApprovalController.history()"
      returns: "AjaxResult<List<ProjectApproval>>"
      newApi: false
    notes: |
      selectApprovalHistory 内部复用 selectProjectApprovalList(query with projectId) 实现，
      无需独立的 Mapper 方法。

  # --------------------------------------------------
  # 8. 权限控制
  # --------------------------------------------------
  permission_control:
    intent: "审核工作台权限配置：project:approval:* 前缀，approve 操作需独立权限"
    component:
      type: "custom"
      spec: |
        ProjectApprovalController 各接口权限：
        - GET  /list            → @PreAuthorize("@ss.hasPermi('project:approval:list')")
        - POST /export          → @PreAuthorize("@ss.hasPermi('project:approval:export')")
        - GET  /{approvalId}   → @PreAuthorize("@ss.hasPermi('project:approval:query')")
        - POST /               → @PreAuthorize("@ss.hasPermi('project:approval:add')")
        - PUT  /               → @PreAuthorize("@ss.hasPermi('project:approval:edit')")
        - DELETE /{ids}        → @PreAuthorize("@ss.hasPermi('project:approval:remove')")
        - POST /approve        → @PreAuthorize("@ss.hasPermi('project:approval:approve')")
        - POST /rollback       → @PreAuthorize("@ss.hasPermi('project:approval:approve')")（复用同一权限）
        - GET  /history/{id}   → @PreAuthorize("@ss.hasAnyPermi('project:approval:query,project:project:list,project:project:query')")
        - GET  /projectList    → @PreAuthorize("@ss.hasPermi('project:approval:list')")
        - GET  /projectSummary → @PreAuthorize("@ss.hasPermi('project:approval:list')")

        前端权限指令：
        - 审核/退回按钮：v-hasPermi="['project:approval:approve']"

        菜单结构：
        - 父菜单：项目管理（parent_id: 2059）
        - 菜单名称：立项审核
        - path: approval
        - component: project/approval/index
        - menu_type: C（菜单）
        - perms: project:approval:list

        按钮权限（6个）：
        1. 立项审核查询：perms=project:approval:query，order_num=1
        2. 立项审核新增：perms=project:approval:add，order_num=2
        3. 立项审核修改：perms=project:approval:edit，order_num=3
        4. 立项审核删除：perms=project:approval:remove，order_num=4
        5. 立项审核导出：perms=project:approval:export，order_num=5
        6. 立项审核操作：perms=project:approval:approve，order_num=6（审核/退回操作专用权限）
    bindTo: "menu"
    service: null
    notes: |
      approve 和 rollback 复用同一个权限 project:approval:approve，
      无需单独设置退回权限，简化权限管理。


# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # --------------------------------------------------
  # 1. 列表页面布局
  # --------------------------------------------------
  list_page_layout:
    intent: "客户列表展示：序号列、联系人折叠展开、仅单行操作、分页固定底部、动态表格高度"
    component:
      type: "custom"
      spec: |
        容器与布局：
        - 外层 div 使用 class="app-container customer-container"
        - customer-container 使用 flex 列布局（height: 100%; display: flex; flex-direction: column）
        - 以此确保分页组件始终固定在页面底部

        el-table 属性：border（显示列间竖线分隔）、:height="tableHeight"（动态高度）

        列展示顺序：
        1. 序号（type="index", width="55"）
        2. 客户简称（align="center"）
        3. 客户全称（align="center"）
        4. 所属行业（dict-tag, dictType: industry）
        5. 所属区域（dict-tag, dictType: sys_yjqy）
        6. 销售负责人（后端关联字段 salesManagerName，无则显示 '-'）
        7. 办公地址（show-overflow-tooltip）
        8. 创建时间（格式: yyyy-MM-dd）
        9. 操作列（详情、编辑、删除）——仅单行操作，无批量操作入口
        10. 展开列（type="expand"，放在最后）：展开后嵌套 el-table 展示该客户所有联系人
            - 联系人嵌套表格字段：联系人姓名、联系人电话、联系人标签（dict-tag: contact_tag）
            - 无联系人时显示"暂无联系人信息"

        顶部工具栏（el-row gutter=10 class="mb8"）：
        - 新增（primary, v-hasPermi: project:customer:add）
        - 导出（warning, v-hasPermi: project:customer:export）
        - right-toolbar（showSearch 开关）
        - 无批量修改、无批量删除按钮

        不使用 type="selection" 多选列，无 ids/single/multiple 响应式变量。

        分页组件（pagination）紧跟 el-table 后，对话框之前：
        - margin-top: 15px; text-align: right

        动态表格高度计算：
        - const tableHeight = ref(600)
        - calcTableHeight()：tableHeight = windowHeight - searchHeight(showSearch?100:0) - 50(toolbar) - 50(pagination) - 120(padding)
        - onMounted：calcTableHeight() + window.addEventListener('resize', calcTableHeight)
        - onUnmounted：window.removeEventListener('resize', calcTableHeight)
        - watch(showSearch, calcTableHeight)

        查询按钮文字使用"查询"（不用"搜索"），重置按钮保持"重置"。
    bindTo: "customerList"
    service: null
    notes: |
      salesManagerName 直接使用后端关联查询结果，前端无需转换。
      联系人数据从 customerContactList 属性获取（列表查询使用 CustomerCustomerContactResult 结果集，自动关联联系人）。

  # --------------------------------------------------
  # 2. 查询条件
  # --------------------------------------------------
  search_form:
    intent: "查询条件：客户简称 autocomplete 前端过滤、行业/区域/销售负责人下拉选、label-width 90px"
    component:
      type: "custom"
      spec: |
        el-form label-width="90px"（依据最长 label"销售负责人"5个汉字 ≈ 90px）

        查询字段（按顺序）：
        1. 客户简称（el-autocomplete）：
           - :fetch-suggestions="querySearchCustomer"，clearable，@keyup.enter="handleQuery"
           - queryParams.customerSimpleName（String，LIKE 查询）
           - 数据来源：loadCustomerSimpleNames() 在 onMounted 调用
             调用 listCustomer({ pageNum: 1, pageSize: 10000 })，提取 customerSimpleName
             存入 customerSimpleNameList：[{ value: '客户简称1' }, ...]
           - querySearchCustomer(queryString, cb)：前端过滤，不区分大小写，支持包含匹配
           - 适用于客户数量几百以内；数量增长到上千时建议改为远程搜索

        2. 所属行业（el-select）：
           - v-for dict in industry，clearable
           - queryParams.industry

        3. 所属区域（el-select）：
           - v-for dict in sys_yjqy，clearable
           - queryParams.region

        4. 销售负责人（el-select）：
           - v-for user in salesManagerList，clearable，filterable
           - queryParams.salesManagerId
           - 数据来源：loadSalesManagers() 在 onMounted 调用
             使用 getUsersByPost('xsfzr')（来自 @/api/project/project，项目代理端点）
             返回 res.data，存入 salesManagerList
           - 选项：:key="user.userId" :label="user.nickName" :value="user.userId"

        onMounted 调用顺序：
          calcTableHeight() → loadSalesManagers() → loadCustomerSimpleNames()
    bindTo: ["customerSimpleName", "industry", "region", "salesManagerId"]
    service:
      endpoint: "GET /project/project/users?postCode=xsfzr"
      source: "项目代理端点 getUsersByPost，复用 ProjectController"
      returns: "{ data: [{ userId, nickName }] }"
      newApi: false
    notes: |
      salesManagerList 使用 getUsersByPost 而非 listUserByPost，避免跨模块 403。
      customerSimpleNameList 格式：[{ value: String }]，符合 el-autocomplete 的 fetch-suggestions 格式要求。

  # --------------------------------------------------
  # 3. 新增/编辑表单对话框
  # --------------------------------------------------
  form_dialog:
    intent: "新增/编辑对话框：1100px 宽度、2列布局、100px label-width、销售负责人使用 user-select 组件"
    component:
      type: "el-dialog"
      props:
        width: "1100px"
        appendToBody: true
      spec: |
        标题：新增时"添加客户管理"，编辑时"编辑客户信息"

        el-form label-width="100px"，使用 el-row(:gutter=20) + el-col 实现 2 列布局：
        - 第1行：客户简称（:span=12，左）、客户全称（:span=12，右）
        - 第2行：所属行业（:span=12，el-select style="width:100%"）、所属区域（:span=12，el-select style="width:100%"）
        - 第3行：销售负责人（:span=12，user-select 组件 post-code="xsfzr" clearable filterable style="width:100%"）
        - 第4行：办公地址（:span=24，textarea）
        - 第5行：备注（:span=24，textarea）

        表单验证规则（rules）：
        - customerSimpleName：required（blur）+ 异步唯一性校验（详见 simple_name_unique_validation）
        - customerAllName：required（blur）

        el-divider 分割客户基本信息与联系人区域。
    bindTo: "form"
    service: null
    notes: |
      销售负责人在表单中使用 user-select 组件（post-code="xsfzr"），
      在查询条件中使用 el-select + loadSalesManagers()，两者数据来源相同但组件不同。

  # --------------------------------------------------
  # 4. 联系人子表管理
  # --------------------------------------------------
  contact_management:
    intent: "联系人表格：列宽合理、电话 placeholder 提示、提交验证必填、行内删除"
    component:
      type: "custom"
      spec: |
        联系人编辑表格（el-table :data="customerContactList" :row-class-name="rowCustomerContactIndex"）：
        - 序号列（prop="index", width="70"）：通过 rowCustomerContactIndex 自动赋值 row.index = rowIndex + 1
        - 联系人姓名（width="160"，el-input）
        - 联系人电话（width="260"，el-input，placeholder="如：13800138000/010-88888888"，maxlength=50）
          placeholder 提示用户可用斜杠分隔同时输入手机号和座机号
        - 联系人标签（width="150"，el-select，options=contact_tag 字典）
        - 备注（min-width="120"，el-input textarea）
        - 操作（width="80"，el-button link type="danger"，文字"删除"）

        工具栏（表格上方）：只有"添加"按钮（el-button type="primary" icon="Plus"），无批量删除。

        行内删除逻辑（handleDeleteSingleContact(index)）：
        - 弹框确认："是否确认删除该联系人？"
        - 确认后 customerContactList.splice(index, 1) 从前端列表移除
        - 提交表单时，后端删除该客户所有旧联系人后重新插入当前列表中的联系人

        表单提交时验证联系人必填字段（在 submitForm 中，validateForm 通过后执行）：
        - 遍历 customerContactList，依次检查：contactName、contactPhone、contactTag
        - 任一为空：proxy.$modal.msgError(`第${i+1}个联系人的${字段名}不能为空`)，立即 return
        - 验证顺序：contactName → contactPhone → contactTag
    bindTo: ["contact_name", "contact_phone", "contact_tag", "remark"]
    service: null
    notes: |
      联系人持久化采用"删全部+重插"模式（updateCustomer 中先 deleteCustomerContactByCustomerId，再 batchCustomerContact）。
      前端行内删除 splice 后，被删除的联系人不再出现在提交数据中，无需维护 delFlag。

  # --------------------------------------------------
  # 5. 客户详情弹窗
  # --------------------------------------------------
  customer_detail_dialog:
    intent: "操作栏详情按钮，打开只读详情弹窗，支持从详情跳转编辑"
    component:
      type: "el-dialog"
      props:
        title: "客户详情"
        width: "900px"
        appendToBody: true
      spec: |
        触发：操作栏"详情"按钮，v-hasPermi="['project:customer:query']"

        弹窗结构：
        1. section 标题"客户基本信息"（detail-section-title 样式：左侧 3px #409eff 边框，14px 600）
           el-descriptions :column="2" border：
           - 客户简称、客户全称
           - 所属行业（dict-tag: industry）、所属区域（dict-tag: sys_yjqy）
           - 销售负责人（salesManagerName，无则 '-'）、办公地址（无则 '-'）
           - 创建日期（parseTime '{y}-{m}-{d} {h}:{i}:{s}'）、更新日期（同格式）
           - 备注（:span="2"，无则 '-'）

        2. section 标题"联系人信息"（margin-top: 20px）
           el-table border，:data="detailData.customerContactList || []"：
           - 序号（type="index", width=60）
           - 联系人姓名、联系人电话
           - 联系人标签（dict-tag: contact_tag）
           - 备注、创建时间（yyyy-MM-dd HH:mm:ss）

        3. 底部按钮（右对齐）：
           - 编辑（type="primary"）：openDetail=false，调用 handleUpdate(detailData.value)
           - 关闭：openDetail=false

        新增响应式变量：openDetail = ref(false)，detailData = ref({})
        handleDetail(row)：调用 getCustomer(row.customerId)，赋值 detailData，打开弹窗
        handleDetailEdit()：关闭详情弹窗，调用 handleUpdate(detailData.value)
    bindTo: "customerId"
    service:
      endpoint: "GET /project/customer/{customerId}"
      source: "复用 getCustomer，已有接口"
      returns: "{ data: { ...customer, customerContactList: [...] } }"
      newApi: false
    notes: "操作栏按钮顺序：详情 → 编辑 → 删除"

  # --------------------------------------------------
  # 6. Excel 导出
  # --------------------------------------------------
  excel_export:
    intent: "导出：列顺序与列表一致、字典值用名称导出、文件名含时间戳"
    component:
      type: "custom"
      spec: |
        Customer.java 实体类 @Excel 注解配置：
        - industry、region、salesManagerId 字段本身不加 @Excel（存储用，非展示用）
        - 以下显示字段添加 @Excel 并用 sort 控制顺序：
          * industryName：@Excel(name = "所属行业", sort = 3)——由 JOIN sys_dict_data 填充
          * regionName：@Excel(name = "所属区域", sort = 4)——由 JOIN sys_dict_data 填充
          * salesManagerName：@Excel(name = "销售负责人", sort = 5)——由 JOIN sys_user 填充
        - 其余字段：
          * customerSimpleName：@Excel(name = "客户简称", sort = 1)
          * customerAllName：@Excel(name = "客户全称", sort = 2)
          * officeAddress：@Excel(name = "办公地址", sort = 6)

        导出列顺序（与列表页面一致）：
        1. 客户简称  2. 客户全称  3. 所属行业  4. 所属区域  5. 销售负责人  6. 办公地址
        注意：联系人数据是动态展开展示，不导出到 Excel。

        导出文件名：客户信息_${new Date().getTime()}.xlsx
        前端 handleExport()：proxy.download('project/customer/export', {...queryParams.value}, `客户信息_${new Date().getTime()}.xlsx`)
    bindTo: ["customer_simple_name", "customer_all_name", "industry", "region", "sales_manager_id", "office_address"]
    service: null
    notes: |
      后端 CustomerController.export 使用 @PreAuthorize("@ss.hasPermi('project:customer:export')")。
      ExcelUtil 直接读取 @Excel 注解，sort 值决定列顺序，无需额外排序逻辑。

  # --------------------------------------------------
  # 7. 客户简称唯一性验证
  # --------------------------------------------------
  simple_name_unique_validation:
    intent: "客户简称前后端双重唯一性校验：失焦实时提示 + 提交前服务端兜底"
    component:
      type: "custom"
      spec: |
        前端表单验证规则（rules.customerSimpleName）：
        - required: true, trigger: "blur"
        - 自定义异步 validator, trigger: "blur"：
          * 值为空时跳过（由 required 规则处理）
          * 调用 checkCustomerSimpleNameUnique(value, form.value.customerId)
          * 返回 false → callback(new Error("客户简称已存在"))
          * 返回 true → callback()
        效果：输入后失焦立即验证，修改后再次失焦重新验证

        后端接口：GET /project/customer/checkSimpleNameUnique
        - 参数：customerSimpleName（String）、customerId（Long，编辑时传入，新增时为 null）
        - 权限：@PreAuthorize("@ss.hasPermi('project:customer:list')")
        - 返回：{ data: true（唯一）/ false（重复） }
        - 查询逻辑：精确匹配 customer_simple_name（LIKE 参数传空字符串以触发精确匹配）
          新增：查到即重复；编辑：排除当前 customerId 后判断

        服务端兜底（insertCustomer / updateCustomer）：
        - 调用 checkCustomerSimpleNameUnique 验证，重复时 throw new RuntimeException("客户简称已存在")
    bindTo: "customerSimpleName"
    service:
      endpoint: "GET /project/customer/checkSimpleNameUnique?customerSimpleName={name}&customerId={id}"
      source: "新增接口"
      returns: "{ data: true/false }"
      newApi: true
    notes: |
      前端 import checkCustomerSimpleNameUnique from "@/api/project/customer"
      API 文件需添加：export function checkCustomerSimpleNameUnique(customerSimpleName, customerId)

  # --------------------------------------------------
  # 8. 删除行为
  # --------------------------------------------------
  delete_behavior:
    intent: "删除：仅支持单行删除，确认提示含客户简称，物理删除客户及其联系人"
    component:
      type: "custom"
      spec: |
        单行删除（handleDelete(row)）：
        - 确认提示："是否确认删除客户简称为"${row.customerSimpleName}"的数据项及其所有关联数据，且无法恢复！是否继续？"
        - 确认后调用 delCustomer(row.customerId)，成功后刷新列表
        - 操作栏仅有单行删除按钮，顶部工具栏不提供批量删除入口

        后端删除逻辑（deleteCustomerByCustomerIds / deleteCustomerByCustomerId）：
        - 先物理删除该客户的所有联系人（DELETE FROM pm_customer_contact WHERE customer_id = ?）
        - 再物理删除客户本身（DELETE FROM pm_customer WHERE customer_id = ?）
        - 删除操作使用 @Transactional 保证原子性

        查询过滤：selectCustomerList 中添加 WHERE c.del_flag = '0' 条件（pm_customer 表有 del_flag 字段，
        insert 时不传 del_flag，由数据库默认值 '0' 填充；delete 为物理删除，del_flag 字段用于数据安全过滤）
    bindTo: ["customer", "customerContact"]
    service: null
    notes: |
      pm_customer_contact 表的联系人删除在两种情况下发生：
      1. 编辑客户时：先删除该客户全部联系人，再批量插入表单中当前的联系人列表（delete + reinsert 模式）
      2. 删除客户时：级联删除该客户所有联系人（物理删除）

  # --------------------------------------------------
  # 9. MyBatis 字符集与关联查询
  # --------------------------------------------------
  charset_collation_fix:
    intent: "JOIN 系统表时显式指定排序规则，同时关联查询行业/区域/销售负责人名称"
    component:
      type: "custom"
      spec: |
        问题背景：pm_customer 表默认使用 utf8mb4_0900_ai_ci（MySQL 8.0 默认），
        系统表（sys_dict_data、sys_user）使用 utf8mb4_unicode_ci，
        JOIN 时不加 COLLATE 会报：
        "Illegal mix of collations (utf8mb4_0900_ai_ci,IMPLICIT) and (utf8mb4_unicode_ci,IMPLICIT)"

        CustomerMapper.xml 中 selectCustomerList 和 selectCustomerByCustomerId 均需：
        - LEFT JOIN sys_dict_data d1 ON c.industry COLLATE utf8mb4_unicode_ci = d1.dict_value AND d1.dict_type = 'industry'
        - LEFT JOIN sys_dict_data d2 ON c.region COLLATE utf8mb4_unicode_ci = d2.dict_value AND d2.dict_type = 'sys_yjqy'
        - LEFT JOIN sys_user u ON c.sales_manager_id = u.user_id（数字类型无需 COLLATE）

        SELECT 中增加：
        - d1.dict_label as industry_name
        - d2.dict_label as region_name
        - u.nick_name as sales_manager_name

        CustomerResult resultMap 增加映射：
        - <result property="industryName" column="industry_name"/>
        - <result property="regionName" column="region_name"/>
        - <result property="salesManagerName" column="sales_manager_name"/>

        CustomerCustomerContactResult extends CustomerResult，collection 关联联系人子查询：
        - <collection property="customerContactList" ofType="CustomerContact" column="customer_id" select="selectCustomerContactList"/>

        selectCustomerContactList 只用 WHERE customer_id = #{customer_id}（无 del_flag 过滤，
        因为联系人通过 delete+reinsert 模式维护，表中数据始终为最新有效数据）。

        Customer.java 实体类需添加三个非 DB 字段及 getter/setter：
        - private String industryName;
        - private String regionName;
        - private String salesManagerName;
    bindTo: ["industry", "region", "sales_manager_id"]
    service: null
    notes: |
      selectCustomerList 用于列表分页查询，结果集使用 CustomerCustomerContactResult（自动关联联系人）。
      selectCustomerByCustomerId 用于详情/编辑查询，同样使用 CustomerCustomerContactResult。
      排序：ORDER BY c.update_time DESC

  # --------------------------------------------------
  # 10. 数据访问权限控制
  # --------------------------------------------------
  data_access_permissions:
    intent: "跨模块访问权限：list/getInfo 接口开放给项目和合同模块，新增 listAll 下拉接口"
    component:
      type: "custom"
      spec: |
        CustomerController 各接口权限注解：

        GET /list（列表查询，供客户管理页和合同/项目页面跨模块调用）：
        @PreAuthorize("@ss.hasAnyPermi('project:customer:list,project:project:edit,project:project:add,project:contract:list,project:contract:query')")

        POST /export（导出）：
        @PreAuthorize("@ss.hasPermi('project:customer:export')")

        GET /{customerId}（详情，供项目编辑页查询客户信息）：
        @PreAuthorize("@ss.hasAnyPermi('project:customer:query,project:project:query,project:project:edit')")

        GET /checkSimpleNameUnique（唯一性检查）：
        @PreAuthorize("@ss.hasPermi('project:customer:list')")

        POST /（新增）：
        @PreAuthorize("@ss.hasPermi('project:customer:add')")

        PUT /（修改）：
        @PreAuthorize("@ss.hasPermi('project:customer:edit')")

        DELETE /{customerIds}（删除）：
        @PreAuthorize("@ss.hasPermi('project:customer:remove')")

        GET /contact/listByCustomer（按客户ID查询联系人列表）：
        @PreAuthorize("@ss.hasAnyPermi('project:customer:list,project:project:query,project:project:edit,project:project:add')")
        - 参数：customerId（Long，必填）
        - 返回：{ data: [CustomerContact] }
        - 供项目详情/编辑页独立查询联系人使用

        GET /listAll（查询所有客户，供合同/下拉选择用）：
        @PreAuthorize("@ss.hasAnyPermi('project:customer:list,project:contract:list,project:contract:add,project:contract:edit,project:contract:query,project:payment:list')")
        - 无分页，返回全量客户列表：{ data: [Customer] }
        - 对应 API：listAllCustomer()，位于 @/api/project/customer
    bindTo: "menu"
    service: null
    notes: |
      使用 @ss.hasAnyPermi（逗号分隔多权限字符串）而非 @ss.hasPermi，
      避免合同/项目页面调用客户接口时因缺少 customer 权限而 403。

  # --------------------------------------------------
  # 11. 菜单结构与权限配置
  # --------------------------------------------------
  menu_structure_and_permissions:
    intent: "客户信息管理的菜单层级和按钮权限配置"
    component:
      type: "custom"
      spec: |
        一级菜单：市场管理
        - 菜单名称：市场管理
        - parent_id: 0（顶级）
        - order_num: 4
        - path: market
        - menu_type: M（目录）
        - icon: chart
        - perms: ''

        二级菜单：客户信息
        - 菜单名称：客户信息
        - parent_id: @marketMenuId（市场管理 ID）
        - order_num: 1
        - path: customer
        - component: project/customer/index
        - menu_type: C（菜单）
        - icon: peoples
        - perms: project:customer:list

        注意：genInfo.parentMenuId 为代码生成初始值，实际菜单需挂在"市场管理"下，
        生成后需将 parent_id 更新为市场管理的实际 menu_id。

        按钮权限（5个，无"客户信息查询"按钮，由 list 接口权限控制访问）：
        1. 客户信息新增：perms=project:customer:add，order_num=2，menu_type=F
        2. 客户信息修改：perms=project:customer:edit，order_num=3，menu_type=F
        3. 客户信息删除：perms=project:customer:remove，order_num=4，menu_type=F
        4. 客户信息导出：perms=project:customer:export，order_num=5，menu_type=F
        5. 客户信息详情：perms=project:customer:query，order_num=6，menu_type=F
           前端详情按钮：v-hasPermi="['project:customer:query']"

        前端权限指令示例：
        - 新增：v-hasPermi="['project:customer:add']"
        - 编辑：v-hasPermi="['project:customer:edit']"
        - 删除：v-hasPermi="['project:customer:remove']"
        - 导出：v-hasPermi="['project:customer:export']"
        - 详情：v-hasPermi="['project:customer:query']"
    bindTo: "menu"
    service: null
    notes: |
      菜单数据位置：pm-sql/init/02_menu_data.sql
      权限格式：{模块}:{业务}:{操作}，模块=project，业务=customer

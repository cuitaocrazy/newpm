basicInfo:
  tableName: pm_production_batch
  tableComment: 投产批次管理
  className: ProductionBatch
  functionAuthor: ruoyi
  remark: ""

columns:
  batch_id:
    columnComment: 批次ID
    columnType: bigint
    javaType: Long
    javaField: batchId
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  batch_no:
    columnComment: 批次号
    columnType: varchar(50)
    javaType: String
    javaField: batchNo
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: true
    htmlType: select
    dictType: ""
    excelConfig:
      export: true
      name: 批次号

  sort_order:
    columnComment: 排序
    columnType: int
    javaType: Integer
    javaField: sortOrder
    isInsert: true
    isEdit: true
    isList: true
    isQuery: false
    queryType: EQ
    isRequired: true
    htmlType: input
    dictType: ""
    excelConfig:
      export: true
      name: 排序

  production_year:
    columnComment: 投产年份
    columnType: varchar(10)
    javaType: String
    javaField: productionYear
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    queryType: EQ
    isRequired: true
    htmlType: select
    dictType: sys_ndgl
    excelConfig:
      export: true
      name: 投产年份
      notes: "Java @Excel(name='投产年份')，无 dictType 注解；导出时原始字典值（不含 readConverterExp）"

  plan_production_date:
    columnComment: 计划投产日期
    columnType: date
    javaType: Date
    javaField: planProductionDate
    isInsert: true
    isEdit: true
    isList: true
    isQuery: true
    queryType: BETWEEN
    isRequired: true
    htmlType: datetime
    dictType: ""
    excelConfig:
      export: true
      name: 计划投产日期
      dateFormat: yyyy-MM-dd

  remark:
    columnComment: 备注
    columnType: varchar(500)
    javaType: String
    javaField: remark
    isInsert: true
    isEdit: true
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: textarea
    dictType: ""

genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: productionBatch
  functionName: 投产批次管理
  parentMenuId: 1

customizations:
  batch_no_select:
    intent: "查询条件的批次号改为下拉选，数据从本表 batch_no 列获取"
    component:
      type: el-select
      props:
        clearable: true
        placeholder: "请选择批次号"
    bindTo: batch_no
    service:
      endpoint: "GET /project/productionBatch/batchNoOptions"
      source: "new"
      returns: "[{ batchNo }]"
      newApi: true
    notes: "仅用于查询条件，新增/编辑中 batch_no 保持 input 输入"

# ============================
# 后端 API 汇总
# ============================
apiSummary:
  - "GET    /project/productionBatch/list                  → 分页列表（权限: project:productionBatch:list）"
  - "GET    /project/productionBatch/{batchId}              → 单条详情（权限: project:productionBatch:query）"
  - "POST   /project/productionBatch                       → 新增（权限: project:productionBatch:add）"
  - "PUT    /project/productionBatch                       → 修改（权限: project:productionBatch:edit）"
  - "DELETE /project/productionBatch/{batchIds}             → 删除（权限: project:productionBatch:remove）"
  - "POST   /project/productionBatch/export                → 导出 Excel（权限: project:productionBatch:export）"
  - "GET    /project/productionBatch/batchNoOptions         → 获取所有批次号下拉选项（权限: project:productionBatch:list）"
  - "GET    /project/productionBatch/byYear?productionYear=xxx → 按投产年份查询批次列表（任务管理联动），权限: @ss.hasAnyPermi('project:task:list,project:task:add')"

# ============================
# Tab 1: 基本信息
# ============================
basicInfo:
  tableName: pm_attachment
  tableComment: 业务附件管理（项目/合同/款项的附件存储）
  className: Attachment
  functionAuthor: ruoyi
  remark: |
    通用附件模块，支持多个业务对象挂载附件。
    通过 businessType + businessId 双字段定位附件归属。
    同时维护 pm_attachment_log 审计日志（上传/删除/下载操作）。
    存储路径：{业务类型}/{ID}_{名称}/{yyyyMMdd}/{UUID}.{ext}（挂载在 /app/uploadPath/）
    允许类型：doc, docx, xls, xlsx, pdf, csv, png, jpg, gif, txt, 7z, zip, gz
    最大文件大小：30 MB
    Controller：AttachmentController → /project/attachment/**


# ============================
# Tab 1: 基本信息
# ============================
basicInfo:
  tableName: pm_project_stage_change
  tableComment: 项目阶段变更记录表
  className: ProjectStageChange
  functionAuthor: ruoyi
  remark: ""

# ============================
# Tab 2: 字段信息（物理表字段）
# ============================
# DDL 使用 utf8mb4_0900_ai_ci，与 sys_user（utf8mb4_unicode_ci）JOIN 时两侧都须加 COLLATE utf8mb4_unicode_ci
columns:
  change_id:
    columnComment: 变更记录ID
    columnType: bigint
    javaType: Long
    javaField: changeId
    isInsert: false   # AUTO_INCREMENT，不由前端提交
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  project_id:
    columnComment: 项目ID（关联 pm_project.project_id）
    columnType: bigint
    javaType: Long
    javaField: projectId
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false    # 查询通过 projectNameQuery autocomplete 填入，不直接暴露 ID 查询框
    queryType: EQ
    isRequired: true
    htmlType: input
    dictType: ""

  old_stage:
    columnComment: 变更前阶段（字典 sys_xmjd，由 Service 从 pm_project.project_stage 自动读取）
    columnType: varchar(50)
    javaType: String
    javaField: oldStage
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: sys_xmjd

  new_stage:
    columnComment: 变更后阶段（字典 sys_xmjd，必填）
    columnType: varchar(50)
    javaType: String
    javaField: newStage
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: true
    htmlType: select
    dictType: sys_xmjd

  change_reason:
    columnComment: 变更原因（最长 500 字）
    columnType: varchar(500)
    javaType: String
    javaField: changeReason
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: textarea
    dictType: ""

  del_flag:
    columnComment: 删除标志（0=正常, 1=删除）
    columnType: char(1)
    javaType: String
    javaField: delFlag
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""
    notes: "Service 层固定写入 '0'，不从前端接收"

  create_by:
    columnComment: 创建者（用户名，由 Service 通过 SecurityUtils.getUsername() 自动填充）
    columnType: varchar(64)
    javaType: String
    javaField: createBy
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  create_time:
    columnComment: 创建时间（由 Service 通过 DateUtils.getNowDate() 自动填充）
    columnType: datetime
    javaType: Date
    javaField: createTime
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

  update_by:
    columnComment: 更新者
    columnType: varchar(64)
    javaType: String
    javaField: updateBy
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  update_time:
    columnComment: 更新时间
    columnType: datetime
    javaType: Date
    javaField: updateTime
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

# ============================
# Domain 扩展字段（JOIN 查询结果，非持久化）
# ============================
domainExtensions:
  # 来自 pm_project
  - field: projectName
    javaType: String
    source: "pm_project.project_name"
    excel: "项目名称"

  - field: revenueConfirmYear
    javaType: String
    source: "pm_project.revenue_confirm_year"
    excel: "收入确认年度"

  - field: confirmAmount
    javaType: BigDecimal
    source: "pm_project.confirm_amount"
    excel: "确认金额"
    notes: "单位：元，前端用 parseFloat(val).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}) 格式化"

  - field: revenueConfirmStatus
    javaType: String
    source: "pm_project.revenue_confirm_status"
    dictType: sys_srqrzt
    excel: "确认状态"

  - field: projectDept
    javaType: String
    source: "pm_project.project_dept"
    excel: "项目部门"
    notes: "存储为 dept_id 字符串，前端通过 GET /project/project/deptTree 建立 deptMap，从三级机构起拼接名称，以 ' - ' 间隔"

  - field: projectStage
    javaType: String
    source: "pm_project.project_stage（当前权威阶段）"
    dictType: sys_xmjd
    excel: "当前阶段"

  # 来自 pm_contract（一项目取最小 contract_id 的合同）
  - field: contractStatus
    javaType: String
    source: "pm_contract.contract_status"
    dictType: sys_htzt
    excel: "合同状态"

  - field: contractAmount
    javaType: BigDecimal
    source: "pm_contract.contract_amount（合同金额含税）"
    excel: "合同金额"
    notes: "单位：元，格式化同 confirmAmount"

  # 来自最新变更记录子查询（ROW_NUMBER OVER PARTITION BY project_id）
  - field: changeBy
    javaType: String
    source: "COALESCE(sys_user.nick_name, pm_project_stage_change.create_by)"
    excel: "变更人"
    notes: |
      JOIN sys_user ON psc.create_by COLLATE utf8mb4_unicode_ci = u.user_name COLLATE utf8mb4_unicode_ci
      优先取昵称，用户不存在时回退用户名
      注意：两侧都须加 COLLATE，因为 pm_project_stage_change 使用 utf8mb4_0900_ai_ci

  - field: changeTime
    javaType: Date
    source: "pm_project_stage_change.create_time（最新变更记录）"
    annotation: "@JsonFormat(pattern = \"yyyy-MM-dd HH:mm:ss\")"
    excel: "变更时间"

  # 批量操作辅助字段（domain 类中额外定义，不持久化）
  - field: projectIds
    javaType: "Long[]"
    source: "前端传入，批量变更接口专用（POST /batchChange @RequestBody）"

# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: projectStageChange
  functionName: 项目阶段变更
  parentMenuId: 2059  # 一级菜单"项目管理"的 menu_id

# ============================
# 菜单配置
# ============================
menuConfig:
  icon: Switch
  buttons:
    - name: 项目阶段变更查询
      perms: project:projectStageChange:list
    - name: 项目阶段变更详情
      perms: project:projectStageChange:query
    - name: 项目阶段变更新增
      perms: project:projectStageChange:add
    - name: 项目阶段变更修改
      perms: project:projectStageChange:edit
    - name: 项目阶段变更删除
      perms: project:projectStageChange:remove
    - name: 项目阶段变更导出
      perms: project:projectStageChange:export
  notes: "变更（单个）和批量变更均使用 add 权限"

# ============================
# 定制需求
# ============================
customizations:

  # ── 1. 核心设计理念 ───────────────────────────────────────────────────────
  design_philosophy:
    intent: "以项目为主体，一行一个项目，展示最新变更信息"
    spec: |
      列表以 pm_project 为主表，每行代表一个项目，通过子查询关联最新阶段变更记录。
      不提供独立的变更记录新增/编辑页面，所有变更操作通过 Dialog 完成。
      变更记录历史通过独立的"变更记录" Dialog 展示（不分页）。

  # ── 2. 查询区 ──────────────────────────────────────────────────────────────
  query_form:
    intent: "列表查询条件"
    spec: |
      1. 项目名称（prop="projectId"）
         - el-autocomplete，:fetch-suggestions="queryProjectList"，:debounce=300，:trigger-on-focus=false
         - v-model="projectNameQuery"（独立 ref，非 queryParams 字段）
         - @select="handleProjectSelect" → 设置 queryParams.projectId = item.projectId
         - @input="handleProjectInput" → 清空 queryParams.projectId（防止文字改变未重选）
         - 重置时同步清空 projectNameQuery 和 queryParams.projectId
         - style="width: 220px"
         - 数据来源：GET /project/project/list?projectName={keyword}&pageSize=10&pageNum=1
           返回 res.rows，suggestion 格式：{ value: projectName, projectId }

      2. 当前阶段（prop="projectStage"）
         - el-select，clearable，style="width: 160px"
         - 字典：sys_xmjd
         - 对应 queryParams.projectStage，Mapper WHERE 条件：p.project_stage = #{projectStage}

  # ── 3. 列表设计 ──────────────────────────────────────────────────────────
  list_design:
    intent: "以项目为主体的列表列顺序与展示"
    spec: |
      多选列（checkbox, 55） → 序号（type=index, 55）
      → 项目名称（align=left, header-align=center, width=220, project-name-cell class）
      → 收入确认年度（align=center, 120）
      → 确认金额(元)（align=center, 150, formatAmountYuan）
      → 合同状态（align=center, 100, dict-tag sys_htzt）
      → 合同金额(元)（align=center, 150, formatAmountYuan）
      → 确认状态（align=center, 110, dict-tag sys_srqrzt）
      → 项目部门（align=center, min-width=160, show-overflow-tooltip, formatDeptPath）
      → 当前阶段（align=center, 110, dict-tag sys_xmjd）
      → 原阶段（align=center, 110, dict-tag sys_xmjd）
      → 变更原因（align=center, min-width=120, show-overflow-tooltip）
      → 变更人（align=center, 100）
      → 变更时间（align=center, 160）
      → 操作（align=center, 160, fixed=right）

      工具栏：
      - 批量变更（icon=Switch, plain, :disabled="multiple", v-hasPermi add）
      - right-toolbar（显隐搜索）

      操作列：
      - 变更（icon=Edit, link, v-hasPermi project:projectStageChange:add）→ handleChange(row)
      - 变更记录（icon=Document, link）→ handleHistory(row)

  # ── 4. 后端 SQL 逻辑 ──────────────────────────────────────────────────────
  backend_sql:
    intent: "selectProjectStageChangeList 核心 SQL 结构"
    spec: |
      主表：pm_project p（WHERE p.del_flag = '0'）

      合同 JOIN（取每个项目最小 contract_id 的合同）：
        LEFT JOIN (
            SELECT project_id, MIN(contract_id) AS contract_id
            FROM pm_project_contract_rel
            WHERE del_flag = '0' AND rel_status = '有效'
            GROUP BY project_id
        ) pcr ON p.project_id = pcr.project_id
        LEFT JOIN pm_contract c ON pcr.contract_id = c.contract_id AND c.del_flag = '0'

      最新阶段变更 JOIN（ROW_NUMBER 取每个项目最新一条）：
        LEFT JOIN (
            SELECT change_id, project_id, old_stage, new_stage, change_reason, create_by, create_time
            FROM (
                SELECT ..., ROW_NUMBER() OVER (PARTITION BY project_id
                             ORDER BY create_time DESC, change_id DESC) AS rn
                FROM pm_project_stage_change WHERE del_flag = '0'
            ) t WHERE rn = 1
        ) psc ON p.project_id = psc.project_id

      变更人昵称：
        LEFT JOIN sys_user u ON psc.create_by COLLATE utf8mb4_unicode_ci = u.user_name COLLATE utf8mb4_unicode_ci
        列：COALESCE(u.nick_name, psc.create_by) AS change_by

      排序：ORDER BY p.update_time DESC

      Collation 注意：pm_project_stage_change 使用 utf8mb4_0900_ai_ci，sys_user 使用 utf8mb4_unicode_ci，
      两侧都须显式指定 COLLATE utf8mb4_unicode_ci

      selectHistoryByProjectId（变更历史弹窗）：
        SELECT psc.change_id, psc.project_id, psc.old_stage, psc.new_stage, psc.change_reason,
               COALESCE(u.nick_name, psc.create_by) AS create_by,   ← 映射到 createBy 字段
               psc.create_time
        FROM pm_project_stage_change psc
        LEFT JOIN sys_user u ON psc.create_by COLLATE utf8mb4_unicode_ci = u.user_name COLLATE utf8mb4_unicode_ci
        WHERE psc.project_id = #{projectId} AND psc.del_flag = '0'
        ORDER BY psc.create_time DESC, psc.change_id DESC

  # ── 5. 单项变更 Dialog ───────────────────────────────────────────────────
  single_change_dialog:
    intent: "操作列'变更'按钮，弹出 Dialog 为单个项目记录新的阶段变更"
    spec: |
      el-dialog：title="变更项目阶段 - {changeForm.projectName}"，width=520px

      表单（label-width=90px）：
      - 新阶段（prop="newStage"，必填）：el-select，sys_xmjd，style="width:100%"
      - 变更原因：el-input，type=textarea，rows=4，maxlength=500，show-word-limit（选填）
      - 变更项目数：只读文字 "1 个项目"

      handleChange(row) 初始化：
        changeForm = { projectId, projectName, currentStage: row.projectStage, newStage: null, changeReason: null }

      submitChange 提交体（POST /project/projectStageChange，@RequestBody JSON）：
        { projectId, oldStage: changeForm.currentStage, newStage, changeReason }

      Service 逻辑（insertProjectStageChange）：
        - 自动填充 delFlag='0', createBy=SecurityUtils.getUsername(), createTime=DateUtils.getNowDate()
        - 同步更新 pm_project.project_stage = newStage, update_time = NOW()
        - @Transactional

  # ── 6. 变更记录 Dialog ───────────────────────────────────────────────────
  change_history_dialog:
    intent: "操作列'变更记录'按钮，展示该项目全部阶段变更历史（倒序，不分页）"
    spec: |
      el-dialog：title="变更记录"，width=820px

      标题区：项目：<strong>{{ currentProjectName }}</strong>

      只读 el-table（border, v-loading="historyLoading"）：
      - 序号（type=index, 55）
      - 原阶段（130, dict-tag sys_xmjd, prop="oldStage"）
      - 新阶段（130, dict-tag sys_xmjd, prop="newStage"）
      - 变更原因（min-width=150, show-overflow-tooltip, prop="changeReason"）
      - 变更人（100, prop="createBy"）   ← 注意：返回的是 ProjectStageChange，用 createBy
      - 变更时间（180, prop="createTime"）← 注意：返回的是 ProjectStageChange，用 createTime

      数据加载：historyByProject(projectId) → GET /project/projectStageChange/history/{projectId}
      返回：AjaxResult，前端取 res.data（List<ProjectStageChange>，createBy 已被 COALESCE 为昵称）

  # ── 7. 批量变更 Dialog ───────────────────────────────────────────────────
  batch_change_dialog:
    intent: "工具栏'批量变更'按钮（勾选后激活），批量为多个项目记录阶段变更"
    spec: |
      工具栏按钮：icon=Switch, plain, v-hasPermi add, :disabled="multiple"（无勾选时禁用）

      el-dialog：title="批量变更项目阶段"，width=520px

      表单（label-width=90px）：
      - 新阶段（prop="newStage"，必填）：el-select，sys_xmjd，style="width:100%"
      - 变更原因：el-input，type=textarea，rows=4，maxlength=500，show-word-limit（选填）
      - 变更项目数：动态显示 "{{ selectedRows.length }} 个项目"

      submitBatchChange 提交（POST /project/projectStageChange/batchChange，@RequestBody JSON）：
        { projectIds: selectedRows.map(r => r.projectId), newStage, changeReason }

      Service 逻辑（batchChange）：
        @Transactional，循环每个 projectId：
          1. selectProjectStageByProjectId → 得到 oldStage
          2. insertProjectStageChange（含 delFlag/createBy/createTime）
          3. updateProjectStageByProjectId（同步更新 pm_project.project_stage + update_time=NOW()）

  # ── 8. 辅助函数 ──────────────────────────────────────────────────────────
  utility_functions:
    intent: "前端辅助函数"
    spec: |
      formatAmountYuan(val)：
        if (val == null || val === '') return '-'
        return parseFloat(val).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })

      formatDeptPath(deptId)：
        - 数据来源：onMounted 调用 GET /project/project/deptTree → res.data（扁平列表）
          建立 deptMap = { deptId: deptObj } 缓存
        - 算法：取 dept.ancestors 逗号分割 + 当前 deptId 组成完整 id 链
          fullPath.length > 2 ? fullPath.slice(2) : fullPath
          map(did => deptMap[did]?.deptName || String(did)).join(' - ')
        - 注意：使用代理接口 /project/project/deptTree，不直接调用 /system/dept/list

# ============================
# 后端 API 汇总
# ============================
apiSummary:
  - "GET    /project/projectStageChange/list                → 以项目为主体的分页列表"
  - "GET    /project/projectStageChange/history/{projectId} → 某项目全部变更历史（不分页）"
  - "GET    /project/projectStageChange/{changeId}          → 单条变更记录详情"
  - "POST   /project/projectStageChange                     → 新增变更记录（同步更新项目阶段）"
  - "POST   /project/projectStageChange/batchChange         → 批量变更阶段（@RequestBody JSON）"
  - "PUT    /project/projectStageChange                     → 修改变更记录"
  - "DELETE /project/projectStageChange/{changeIds}         → 删除变更记录"
  - "POST   /project/projectStageChange/export              → 导出 Excel"

# ============================
# 字典依赖
# ============================
dictDependencies:
  - sys_xmjd:   "项目阶段（旧阶段/新阶段/当前阶段/查询下拉）"
  - sys_htzt:   "合同状态"
  - sys_srqrzt: "收入确认状态"

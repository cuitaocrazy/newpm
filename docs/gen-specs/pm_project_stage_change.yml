# ============================
# Tab 1: 基本信息
# ============================
basicInfo:
  tableName: pm_project_stage_change
  tableComment: 项目阶段变更记录表
  className: ProjectStageChange
  functionAuthor: ruoyi
  remark: ""

# ============================
# Tab 2: 字段信息（物理表字段）
# ============================
# DDL 使用 utf8mb4_0900_ai_ci；与 sys_user（utf8mb4_unicode_ci）JOIN 时两侧都须加 COLLATE utf8mb4_unicode_ci
columns:
  change_id:
    columnComment: 变更记录ID
    columnType: bigint
    javaType: Long
    javaField: changeId
    isInsert: false   # AUTO_INCREMENT，不由前端提交
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  project_id:
    columnComment: 项目ID（关联 pm_project.project_id）
    columnType: bigint
    javaType: Long
    javaField: projectId
    isInsert: true
    isEdit: false
    isList: false
    isQuery: true     # 通过 el-select filterable remote 选择项目后填入，不直接暴露输入框
    queryType: EQ
    isRequired: true
    htmlType: input
    dictType: ""

  old_stage:
    columnComment: 变更前阶段（字典 sys_xmjd，由 Service 从 pm_project.project_stage 自动读取）
    columnType: varchar(50)
    javaType: String
    javaField: oldStage
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: sys_xmjd

  new_stage:
    columnComment: 变更后阶段（字典 sys_xmjd，必填）
    columnType: varchar(50)
    javaType: String
    javaField: newStage
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: true
    htmlType: select
    dictType: sys_xmjd

  change_reason:
    columnComment: 变更原因（最长 500 字）
    columnType: varchar(500)
    javaType: String
    javaField: changeReason
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: textarea
    dictType: ""

  old_project_status:
    columnComment: 变更前项目状态（字典 sys_xmzt，持久化到 pm_project_stage_change）
    columnType: varchar(50)
    javaType: String
    javaField: oldProjectStatus
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: sys_xmzt
    notes: "变更时记录，null 表示本次变更不涉及项目状态变更"

  new_project_status:
    columnComment: 变更后项目状态（字典 sys_xmzt，持久化到 pm_project_stage_change；null 则不更新）
    columnType: varchar(50)
    javaType: String
    javaField: newProjectStatus
    isInsert: true
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: select
    dictType: sys_xmzt
    notes: "null 时 Service 跳过 pm_project.project_status 的更新"

  del_flag:
    columnComment: 删除标志（0=正常, 1=删除）；DDL DEFAULT '0'，Service 层也显式写入 '0'
    columnType: char(1)
    javaType: String
    javaField: delFlag
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  create_by:
    columnComment: 创建者（用户名，由 Service 通过 SecurityUtils.getUsername() 自动填充）
    columnType: varchar(64)
    javaType: String
    javaField: createBy
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  create_time:
    columnComment: 创建时间（由 Service 通过 DateUtils.getNowDate() 自动填充）
    columnType: datetime
    javaType: Date
    javaField: createTime
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

  update_by:
    columnComment: 更新者
    columnType: varchar(64)
    javaType: String
    javaField: updateBy
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: input
    dictType: ""

  update_time:
    columnComment: 更新时间
    columnType: datetime
    javaType: Date
    javaField: updateTime
    isInsert: false
    isEdit: false
    isList: false
    isQuery: false
    queryType: EQ
    isRequired: false
    htmlType: datetime
    dictType: ""

# ============================
# Domain 扩展字段（JOIN 查询结果，非持久化）
# ============================
domainExtensions:
  # 来自 pm_project
  - field: projectName
    javaType: String
    source: "pm_project.project_name"
    excel: "项目名称"

  - field: revenueConfirmYear
    javaType: String
    source: "pm_project.revenue_confirm_year"
    excel: "收入确认年度"

  - field: confirmAmount
    javaType: BigDecimal
    source: "pm_project.confirm_amount"
    excel: "确认金额"
    notes: "单位：元，前端用 parseFloat(val).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}) 格式化"

  - field: revenueConfirmStatus
    javaType: String
    source: "pm_project.revenue_confirm_status"
    dictType: sys_srqrzt
    excel: "确认状态"

  - field: projectDept
    javaType: String
    source: "pm_project.project_dept"
    excel: "项目部门"
    notes: "存储为 dept_id 字符串，前端通过 GET /project/project/deptTree 建立 deptMap，从三级机构起拼接名称，以 ' - ' 间隔"

  - field: projectStage
    javaType: String
    source: "pm_project.project_stage（当前权威阶段）"
    dictType: sys_xmjd
    excel: "当前阶段"

  - field: region
    javaType: String
    source: "pm_project.region（一级区域，dict: sys_yjqy）"
    notes: "查询/回显用，不在列表列中直接展示"

  - field: regionId
    javaType: Long
    source: "pm_project.region_id（二级区域 FK → pm_secondary_region）"

  - field: regionName
    javaType: String
    source: "pm_secondary_region.region_name（LEFT JOIN by regionId）"
    notes: "二级区域名称，不在主列表列展示，用于查询/导出"

  - field: projectBudget
    javaType: BigDecimal
    source: "pm_project.project_budget"
    notes: "预算金额，用于导出或详情展示"

  - field: estimatedWorkload
    javaType: BigDecimal
    source: "pm_project.estimated_workload"
    notes: "预估工作量（人天），用于导出"

  - field: actualWorkloadDays
    javaType: BigDecimal
    source: "ROUND(pm_project.actual_workload/8,3) + COALESCE(pm_project.adjust_workload,0)"
    notes: "实际人天（计算字段），用于导出"

  - field: acceptanceStatus
    javaType: String
    source: "pm_project.acceptance_status（dict: sys_yszt）"
    notes: "验收状态，用于导出"

  - field: currentProjectStatus
    javaType: String
    source: "pm_project.project_status（回显用，非持久化）"
    notes: "列表显示当前项目状态，dict: sys_xmzt；区别于 oldProjectStatus/newProjectStatus（DB 列，持久化）"

  # 来自 pm_contract（一项目取最小 contract_id 的合同）
  - field: contractStatus
    javaType: String
    source: "pm_contract.contract_status"
    dictType: sys_htzt
    excel: "合同状态"

  - field: contractAmount
    javaType: BigDecimal
    source: "pm_contract.contract_amount（合同金额含税）"
    excel: "合同金额"
    notes: "单位：元，格式化同 confirmAmount"

  # 来自最新变更记录子查询（ROW_NUMBER OVER PARTITION BY project_id）
  - field: changeBy
    javaType: String
    source: "COALESCE(sys_user.nick_name, pm_project_stage_change.create_by)"
    excel: "变更人"
    notes: |
      JOIN sys_user ON psc.create_by COLLATE utf8mb4_unicode_ci = u.user_name COLLATE utf8mb4_unicode_ci
      优先取昵称，用户不存在时回退用户名
      两侧都须加 COLLATE，因为 pm_project_stage_change 使用 utf8mb4_0900_ai_ci

  - field: changeTime
    javaType: Date
    source: "pm_project_stage_change.create_time（最新变更记录）"
    annotation: "@JsonFormat(pattern = \"yyyy-MM-dd HH:mm:ss\")"
    excel: "变更时间"

  # 批量操作辅助字段（domain 类中额外定义，不持久化）
  - field: projectIds
    javaType: "Long[]"
    source: "前端传入，批量变更接口专用（POST /batchChange @RequestBody）"

# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: projectStageChange
  functionName: 项目阶段变更
  parentMenuId: 2059  # 一级菜单"项目管理"的 menu_id

# ============================
# 菜单配置
# ============================
menuConfig:
  icon: Switch
  buttons:
    - name: 项目阶段变更查询
      perms: project:projectStageChange:list
    - name: 项目阶段变更详情
      perms: project:projectStageChange:query
    - name: 项目阶段变更新增
      perms: project:projectStageChange:add
    - name: 项目阶段变更修改
      perms: project:projectStageChange:edit
    - name: 项目阶段变更删除
      perms: project:projectStageChange:remove
    - name: 项目阶段变更导出
      perms: project:projectStageChange:export
    - name: 项目阶段批量变更
      perms: project:projectStageChange:batchChange
  notes: |
    单个变更操作使用 add 权限；
    批量变更操作使用独立的 batchChange 权限（Controller 对应 @PreAuthorize batchChange，前端 v-hasPermi batchChange）；
    变更记录历史查看按钮前端使用 query 权限控制可见性，对应后端 /history/{projectId} 端点以 list 权限保护。

# ============================
# 定制需求
# ============================
customizations:

  # ── 1. 核心设计理念 ───────────────────────────────────────────────────────
  design_philosophy:
    intent: "以项目为主体，一行一个项目，展示最新变更信息"
    spec: |
      列表以 pm_project 为主表，每行代表一个项目，通过子查询关联最新阶段变更记录。
      不提供独立的变更记录新增/编辑页面，所有变更操作通过 Dialog 完成。
      变更记录历史通过独立的"变更记录" Dialog 展示（不分页）。

  # ── 2. 查询区 ──────────────────────────────────────────────────────────────
  query_form:
    intent: "列表查询条件"
    spec: |
      1. 项目名称（prop="projectId"）
         - el-select，filterable，remote，clearable，style="width: 240px"
         - v-model="queryParams.projectId"（直接绑定 ID，el-option 的 :value="p.projectId"）
         - :remote-method="remoteSearchProject"（输入时触发远程搜索）
         - :loading="projectSearchLoading"
         - @keyup.enter="handleQuery"
         - @visible-change="(v) => v && loadProjectOptions()"（下拉打开时预加载全部项目）
         - el-option：v-for="p in projectOptions" :key="p.projectId" :label="p.projectName" :value="p.projectId"
         - loadProjectOptions(query)：调用 searchProjects(query || '') → res.data（项目列表）
           searchProjects 对应 GET /project/project/search，返回 res.data（非 res.rows）
         - remoteSearchProject(query)：调用 loadProjectOptions(query)
         - 重置时 queryParams.projectId = null（proxy.resetForm 自动处理）

      2. 当前阶段（prop="projectStage"）
         - el-select，clearable，style="width: 160px"
         - 字典：sys_xmjd
         - 对应 queryParams.projectStage，Mapper WHERE 条件：p.project_stage = #{projectStage}

  # ── 3. 列表设计 ──────────────────────────────────────────────────────────
  list_design:
    intent: "以项目为主体的列表列顺序与展示"
    spec: |
      多选列（checkbox, 55） → 序号（type=index, 55）
      → 项目名称（align=left, header-align=center, width=220, project-name-cell class，word-break:break-all, white-space:normal）
      → 收入确认年度（align=center, 120）
      → 确认金额(元)（align=center, 150, formatAmountYuan）
      → 合同状态（align=center, 100, dict-tag sys_htzt）
      → 合同金额(元)（align=center, 150, formatAmountYuan）
      → 确认状态（align=center, 110, dict-tag sys_srqrzt）
      → 项目部门（align=center, min-width=160, show-overflow-tooltip, formatDeptPath）
      → 当前阶段（align=center, 110, dict-tag sys_xmjd）
      → 原阶段（align=center, 110, dict-tag sys_xmjd）
      → 变更原因（align=center, min-width=120, show-overflow-tooltip）
      → 变更人（align=center, 100）
      → 变更时间（align=center, 160）
      → 操作（align=center, 160, fixed=right）

      工具栏：
      - 批量变更（icon=Switch, plain, :disabled="multiple", v-hasPermi=['project:projectStageChange:batchChange']）
      - right-toolbar（显隐搜索）

      操作列：
      - 变更（icon=Edit, link, v-hasPermi=['project:projectStageChange:add']）→ handleChange(row)
      - 变更记录（icon=Document, link, v-hasPermi=['project:projectStageChange:query']）→ handleHistory(row)

  # ── 4. 后端 SQL 逻辑 ──────────────────────────────────────────────────────
  backend_sql:
    intent: "selectProjectStageChangeList 核心 SQL 结构"
    spec: |
      主表：pm_project p（WHERE p.del_flag = '0'）

      合同 JOIN（取每个项目最小 contract_id 的有效合同）：
        LEFT JOIN (
            SELECT project_id, MIN(contract_id) AS contract_id
            FROM pm_project_contract_rel
            WHERE del_flag = '0' AND rel_status = '有效'
            GROUP BY project_id
        ) pcr ON p.project_id = pcr.project_id
        LEFT JOIN pm_contract c ON pcr.contract_id = c.contract_id AND c.del_flag = '0'

      最新阶段变更 JOIN（ROW_NUMBER 取每个项目最新一条）：
        LEFT JOIN (
            SELECT change_id, project_id, old_stage, new_stage, change_reason, create_by, create_time
            FROM (
                SELECT ..., ROW_NUMBER() OVER (PARTITION BY project_id
                             ORDER BY create_time DESC, change_id DESC) AS rn
                FROM pm_project_stage_change WHERE del_flag = '0'
            ) t WHERE rn = 1
        ) psc ON p.project_id = psc.project_id

      变更人昵称：
        LEFT JOIN sys_user u ON psc.create_by COLLATE utf8mb4_unicode_ci = u.user_name COLLATE utf8mb4_unicode_ci
        列：COALESCE(u.nick_name, psc.create_by) AS change_by

      排序：ORDER BY p.update_time DESC

      Collation 注意：pm_project_stage_change 使用 utf8mb4_0900_ai_ci，sys_user 使用 utf8mb4_unicode_ci，
      两侧都须显式指定 COLLATE utf8mb4_unicode_ci

      ─── Mapper 辅助方法 ───

      selectHistoryByProjectId（变更历史弹窗）：
        SELECT psc.change_id, psc.project_id, psc.old_stage, psc.new_stage, psc.change_reason,
               COALESCE(u.nick_name, psc.create_by) AS create_by,
               psc.create_time
        FROM pm_project_stage_change psc
        LEFT JOIN sys_user u ON psc.create_by COLLATE utf8mb4_unicode_ci = u.user_name COLLATE utf8mb4_unicode_ci
        WHERE psc.project_id = #{projectId} AND psc.del_flag = '0'
        ORDER BY psc.create_time DESC, psc.change_id DESC
        返回字段映射到 createBy（昵称 COALESCE）和 createTime

      selectProjectStageByProjectId：
        SELECT project_stage FROM pm_project WHERE project_id = #{projectId} AND del_flag = '0'
        供批量变更 Service 层获取各项目的当前阶段

      updateProjectStageByProjectId：
        UPDATE pm_project SET project_stage = #{projectStage}, update_time = NOW()
        WHERE project_id = #{projectId}
        供 insertProjectStageChange 和 batchChange 同步更新 pm_project.project_stage

  # ── 5. 单项变更 Dialog ───────────────────────────────────────────────────
  single_change_dialog:
    intent: "操作列'变更'按钮，弹出 Dialog 为单个项目记录新的阶段变更"
    spec: |
      el-dialog：title="变更项目阶段 - " + changeForm.projectName，width=520px，append-to-body

      表单（label-width=90px）：
      - 新阶段（prop="newStage"，必填，required 校验触发 change）：
          el-select，sys_xmjd，style="width:100%"
      - 变更原因：el-input，type=textarea，rows=4，maxlength=500，show-word-limit（选填）
      - 变更项目数：只读文字 "1 个项目"

      handleChange(row) 初始化：
        changeForm = {
          projectId: row.projectId,
          projectName: row.projectName,
          currentStage: row.projectStage,
          newStage: null,
          changeReason: null
        }

      submitChange 提交体（POST /project/projectStageChange，@RequestBody JSON）：
        { projectId, oldStage: changeForm.currentStage, newStage, changeReason }
        调用 addProjectStageChange(data) → API: POST /project/projectStageChange

      Service 逻辑（insertProjectStageChange）：
        @Transactional
        1. 设置 delFlag='0'，createBy=SecurityUtils.getUsername()，createTime=DateUtils.getNowDate()
        2. insertProjectStageChange（写入 pm_project_stage_change）
        3. 若 insert 成功且 projectId/newStage 不为空，调用
           updateProjectStageByProjectId(projectId, newStage)
           同步更新 pm_project.project_stage + update_time=NOW()

  # ── 6. 变更记录 Dialog ───────────────────────────────────────────────────
  change_history_dialog:
    intent: "操作列'变更记录'按钮，展示该项目全部阶段变更历史（倒序，不分页）"
    spec: |
      el-dialog：title="变更记录"，width=820px，append-to-body

      标题区（mb8, font-size:13px, color:#606266）：
        项目：<strong>{{ currentProjectName }}</strong>

      只读 el-table（border, v-loading="historyLoading"）：
      - 序号（type=index, 55）
      - 原阶段（width=130, dict-tag sys_xmjd, prop="oldStage"）
      - 新阶段（width=130, dict-tag sys_xmjd, prop="newStage"）
      - 变更原因（min-width=150, show-overflow-tooltip, prop="changeReason"）
      - 变更人（width=100, prop="createBy"）← 后端已 COALESCE 为昵称，映射到 createBy
      - 变更时间（width=180, prop="createTime"）

      数据加载：handleHistory(row) → historyByProject(row.projectId)
        API: GET /project/projectStageChange/history/{projectId}
        后端权限：@PreAuthorize("@ss.hasPermi('project:projectStageChange:list')")
        前端按钮可见性：v-hasPermi=['project:projectStageChange:query']
        返回：AjaxResult，前端取 res.data（List<ProjectStageChange>）

  # ── 7. 批量变更 Dialog ───────────────────────────────────────────────────
  batch_change_dialog:
    intent: "工具栏'批量变更'按钮（勾选后激活），批量为多个项目记录阶段变更"
    spec: |
      工具栏按钮：icon=Switch, plain, :disabled="multiple"（无勾选时禁用）
        v-hasPermi=['project:projectStageChange:batchChange']

      el-dialog：title="批量变更项目阶段"，width=520px，append-to-body

      表单（label-width=90px）：
      - 新阶段（prop="newStage"，必填，required 校验触发 change）：
          el-select，sys_xmjd，style="width:100%"
      - 变更原因：el-input，type=textarea，rows=4，maxlength=500，show-word-limit（选填）
      - 变更项目数：动态显示 "{{ selectedRows.length }} 个项目"

      handleBatchChange()：初始化 batchForm = { newStage: null, changeReason: null }，打开弹窗

      submitBatchChange 提交（POST /project/projectStageChange/batchChange，@RequestBody JSON）：
        { projectIds: selectedRows.map(r => r.projectId), newStage, changeReason }
        调用 batchChangeStage(data)

      Controller：@PreAuthorize("@ss.hasPermi('project:projectStageChange:batchChange')")
        从 @RequestBody ProjectStageChange request 中取 projectIds/newStage/changeReason
        调用 service.batchChange(projectIds, newStage, changeReason)

      Service 逻辑（batchChange）：
        @Transactional，循环每个 projectId：
          1. selectProjectStageByProjectId(projectId) → oldStage
          2. 构造 ProjectStageChange（projectId, oldStage, newStage, changeReason, delFlag='0',
             createBy=SecurityUtils.getUsername(), createTime=DateUtils.getNowDate()）
          3. insertProjectStageChange(change)
          4. updateProjectStageByProjectId(projectId, newStage)
        返回 projectIds.length

  # ── 8. 辅助函数 ──────────────────────────────────────────────────────────
  utility_functions:
    intent: "前端辅助函数"
    spec: |
      formatAmountYuan(val)：
        if (val == null || val === '') return '-'
        return parseFloat(val).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })

      loadDepts()（组件 setup 阶段直接调用，非 onMounted）：
        request({ url: '/project/project/deptTree', method: 'get' }).then(res => {
          const map = {}
          ;(res.data || []).forEach(d => { map[d.deptId] = d })
          deptMap.value = map
        })
        注意：使用代理接口 /project/project/deptTree（不直接调用 /system/dept/list）

      formatDeptPath(deptId)：
        if (!deptId) return '-'
        const id = parseInt(deptId); if (!id) return deptId
        const dept = deptMap.value[id]; if (!dept) return deptId
        const ancestorIds = (dept.ancestors || '').split(',').map(Number).filter(n => n > 0)
        const fullPath = [...ancestorIds, id]
        const displayIds = fullPath.length > 2 ? fullPath.slice(2) : fullPath
        return displayIds.map(did => deptMap.value[did]?.deptName || String(did)).join(' - ')

      searchProjects(query)：
        来自 @/api/project/project，对应 GET /project/project/search
        返回 res.data（项目数组，含 projectId, projectName），非 res.rows

# ============================
# 后端 API 汇总
# ============================
apiSummary:
  - "GET    /project/projectStageChange/list                → 以项目为主体的分页列表（list 权限）"
  - "GET    /project/projectStageChange/history/{projectId} → 某项目全部变更历史，不分页（list 权限）"
  - "GET    /project/projectStageChange/{changeId}          → 单条变更记录详情（query 权限）"
  - "POST   /project/projectStageChange                     → 新增变更记录，同步更新 pm_project.project_stage（add 权限）"
  - "POST   /project/projectStageChange/batchChange         → 批量变更阶段，@RequestBody JSON（batchChange 权限）"
  - "PUT    /project/projectStageChange                     → 修改变更记录（edit 权限）"
  - "DELETE /project/projectStageChange/{changeIds}         → 软删除变更记录（remove 权限）"
  - "POST   /project/projectStageChange/export              → 导出 Excel（export 权限）"

# ============================
# 字典依赖
# ============================
dictDependencies:
  - sys_xmjd:   "项目阶段（原阶段/新阶段/当前阶段/查询下拉）"
  - sys_htzt:   "合同状态"
  - sys_srqrzt: "收入确认状态"

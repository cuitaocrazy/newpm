# ============================
# 定制说明
# ============================
customizations:
  mapper_design:
    intent: "TaskMapper 核心查询逻辑"
    spec: |
      selectTaskList 以 pm_project 为主表（LEFT JOIN pm_task），意味着：
      - 有任务的项目：pm_task 字段有值，pm_project 字段提供父项目上下文
      - 无任务的项目：pm_task 字段全为 NULL（仍会出现在列表中，因为使用 LEFT JOIN 而非 INNER JOIN，无额外 WHERE 过滤）
      TaskMapper 读取 pm_project 字段时，展示在 Task 的 parentProjectName / projectCode 等扩展字段中

      排序：ORDER BY pm_project.project_id ASC, pm_task.task_code ASC

  daily_report_integration:
    intent: "任务与日报的集成关系"
    spec: |
      pm_daily_report_detail.project_id 存储 pm_task.task_id（task-based entries）
      pm_daily_report_detail.sub_project_id 也存储 pm_task.task_id（兼容旧列名，不修改）
      GET /project/task/options?projectId=xxx 为日报填写页提供轻量任务下拉（含 taskId, taskName）

  hard_delete_note:
    intent: "硬删除注意事项"
    spec: |
      pm_task 无 del_flag 列，使用 DELETE FROM pm_task WHERE task_id IN (...)
      级联影响：pm_daily_report_detail 中引用 task_id 的记录变为悬空引用，需业务层确认

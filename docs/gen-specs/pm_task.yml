  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: task
  functionName: 任务管理
  parentMenuId: 2059  # 项目管理一级菜单

# ============================
# 菜单配置
# ============================
menuConfig:
  icon: List
  buttons:
    - name: 任务管理查询
      perms: project:task:list
    - name: 任务管理详情
      perms: project:task:query
    - name: 任务管理新增
      perms: project:task:add
    - name: 任务管理修改
      perms: project:task:edit
    - name: 任务管理删除
      perms: project:task:remove
    - name: 任务管理导出
      perms: project:task:export
  notes: |
    路由隐藏（hidden: true），level-2 子路由挂在 项目管理 下（/project/subproject）。
    前端 views: ruoyi-ui/src/views/project/subproject/（index / add / edit / detail）

# ============================
# API 汇总
# ============================
apiSummary:
  - "GET    /project/task/list                    → 分页任务列表（pm_project LEFT JOIN pm_task）"
  - "GET    /project/task/summary                 → 合计行（预算/工作量/金额汇总）"
  - "GET    /project/task/{taskId}                → 任务详情"
  - "POST   /project/task                         → 新增任务"
  - "PUT    /project/task                         → 修改任务"
  - "DELETE /project/task/{taskIds}               → 硬删除（无 del_flag）"
  - "POST   /project/task/export                  → 导出 Excel（未实现 — 源码中 TaskController 无此端点）"
  - "GET    /project/task/options?projectId=xxx   → 轻量下拉选项（日报选择子项目）"
  - "GET    /project/task/projectsHasTasks        → 批量检查哪些项目有任务"
  - "GET    /project/task/searchTaskCode          → 任务编号自动补全"
  - "GET    /project/task/searchTaskName          → 任务名称自动补全"
  - "GET    /project/task/searchSoftwareDemandNo  → 需求编号自动补全"


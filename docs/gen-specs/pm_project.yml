# ============================
# Tab 3: 生成信息
# ============================
genInfo:
  tplCategory: crud
  tplWebType: element-plus
  packageName: com.ruoyi.project
  moduleName: project
  businessName: project
  functionName: 项目管理
  parentMenuId: 3

# ============================
# 定制需求（超出标准模板的组件/交互/接口需求）
# ============================
customizations:

  # ==================
  # 后端实现说明
  # ==================
  backend_implementation:
    intent: "后端数据处理和保存逻辑"
    spec: |
      1. 二级区域（regionId + regionCode 双字段）
         - regionId (bigint): 保存到数据库，用于关联查询
         - regionCode (varchar): 用于项目编号生成和显示
         - INSERT/UPDATE 同时保存两个字段
         - 前端提交时包含 regionCode 和 regionId，后端直接保存

      2. 项目状态（projectStatus）
         - 字典值 sys_xmzt（开启/关闭-不可操作/结束）
         - 立项申请、项目编辑：必填

      3. 项目阶段（projectStage）
         - 字典值 sys_xmjd
         - 立项申请、项目编辑：必填

      4. 参与人员（participants）
         - 存储格式：逗号分隔的 userId 字符串（如 "1,2,3"）
         - 前端提交：数组 → join(',') → 字符串
         - 查询回显：字符串 → split(',') → 数组

      5. 项目编号（projectCode）
         - 格式：{industry}-{region}-{regionCode}-{shortName}-{establishedYear}
         - 前端自动生成，后端保存
         - 数据库 UNIQUE 约束

      6. 新增时时间字段同步
         - insertProject 同时调用 setCreateTime 和 setUpdateTime，两者设为相同时间
         - 代码：project.setCreateTime(DateUtils.getNowDate());
                project.setUpdateTime(DateUtils.getNowDate());

      7. 更新人昵称显示（updateByName）
         - 实体类扩展字段 updateByName（非数据库字段）
         - selectProjectList 通过 LEFT JOIN sys_user 关联查询 nick_name
         - SQL: LEFT JOIN sys_user u_upd ON p.update_by COLLATE utf8mb4_unicode_ci = u_upd.user_name

      8. 列表排序规则
         - ORDER BY p.update_time DESC
         - 新增时 update_time 已同步为 create_time，所有记录均有 update_time

      9. 物理删除
         - 删除操作执行 DELETE FROM pm_project WHERE project_id = #{projectId}
         - 无软删除，数据直接从数据库移除
         - del_flag 字段仅用于历史兼容，查询时保留 WHERE p.del_flag = '0' 过滤已删除数据

      10. 关联查询（selectProjectList）
          - LEFT JOIN pm_secondary_region sr ON p.region_id = sr.region_id → sr.region_name
          - LEFT JOIN pm_project_contract_rel pcr → pcr.contract_id
          - LEFT JOIN pm_contract c → c.contract_name, c.contract_amount, c.contract_status
          - LEFT JOIN sys_user u_upd → u_upd.nick_name AS update_by_name

      11. Collation 注意事项
          - pm_project 使用 utf8mb4_0900_ai_ci，sys_user 使用 utf8mb4_unicode_ci
          - JOIN 系统表时须显式指定 COLLATE utf8mb4_unicode_ci

  # ==================
  # 前端字段绑定说明
  # ==================
  frontend_field_binding:
    intent: "前端表单字段绑定规范"
    spec: |
      1. 二级区域（双字段机制）
         - v-model="form.regionCode" 用于下拉选择和显示
         - form.regionId (bigint) 用于保存到数据库
         - 选择 → regionCode → 查找对应 regionId → 同时保存

      2. 项目状态
         - v-model="form.projectStatus"
         - 字典类型：sys_xmzt
         - 使用 <dict-select> 组件

      3. 项目阶段
         - v-model="form.projectStage"
         - 字典类型：sys_xmjd
         - 使用 <dict-select> 组件

      4. 参与人员（数组与字符串转换）
         - v-model="participantIds" (Array<number>)
         - 后端保存：form.participants (String, 逗号分隔)
         - 提交前：participantIds.join(',')
         - 回显时：participants.split(',').map(Number)

      5. 项目编号（自动生成）
         - 新增时自动生成，禁用输入
         - 编辑时只读显示，不可修改

  # ==================
  # 通用选择器组件
  # ==================
  reusable_components:
    intent: "全局注册的通用选择器组件"
    spec: |
      组件位置：ruoyi-ui/src/components/，全局注册于 main.ts

      1. DictSelect - 字典选择器
         - 自动加载字典数据
         - props: dict-type, placeholder, clearable
         - 使用场景：所有字典下拉（行业、区域、项目分类、项目状态、项目阶段、验收状态等）

      2. UserSelect - 用户选择器
         - 支持按岗位筛选（pm/scjl/xsfzr）
         - props: post-code, placeholder, filterable
         - 使用场景：项目经理、市场经理、销售负责人

      3. SecondaryRegionSelect - 二级区域选择器
         - 自动联动一级区域
         - props: region（一级区域值）

      4. ProjectDeptSelect - 项目部门选择器
         - 树形选择，仅展示三级及以下机构
         - 数据来源：GET /project/project/deptTree

  # ==================
  # 表单字段定制
  # ==================
  project_code_auto_generate:
    intent: "项目编号自动生成"
    component:
      type: "el-input"
      props:
        disabled: true
        readonly: true
    bindTo: "project_code"
    spec: |
      格式：{行业代码}-{一级区域代码}-{二级区域代码}-{简称}-{立项年份}
      前端监听 industry, region, regionCode, shortName, establishedYear 五个字段变化，
      当全部填写时在前端拼接生成，无需后端接口。
      新增页面：禁用输入，自动生成后回填
      编辑页面：只读显示，不可修改

  project_name_autocomplete:
    intent: "项目名称查询条件自动完成"
    component:
      type: "el-autocomplete"
      props:
        fetch-suggestions: "queryProjectNames"
        clearable: true
        placeholder: "请输入项目名称"
        style: "width: 240px"
    bindTo: "project_name"

  region_id_dynamic_loading:
    intent: "二级区域根据一级区域动态加载"
    component:
      type: "el-select"
      props:
        filterable: true
        clearable: true
        placeholder: "请选择二级区域"
        disabled: "!form.region"
    bindTo: "regionCode"
    service:
      endpoint: "GET /project/project/secondaryRegions?regionDictValue={region}"
      returns: "二级区域列表: regionId, regionName, regionCode"
    spec: |
      一级区域变化时清空二级区域（regionCode + regionId），重新加载数据
      下拉选项：显示 regionName，值为 regionCode
      选择后根据 regionCode 查找对应 regionId 保存到 form.regionId

  project_status_field:
    intent: "项目状态下拉选，字典 sys_xmzt"
    component:
      type: "dict-select"
      props:
        dict-type: "sys_xmzt"
        clearable: true
        placeholder: "请选择项目状态"
    bindTo: "projectStatus"
    spec: |
      字典选项（sys_xmzt）：开启、关闭-不可操作、结束
      使用场景：
      - 立项申请：必填
      - 项目编辑：必填（clearable）
      - 项目详情：dict-tag 只读显示
      - 项目列表：支持查询筛选

  project_stage_field:
    intent: "项目阶段下拉选，字典 sys_xmjd"
    component:
      type: "dict-select"
      props:
        dict-type: "sys_xmjd"
        clearable: true
        placeholder: "请选择项目阶段"
    bindTo: "projectStage"
    spec: |
      字典选项（sys_xmjd）：0=其他, 1=售前支持, 2=需求及设计, 3=开发及自测, 4=验收测试, 5=系统投产, 6=免维期维护, 7=项目结项
      使用场景：立项申请（必填）、项目编辑（必填）、项目列表（筛选）

  participants_multi_select:
    intent: "参与人员多选自动完成组件"
    component:
      type: "el-select"
      props:
        multiple: true
        filterable: true
        clearable: true
        collapse-tags: true
        collapse-tags-tooltip: true
        placeholder: "请选择参与人员"
    bindTo: "participants"
    service:
      endpoint: "GET /project/project/users"
      returns: "所有用户列表，显示 nickName，值为 userId（注意使用代理接口 res.data，非 res.rows）"
    spec: |
      后端存储：逗号分隔的 userId 字符串（"1,2,3"）
      前端展示：数组 [1, 2, 3]
      提交时数组 → 逗号分隔字符串
      回显时字符串 → 数组

  project_dept_tree_select:
    intent: "项目部门树形选择器，仅展示三级及以下机构"
    component:
      type: "el-tree-select（内联，非独立组件）"
      props:
        check-strictly: true
        clearable: true
        filterable: true
    bindTo: "project_dept"
    service:
      endpoint: "GET /project/project/deptTree"
      returns: "所有部门数据: deptId, parentId, deptName, ancestors（res.data 扁平列表，前端 handleTree 构建树）"
    spec: |
      列表显示逻辑：
      - getDeptName(deptId) 函数解析 ancestors 字段
      - 从第三级开始拼接完整路径，用'-'连接
      - 示例："事业部-开发部-研发组"

      数据加载：
      - deptTree: 过滤三级及以下（ancestors 逗号数量≥2），handleTree 构建，用于下拉选择
      - deptFlatList: 包含所有部门，用于列表名称显示

  sales_contact_auto_fill:
    intent: "销售联系方式根据销售负责人自动填充"
    component:
      type: "el-input"
      props:
        readonly: true
        placeholder: "自动填充"
    bindTo: "sales_contact"
    spec: |
      监听销售负责人选择（@change），获取用户 phonenumber 自动填充
      字段只读不可手动修改

  customer_id_select:
    intent: "客户简称下拉选择器"
    component:
      type: "el-select"
      props:
        filterable: true
        clearable: true
        placeholder: "请选择客户"
    bindTo: "customer_id"
    service:
      endpoint: "GET /project/project/customers"
      returns: "客户列表: customerId, customerSimpleName, customerFullName（res.data）"

  customer_contact_id_dynamic:
    intent: "客户联系人根据客户动态加载"
    component:
      type: "el-select"
      props:
        filterable: true
        clearable: true
        placeholder: "请选择客户联系人"
        disabled: "!form.customer_id"
    bindTo: "customer_contact_id"
    service:
      endpoint: "GET /project/project/customerContacts?customerId={customerId}"
      returns: "联系人列表: contactId, contactName, contactPhone"
    spec: "客户变化时清空联系人并重新加载"

  merchant_phone_auto_fill:
    intent: "商户联系方式根据客户联系人自动填充"
    component:
      type: "el-input"
      props:
        readonly: true
        placeholder: "自动填充"
    bindTo: "merchant_phone"
    spec: "选择客户联系人时，从 option 数据中直接获取 contactPhone 填充"

  project_manager_id_select:
    intent: "项目经理下拉（岗位:pm）"
    component:
      type: "user-select"
      props:
        post-code: "pm"
        filterable: true
        clearable: true
        placeholder: "请选择项目经理"
    bindTo: "project_manager_id"

  market_manager_id_select:
    intent: "市场经理下拉（岗位:scjl）"
    component:
      type: "user-select"
      props:
        post-code: "scjl"
    bindTo: "market_manager_id"

  sales_manager_id_select:
    intent: "销售负责人下拉（岗位:xsfzr），选择后自动填充联系方式"
    component:
      type: "user-select"
      props:
        post-code: "xsfzr"
    bindTo: "sales_manager_id"
    spec: "@change 事件触发 handleSalesManagerChange，自动填充 sales_contact"

  # ==================
  # 列表页定制
  # ==================
  query_form_layout:
    intent: "查询表单布局"
    spec: |
      Label 宽度：120px
      组件宽度：240px（所有查询组件统一）
      包括：el-autocomplete、el-select、el-tree-select

  list_column_order:
    intent: "列表列顺序（从左到右）"
    spec: |
      序号 → 项目名称 → 项目阶段 → 项目部门 → 项目经理 → 项目分类 → 二级区域
      → 项目预算(元) → 预估工作量 → 实际人天 → 合同名称
      → 合同金额(元) → 收入确认年度 → 收入确认状态 → 合同状态
      → 确认金额(元) → 参与人员 → 启动日期 → 结束日期 → 验收日期
      → 审核状态 → 验收状态 → 更新人 → 更新时间 → 操作

      注意：
      - 收入确认状态在合同状态之前
      - 项目阶段紧随项目名称之后（第2列）

  list_display_fields:
    intent: "列表字段显示处理"
    spec: |
      1. 字典字段（dict-tag 组件）：
         - 项目分类 (projectCategory): sys_xmfl
         - 项目状态 (projectStatus): sys_xmzt
         - 项目阶段 (projectStage): sys_xmjd
         - 验收状态 (acceptanceStatus): sys_yszt
         - 审核状态 (approvalStatus): sys_spzt
         - 合同状态 (contractStatus): sys_htzt
         - 收入确认状态 (revenueConfirmStatus): sys_srqrzt

      2. 关联表字段（函数转换）：
         - 项目部门 → getDeptName(deptId)，从第三级开始的完整路径（用'-'连接）
         - 项目经理 → getUserName(userId, projectManagerSelectRef?.userOptions)
         - 参与人员 → getParticipantsNames(participants)，ID→昵称，onMounted 预加载全量用户
         - 更新人 → updateByName 字段（后端 LEFT JOIN sys_user 返回 nick_name，prop="updateByName"）
         - 二级区域 → regionName（selectProjectList LEFT JOIN pm_secondary_region）
         - 合同名称 → contractName（selectProjectList LEFT JOIN pm_contract）

      3. 参与人员昵称加载方案：
         onMounted 调用 getUsersByPost()（GET /project/project/users，res.data）获取全量用户
         getParticipantsNames() 从 allUsersList 中查找昵称

      4. 金额千分位格式化（formatAmount）：
         toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})
         应用字段：项目预算(元)、合同金额(元)、确认金额(元)
         不格式化：预估工作量、实际人天（人天单位）

      5. 特殊列样式：
         - 项目名称：align=left, header-align=center, min-width=220，内容 word-break:break-all 自动换行
                     使用 el-link type="primary" 包裹文本，点击触发 handleDetail(row) 跳转详情
         - 合同名称：align=left, header-align=center, width=200（固定宽），show-overflow-tooltip

      6. sortable="custom" 的列（支持表头点击排序）：
         - 项目预算(元)
         - 合同金额(元)
         - 确认金额(元)

  list_column_visibility:
    intent: "显隐列功能"
    spec: |
      right-toolbar 绑定 :columns，可控制各列的显示/隐藏
      所有列默认可见（visible: true），无默认隐藏列
      所有表格列添加 v-if="columns.xxx.visible" 控制

  list_summary_row:
    intent: "列表第一行合计行"
    spec: |
      位置：表头和第一行数据之间（projectList 数组第0位）
      实现：getList() 中计算合计值，创建 { isSummaryRow: true, ... } 插入数组第一位
      合计字段：项目预算、预估工作量、实际人天、合同金额、确认金额
      样式：序号列显示"合计"（加粗），数值列加粗，操作列无按钮
      CSS：.summary-row { background-color: #f5f7fa; font-weight: bold; }

  list_extra_fields:
    intent: "列表显示关联表字段（合同名称、合同金额、合同状态）"
    spec: |
      SQL 关联查询（selectProjectList）：
      LEFT JOIN pm_project_contract_rel pcr ON p.project_id = pcr.project_id
        AND pcr.del_flag = '0' AND pcr.rel_status = '有效'
      LEFT JOIN pm_contract c ON pcr.contract_id = c.contract_id
      查询字段：c.contract_name, c.contract_amount, c.contract_status
      实体类扩展字段（非数据库字段）：contractName, contractAmount, contractStatus
      resultMap 映射：
        contractName → contract_name
        contractAmount → contract_amount
        contractStatus → contract_status

  list_operations:
    intent: "列表操作按钮"
    spec: |
      操作列按钮（固定右侧，宽度 350px）：
      1. 详情 → handleDetail(row)，router.push(/project/list/detail/:id)，v-hasPermi project:project:query
      2. 编辑 → handleUpdate(row)，router.push(/project/list/edit/:id)，v-hasPermi project:project:edit
      3. 添加合同/查看合同 → 根据 scope.row.contractId 动态显示：
         - contractId 存在：按钮"查看合同"(Document)，router.push(/htkx/contract/detail/:contractId)
         - contractId 不存在：按钮"添加合同"(Plus)，router.push(/htkx/contract/add?projectId=xxx)
      4. 收入确认/收入查看 → 根据 revenueConfirmStatus 动态显示：
         - '0' 或 null：按钮"收入确认"(Money, success)，v-hasPermi revenue:company:edit
         - '1'：按钮"收入查看"(View)，v-hasPermi revenue:company:view
      5. 附件管理 → router.push(/project/list/attachment/:projectId)，v-hasPermi project:project:query
      6. 删除 → 确认弹框后物理删除（DELETE），v-hasPermi project:project:remove

      注意：
      - 无批量删除功能（已移除工具栏删除按钮和 checkbox 选择列）
      - 无"新增"按钮，新增通过"立项申请"菜单进入独立页面
      - 删除为物理删除，不可恢复，弹框确认提示需体现

  list_query_cache:
    intent: "查询条件和分页状态导航返回后保留"
    spec: |
      index.vue 的 <script setup name="ProjectList"> 必须与菜单 route_name 一致
      框架 keep-alive 根据组件 name 匹配缓存

  pagination_fixed_bottom:
    intent: "分页组件固定在页面底部"
    spec: |
      容器 flex 布局，表格动态计算高度（tableHeight ref）
      onMounted 计算、window resize 监听、showSearch 变化时重新计算
      表格设固定高度（非自适应内容高度）确保分页始终在底部

  # ==================
  # 页面布局定制
  # ==================
  page_mode_independent:
    intent: "完全独立页面模式（不使用 Dialog/Drawer）"
    spec: |
      - 列表页：/project/project（查询 + 列表 + 操作）
      - 立项申请：/project/apply（独立页面）
      - 编辑：/project/project/edit/:id（独立页面）
      - 详情：/project/project/detail/:id（独立页面）
      - 附件管理：/project/list/attachment/:projectId（独立页面，隐藏菜单）

  apply_page_layout:
    intent: "立项申请页面布局（6个 el-card 模块）"
    spec: |
      模块 1：项目基本信息
        行业(12) | 一级区域(12)
        二级区域(12) | 简称(12)
        立项年度(12) | 项目名称(12)
        项目编号(12, disabled) | 项目分类(12)
        项目部门(12) | 项目状态(12, 必填, sys_xmzt)
        项目阶段(12, 必填) | 验收状态(12)
        预估工作量(12) | 项目预算(12)
        实际工作量(12)
        项目地址(24)
        项目计划(24, textarea)
        项目描述(24, textarea)

      模块 2：人员配置
        项目经理(12) | 市场经理(12)
        销售负责人(12) | 销售联系方式(12, 自动填充只读)
        参与人员(24, 多选)

      模块 3：客户信息
        客户名称(12) | 客户联系人(12) | 客户联系方式(12)
        商户联系人(12) | 商户联系方式(12)

      模块 4：时间规划
        启动日期(12) | 结束日期(12)
        投产日期(12) | 验收日期(12)

      模块 5：成本预算
        项目费用(12) | 费用预算(12) | 成本预算(12)
        人力费用(12) | 采购成本(12)

      模块 6：备注
        备注(24, textarea)

      底部按钮：提交 / 重置 / 取消

      收入确认字段（revenueConfirmStatus, revenueConfirmYear, confirmAmount, taxRate, afterTaxAmount）
      不在此页面显示，由专门的收入确认模块管理。

  edit_page_layout:
    intent: "项目编辑页面布局（6个 el-collapse-item 模块）"
    spec: |
      与立项申请页面字段相同，区别：
      1. 使用 el-collapse-item 可折叠面板
      2. 项目编号只读不可修改
      3. 显示审核状态（dict-tag 只读）和审核意见（只读）
      4. 页面顶部有返回按钮
      5. 底部动态提交按钮：
         - 审核被拒绝 (approvalStatus === '2')：按钮文字"重新提交审核"，图标 RefreshRight
           页面顶部显示黄色 el-alert 警告框展示拒绝原因
           提交后自动变为"待审核"，生成重新提交审核记录
         - 其他状态：按钮文字"保存"，图标 Select，仅保存修改

      模块 1 字段布局（同 apply，但增加审核信息）：
        ... (同 apply_page_layout)
        审核状态(12, dict-tag只读) | 审核意见(12, 只读)

  detail_page_layout:
    intent: "项目详情页面布局（多卡片 el-descriptions 只读展示）"
    spec: |
      页面顶部：返回按钮、编辑按钮、打印按钮

      卡片 1：项目基本信息 (el-descriptions, 3列)
        行业 | 一级区域 | 二级区域
        简称 | 立项年份 | 项目编号(span=2)
        项目名称(span=3)
        项目分类 | 项目部门 | 项目状态(dict-tag, sys_xmzt)
        预估工作量 | 项目预算 | 实际工作量
        项目阶段(dict-tag) | 验收状态(dict-tag) | 审核状态(dict-tag)
        项目地址(span=3) | 项目计划(span=3)
        项目描述(span=3) | 审核意见(span=3)

      卡片 2：人员配置
        项目经理(昵称) | 市场经理(昵称) | 销售负责人(昵称)
        销售联系方式(span=3)
        参与人员(span=3, el-tag 标签展示)

      卡片 3：客户信息
      卡片 4：时间规划
      卡片 5：成本预算（金额千分位格式化）
      卡片 6：关联合同信息（el-table，显示合同编号、名称、金额、状态等）
      卡片 7：付款里程碑信息（el-table，首行合计行）
        - 数据源：listPayment API
        - 显示条件：项目关联了合同时才显示
      卡片 8：项目附件列表（el-table）
        - 数据源：listAttachment API, businessType='project'
        - 文件名可点击下载
      卡片 9：其他信息
        备注(span=3) | 创建时间 | 创建人(昵称) | 更新时间 | 更新人(昵称)

      名称回显：
      - 项目经理/市场经理/销售负责人：通过 loadRelatedNames() 加载昵称
      - 客户名称/联系人：通过 API 查询名称
      - 创建人/更新人：getUserNickName(loginName) 从 allUsers 中查找昵称
      - 项目部门：getDeptName() 显示从第三级开始的完整路径

  # ==================
  # 附件管理功能
  # ==================
  attachment_management:
    intent: "项目附件管理（独立页面）"
    spec: |
      页面路由：/project/list/attachment/:projectId（隐藏菜单）
      页面结构：上半部分展示6个项目详情模块，下半部分附件上传+列表+操作日志

      后端：
      - 业务类型：businessType = 'project'
      - 控制器：AttachmentController
      - 附件表：pm_attachment，操作日志表：pm_attachment_log
      - 存储路径：uploadPath/项目/{projectId}_{projectName}/{yyyyMMdd}/{fileName}
      - 上传路径配置：${user.home}/ruoyi/uploadPath（跨平台）

      列表入口：项目列表操作列"附件管理"按钮
      菜单权限：project:project:query

  # ==================
  # 审核工作流
  # ==================
  approval_workflow:
    intent: "项目审核流程"
    spec: |
      审核状态流转：
      - 新增项目 → 待审核(0)
      - 审核通过 → 已通过(1)
      - 审核拒绝 → 已拒绝(2)
      - 编辑已拒绝项目并提交 → 重新变为待审核(0)，自动生成 pm_project_approval 记录

      编辑页面动态按钮：
      - 已拒绝(2)：按钮"重新提交审核"(RefreshRight)，顶部黄色警告框展示拒绝原因
      - 其他状态：按钮"保存"(Select)

      后端逻辑：
      - ProjectController.edit() 检测原审核状态
      - 已拒绝项目修改时自动变为待审核
      - 自动生成 pm_project_approval 审核记录

  # ==================
  # 收入确认相关
  # ==================
  revenue_fields_in_edit:
    intent: "编辑页面不显示收入确认字段，但数据库和实体类保留"
    spec: |
      apply.vue 和 edit.vue 不显示以下字段：
      - revenueConfirmStatus, revenueConfirmYear, confirmAmount, taxRate, afterTaxAmount
      这些字段由专门的收入确认功能模块管理（/revenue/company）

  revenue_confirm_permission:
    intent: "收入确认权限控制"
    spec: |
      后端：@PreAuthorize("@ss.hasRole('tdld')")
      前端：v-hasRole="['tdld']"
      岗位编码：tdld（团队负责人/团队经理）
      无需审批流程，团队经理直接确认

  tax_rate_logic:
    intent: "税率自动初始化与手动输入"
    spec: |
      下拉选项：6%（软件开发类）、13%（硬件销售类）
      监听 project_category 变化自动填充默认税率
      支持 allow-create 手动输入其他税率

  after_tax_amount_calc:
    intent: "税后金额自动计算"
    spec: |
      公式：税后金额 = 确认金额 / (1 + 税率/100)
      监听 confirm_amount 和 tax_rate 变化时自动计算

  # ==================
  # 公司收入确认模块
  # ==================
  revenue_confirmation:
    intent: "公司收入确认（完全定制化功能模块）"
    spec: |
      基于 pm_project 表的扩展功能，有独立的列表页和详情页。

      路由配置：
      - 列表页：/revenue/company → revenue/company/index.vue
      - 详情页：/revenue/company/detail/:projectId → revenue/company/detail.vue（隐藏路由）

      后端接口（ProjectController）：
      - GET  /project/project/revenue/list         列表
      - GET  /project/project/revenue/{projectId}  详情
      - PUT  /project/project/revenue              保存
      - POST /project/project/revenue/export       导出

      业务规则：
      1. 保存时自动设置 revenue_confirm_status = '1'（已确认）
      2. 税后金额自动计算：confirmAmount / (1 + taxRate/100)
      3. 税率按项目分类自动初始化（软件6%、硬件13%）
      4. 列表首行合计：项目预算、预估工作量、实际人天、合同金额、确认金额、税后金额

      查询条件：
      项目名称(autocomplete)、项目部门(treeselect)、收入确认年度、项目分类、
      一级区域、二级区域(联动)、项目经理、市场经理、立项年度、项目阶段、
      审核状态、验收状态、收入确认状态

      详情页布局（左右分栏）：
      - 左侧：项目详情信息（只读）
      - 右侧：收入确认表单（收入确认状态只读、确认年度必填、确认金额必填、税率必填、税后金额自动计算）
      - 模式参数：mode=edit|view，isViewMode 控制字段禁用

      菜单配置（02_menu_data.sql）：
      一级菜单：收入确认管理（menu_id: 2074）
      ├── 公司收入确认（menu_id: 2075）
      │   ├── 查询、查看、编辑、导出按钮权限
      └── 收入确认详情（menu_id: 2080，隐藏路由，挂一级菜单下）

      注意：详情页路由必须挂在一级菜单下，不能挂二级菜单下

  # ==================
  # 菜单和路由
  # ==================
  menu_structure:
    intent: "菜单结构"
    spec: |
      项目管理（一级菜单）
      ├── 立项申请（/project/apply）
      ├── 立项审核（/project/approval）
      ├── 项目管理（/project/project → 项目列表）
      └── 项目附件管理（隐藏菜单）

      收入确认管理（一级菜单）
      ├── 公司收入确认（/revenue/company）
      ├── 团队收入确认（/revenue/team）
      └── 收入确认详情（隐藏路由）

  route_config:
    intent: "前端路由配置"
    spec: |
      通过数据库动态菜单加载，不要添加静态路由到 router/index.ts
      关键路由：
      - /project/apply → ProjectApply（立项申请）
      - /project/project/edit/:id → ProjectEdit（编辑）
      - /project/project/detail/:id → ProjectDetail（详情）
      - /project/list/attachment/:projectId → ProjectAttachment（附件管理，隐藏）
      - /revenue/company/detail/:projectId → RevenueCompanyDetail（收入确认详情，隐藏）
      所有隐藏路由使用 activeMenu 属性使侧边栏高亮正确的菜单项
